<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C语言基础 — 45关从零到精通</title>
<style>
:root{--bg:#0d1117;--s:#161b22;--b:#30363d;--t:#c9d1d9;--m:#8b949e;--a:#58a6ff;--g:#3fb950;--o:#d2991d;--r:#f85149;--p:#a371f7;--cb:#0d1117}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex}
#sb{width:240px;min-width:240px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow-y:auto}
#sb .hd{padding:12px;font-size:16px;font-weight:700;color:var(--a);border-bottom:1px solid var(--b);cursor:pointer}
#sb .ph{font-size:15px;color:var(--m);padding:8px 10px 3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
#sb button{display:flex;align-items:center;gap:5px;width:100%;padding:6px 10px;border:none;background:none;color:var(--t);font-size:14px;cursor:pointer;text-align:left;font-family:inherit}
#sb button:hover{background:rgba(255,255,255,.03)}
#sb button.on{background:rgba(88,166,255,.12);color:var(--a);font-weight:600}
#sb button .n{font-size:15px;color:var(--m);min-width:14px}
#sb button.done .n{color:var(--g)}#sb button .ck{display:none;color:var(--g);font-size:16px;margin-left:auto}#sb button.done .ck{display:inline}
#main{flex:1;display:flex;overflow:hidden}#left{flex:1;overflow-y:auto;padding:14px;min-width:280px}
#right{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--b);min-width:350px}
#right .eh{padding:6px 12px;border-bottom:1px solid var(--b);font-size:16px;color:var(--m);flex-shrink:0}
#right .ew{flex:1;display:flex;font-family:'Consolas',monospace;font-size:15px;line-height:1.7}
#right .ln{background:var(--s);color:var(--m);padding:8px 0;text-align:right;overflow:hidden;width:36px;flex-shrink:0;font-size:15px;line-height:1.7}
#right .ln div{padding:0 6px}
#right textarea{flex:1;background:var(--cb);color:var(--t);border:none;padding:8px;resize:none;font-family:inherit;font-size:15px;line-height:1.7;tab-size:4;outline:none}
.btns{display:flex;gap:6px;padding:8px 12px;flex-shrink:0}
.btn{padding:5px 12px;border-radius:5px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:14px;cursor:pointer;font-family:inherit}
.btn:hover{background:rgba(255,255,255,.06)}.btn.pm{background:var(--a);color:#fff;border-color:var(--a)}
.op{border-top:1px solid var(--b);flex-shrink:0}.op .oh{padding:4px 12px;font-size:15px;color:var(--m);border-bottom:1px solid var(--b)}
.op .oo{background:#000;padding:8px 12px;font-family:'Consolas',monospace;font-size:14px;min-height:200px;max-height:800px;overflow-y:auto;white-space:pre-wrap}
#hint{display:none;margin:0 12px 8px;padding:8px 12px;background:rgba(210,153,29,.1);border:1px solid rgba(210,153,29,.3);border-radius:6px;font-size:15px;color:var(--o);line-height:1.6}
.kb{background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:15px;line-height:1.65}
.kb h4{font-size:15px;color:var(--a);margin-bottom:4px}.kb code{background:var(--s);padding:1px 4px;border-radius:3px;font-size:14px;color:var(--o)}
.kb pre{background:var(--cb);padding:6px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:14px;line-height:1.5;margin:4px 0}
.exm{background:rgba(167,113,247,.06);border:1px solid rgba(167,113,247,.2);border-radius:8px;padding:6px 10px;margin-bottom:10px;font-size:14px;color:var(--p)}
.iso{background:var(--s);border-radius:6px;padding:8px;font-size:14px;margin-top:10px}
.iso .il{font-size:15px;color:var(--m);margin-bottom:2px;font-weight:600}.iso pre{margin:0;background:var(--cb);padding:4px;border-radius:4px}
#toast{position:fixed;top:16px;right:16px;padding:8px 14px;border-radius:8px;font-size:15px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;background:#1a3c1a;color:var(--g);border:1px solid var(--g)}#toast.show{opacity:1}
</style></head><body>
<div id="sb"><div class="hd" onclick="location='c-studio.html'">← 返回总览</div><div id="sidebar-list"></div></div>
<div id="main"><div id="left"></div><div id="right">
<div class="eh">📝 main.c</div><div class="ew"><div class="ln" id="ln"><div>1</div></div><textarea id="code" spellcheck="false"></textarea></div>

<div id="hint"></div><div class="op"><div class="oh">📤 输出（编译错误显示红色，成功显示绿色）</div><div class="oo" id="out" style="color:var(--m)">— 点击▶运行 —</div></div>
</div></div><div id="toast"></div>
<script>
var LC=[{ph:'入门：认识C语言',tg:'语法',df:'⭐',ti:'Hello World',de:'写出第一个C程序：让电脑说"Hello, World!"',tp:'#include <stdio.h>\n\nint main(){\n  printf("Hello, World!\\n");\n  return 0;\n}',ex:'Hello, World!\n',kn:'<code>#include</code>=取工具。<code>main()</code>=入口。<code>printf()</code>=打印。<code>\\n</code>=换行。<code>return 0;</code>=正常结束。'},
{ph:'入门：认识C语言',tg:'语法',df:'⭐',ti:'转义字符',de:'理解\\n换行、\\t跳格对齐、\\\\反斜杠。每个printf不会自动换行，不加\\n全粘在一起。',tp:'#include <stdio.h>\n\nint main(){\n  printf("第一行\\n第二行\\n");\n  printf("列1\\t列2\\t列3\\n");\n  printf("反斜杠: \\\\ \\n");\n  return 0;\n}',ex:'第一行\n第二行\n列1\t列2\t列3\n反斜杠: \\ \n',kn:'<code>\\n</code>=换行（打完一行，光标移到下一行开头）。<br><code>\\t</code>=跳格（像按Tab键，跳到下一个对齐位置，做表格对齐用）。<br><code>\\\\</code>=打一个反斜杠。 <code>\\"</code>=打一个双引号。 <code>%%</code>=打一个百分号。'},
{ph:'变量与数据类型',tg:'语法',df:'⭐',ti:'整数变量',de:'声明int age=20，用printf输出。%d是占位符。',tp:'#include <stdio.h>\n\nint main(){\n  int age=20;\n  printf("年龄: %d\\n",age);\n  return 0;\n}',ex:'年龄: 20\n',kn:'<code>int age=20;</code>="拿int盒子贴标签age放20"。printf中<b>%d</b>是洞，age的值填进去。'},
{ph:'变量与数据类型',tg:'语法',df:'⭐',ti:'浮点与字符',de:'float price=9.99; char grade=\'A\'; 注意不同占位符。',tp:'#include <stdio.h>\n\nint main(){\n  float price=9.99;\n  char grade=\'A\';\n  printf("价格: %.2f\\n",price);\n  printf("等级: %c\\n",grade);\n  return 0;\n}',ex:'价格: 9.99\n等级: A\n',kn:'<code>float</code>小数%f、<code>double</code>双精度%lf、<code>char</code>单个字符%c。%.2f=2位小数。字符用<b>单引号</b>。'},
{ph:'变量与数据类型',tg:'语法',df:'⭐',ti:'类型转换',de:'整数除法的截断特性：5/2=2不是2.5。强制转换：(float)a/b。',tp:'#include <stdio.h>\n\nint main(){\n  int a=5,b=2;\n  printf("整数除: %d\\n",a/b);\n  printf("浮点除: %.1f\\n",(float)a/b);\n  return 0;\n}',ex:'整数除: 2\n浮点除: 2.5\n',kn:'<span class="tag warn">陷阱</span> C中整数/整数=整数(小数部分丢弃)。强制转换<code>(float)a/b</code>或写<code>5.0/2</code>。'},
{ph:'输入输出',tg:'语法',df:'⭐',ti:'scanf读整数',de:'读入两个整数并求和。理解为什么整数要加&。',tp:'#include <stdio.h>\n\nint main(){\n  int a,b;\n  scanf("%d %d",&a,&b);\n  printf("%d + %d = %d\\n",a,b,a+b);\n  return 0;\n}',ex:'3 + 5 = 8\n',si:'3 5',kn:'<code>scanf</code>整数<b>必须加&</b>——scanf要知道"数据存到哪个地址"。printf只需"看数据"→不要地址。'},
{ph:'输入输出',tg:'语法',df:'⭐',ti:'scanf读字符串',de:'读入名字并打招呼。字符串不需要&——数组名即地址。',tp:'#include <stdio.h>\n\nint main(){\n  char name[100];\n  scanf("%s",name);\n  printf("你好, %s!\\n",name);\n  return 0;\n}',ex:'你好, Tom!\n',si:'Tom',kn:'字符串scanf<b>不加&</b>——数组名本身就是地址。<span class="tag warn">scanf遇空格停止</span>。'},
{ph:'运算符',tg:'语法',df:'⭐',ti:'算术与赋值',de:'掌握+ - * / %和复合赋值+= -= *=。',tp:'#include <stdio.h>\n\nint main(){\n  int x=10;\n  x+=5; printf("x+=5: %d\\n",x);\n  x-=3; printf("x-=3: %d\\n",x);\n  x*=2; printf("x*=2: %d\\n",x);\n  x/=4; printf("x/=4: %d\\n",x);\n  x%=3; printf("x%%=3: %d\\n",x);\n  return 0;\n}',ex:'x+=5: 15\nx-=3: 12\nx*=2: 24\nx/=4: 6\nx%=3: 0\n',kn:'<code>+= -= *= /= %=</code>是简写。<code>x+=5</code>即<code>x=x+5</code>。'},
{ph:'运算符',tg:'语法',df:'⭐',ti:'自增自减',de:'理解++i(先加后用)和i++(先用后加)的区别。',tp:'#include <stdio.h>\n\nint main(){\n  int i=5;\n  printf("i++: %d\\n",i++);\n  printf("现在i: %d\\n",i);\n  i=5;\n  printf("++i: %d\\n",++i);\n  printf("现在i: %d\\n",i);\n  return 0;\n}',ex:'i++: 5\n现在i: 6\n++i: 6\n现在i: 6\n',kn:'<code>i++</code>=先用i再+1。<code>++i</code>=先+1再用。<span class="tag warn">陷阱</span>：<code>a[i++]=i</code>的结果取决于编译器。'},
{ph:'条件判断',tg:'语法',df:'⭐',ti:'if-else判断奇偶',de:'读入整数，偶数→偶数，奇数→奇数。',tp:'#include <stdio.h>\n\nint main(){\n  int n;\n  scanf("%d",&n);\n  // === 在这里写你的代码 ===\n  return 0;\n}',ex:'偶数\n',si:'8',kn:'<code>if(n%2==0)printf("偶数");else printf("奇数");</code><br><span class="tag warn">头号陷阱</span><code>=</code>赋值vs<code>==</code>比较！'},
{ph:'条件判断',tg:'语法',df:'⭐',ti:'if-else if成绩等级',de:'≥90→A,80-89→B,70-79→C,60-69→D,<60→F。',tp:'#include <stdio.h>\n\nint main(){\n  int s;\n  scanf("%d",&s);\n  // === 在这里写你的代码 ===\n  return 0;\n}',ex:'B\n',si:'85',kn:'多分支：<code>if(s>=90)...else if(s>=80)...else printf("F")</code>。必须从高到低写。'},
{ph:'条件判断',tg:'语法',df:'⭐⭐',ti:'switch语句',de:'输入1-7输出星期几。switch比多个if更清晰。',tp:'#include <stdio.h>\n\nint main(){\n  int day;\n  scanf("%d",&day);\n  // === 在这里写你的代码 ===\n  return 0;\n}',ex:'Wednesday\n',si:'3',kn:'<code>switch(变量){case 值: ...; break;}</code>。<b>必须有break！</b>否则穿透到下一个case。'},
{ph:'循环',tg:'语法',df:'⭐',ti:'for循环：1到N求和',de:'计算1+2+...+N。for(起点;终点;步长)。',tp:'#include <stdio.h>\n\nint main(){\n  int N,sum=0;\n  scanf("%d",&N);\n  // === 在这里写你的代码 ===\n  printf("%d\\n",sum);\n  return 0;\n}',ex:'5050\n',si:'100',kn:'<code>for(int i=1;i<=N;i++)sum+=i;</code>。<code>i++</code>=i+1。<code>sum+=i</code>=sum+i。'},
{ph:'循环',tg:'语法',df:'⭐',ti:'while循环',de:'用while同样求和。对比for和while的区别。',tp:'#include <stdio.h>\n\nint main(){\n  int N,sum=0,i=1;\n  scanf("%d",&N);\n  // === 在这里写你的代码 ===\n  printf("%d\\n",sum);\n  return 0;\n}',ex:'5050\n',si:'100',kn:'<code>while(i<=N){sum+=i;i++;}</code>。<b>必须改变条件变量</b>→否则死循环。知道次数→for；不知道→while。'},
{ph:'循环',tg:'语法',df:'⭐⭐',ti:'嵌套循环：乘法表',de:'打印下三角乘法表。外层=行，内层=列。',tp:'#include <stdio.h>\n\nint main(){\n  int N;\n  scanf("%d",&N);\n  // === 在这里写你的代码 ===\n  return 0;\n}',ex:'1x1=1 \n1x2=2 2x2=4 \n1x3=3 2x3=6 3x3=9 \n',si:'3',kn:'外层i从1到N(行)，内层j从1到i(列)。每行结束<code>printf("\\n")</code>。'},
{ph:'循环',tg:'语法',df:'⭐',ti:'break和continue',de:'break退出整个循环，continue跳过本轮。',tp:'#include <stdio.h>\n\nint main(){\n  for(int i=1;i<=10;i++){\n    if(i==5)break;\n    printf("%d ",i);\n  }\n  printf("| ");\n  for(int i=1;i<=10;i++){\n    if(i%2==0)continue;\n    printf("%d ",i);\n  }\n  return 0;\n}',ex:'1 2 3 4 | 1 3 5 7 9 ',kn:'<code>break</code>=跳出整个循环。<code>continue</code>=跳过本轮，继续下一轮。'},
{ph:'数组',tg:'语法',df:'⭐⭐',ti:'一维数组基础',de:'创建数组，遍历打印。下标从0开始！',tp:'#include <stdio.h>\n\nint main(){\n  int a[5]={10,20,30,40,50};\n  for(int i=0;i<5;i++)printf("%d ",a[i]);\n  printf("\\n");return 0;\n}',ex:'10 20 30 40 50 \n',kn:'<code>int a[5]</code>=5个int连一排。<b>下标从0开始</b>。a[0]第1个,a[4]第5个。<span class="tag warn">越界不报错！</span>'},
{ph:'数组',tg:'语法',df:'⭐⭐',ti:'找最大最小值',de:'遍历数组，同时找出最大值和最小值。',tp:'#include <stdio.h>\n\nint main(){\n  int N;scanf("%d",&N);int a[N];\n  for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // === 在这里写你的代码 ===\n  printf("Max=%d Min=%d\\n",max,min);\n  return 0;\n}',ex:'Max=9 Min=2\n',si:'5\n3 7 9 2 6',kn:'设max=min=a[0]，遍历i=1到N-1，遇到更大的更新max，更小的更新min。'},
{ph:'数组',tg:'语法',df:'⭐⭐',ti:'二维数组',de:'3×3矩阵，计算所有元素之和。',tp:'#include <stdio.h>\n\nint main(){\n  int m[3][3],sum=0;\n  for(int i=0;i<3;i++)for(int j=0;j<3;j++)scanf("%d",&m[i][j]);\n  // === 在这里写你的代码 ===\n  printf("%d\\n",sum);\n  return 0;\n}',ex:'45\n',si:'1 2 3 4 5 6 7 8 9',kn:'<code>int m[3][4]</code>=3行4列。<b>行优先存储</b>。嵌套循环遍历：i行j列。'},
{ph:'数组',tg:'语法',df:'⭐⭐',ti:'冒泡排序',de:'读入N个数，按从小到大冒泡排序。408排序第一课。',tp:'#include <stdio.h>\n\nint main(){\n  int N;scanf("%d",&N);int a[N];\n  for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // === 在这里写你的代码 ===\n  for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;\n}',ex:'1 2 3 5 7 \n',si:'5\n5 2 7 1 3',kn:'双层循环：<code>for(i=0;i<N-1;i++)for(j=0;j<N-1-i;j++)if(a[j]>a[j+1])swap;</code>。O(n²)稳定。'},
{ph:'函数',tg:'核心',df:'⭐⭐',ti:'自定义函数',de:'写int add(int a,int b)返回a+b。main中调用。',tp:'#include <stdio.h>\n\n// === 在这里写add函数 ===\n\nint main(){\n  int x,y;scanf("%d%d",&x,&y);\n  printf("%d\\n",add(x,y));\n  return 0;\n}',ex:'8\n',si:'3 5',kn:'<code>返回类型 函数名(参数){函数体;return 值;}</code>。定义在main前(先声明再调用)。'},
{ph:'函数',tg:'核心',df:'⭐⭐',ti:'值传递实验',de:'函数改参数，观察main里的变量变不变。理解为什么不变。',tp:'#include <stdio.h>\n\nvoid change(int x){x=100;}\n\nint main(){\n  int a=10;\n  change(a);\n  printf("a=%d\\n",a);\n  return 0;\n}',ex:'a=10\n',kn:'C<b>永远按值传递</b>——函数收到的是复印件。改复印件不影响原件。要改原件→传地址(指针)。'},
{ph:'函数',tg:'核心',df:'⭐⭐',ti:'判断素数',de:'写函数int isPrime(int n)判断n是否为素数。',tp:'#include <stdio.h>\n\n// === 写isPrime函数 ===\n\nint main(){\n  int n;scanf("%d",&n);\n  printf(isPrime(n)?"素数\\n":"不是素数\\n");\n  return 0;\n}',ex:'素数\n',si:'17',kn:'素数=只能被1和自身整除。检查2到√n之间是否有因数。'},
{ph:'指针',tg:'核心',df:'⭐⭐⭐',ti:'指针初探：&和*',de:'int x=42; 用指针指向x，通过指针把x改成100。C最核心概念。',tp:'#include <stdio.h>\n\nint main(){\n  int x=42;\n  // === 在这里写你的代码 ===\n  printf("%d\\n",x);\n  return 0;\n}',ex:'100\n',kn:'<code>int *p=&x;</code>→p纸条写x地址。<code>*p=100;</code>→按地址改x。&="门牌号"。*="去这个地址"。'},
{ph:'指针',tg:'核心',df:'⭐⭐⭐',ti:'swap：地址传递',de:'写swap交换两数。408必考：为什么传指针才能改原变量。',tp:'#include <stdio.h>\n\n// === 在这里写swap函数 ===\n\nint main(){\n  int x=3,y=5;\n  swap(&x,&y);\n  printf("%d %d\\n",x,y);\n  return 0;\n}',ex:'5 3\n',kn:'<code>void swap(int*a,int*b){int t=*a;*a=*b;*b=t;}</code>。传&→能改原件。<span class="tag exam">408必考</span>。'},
{ph:'指针',tg:'核心',df:'⭐⭐',ti:'指针与数组',de:'理解a[i]==*(a+i)。用指针方式遍历数组。',tp:'#include <stdio.h>\n\nint main(){\n  int a[]={10,20,30,40,50};\n  int *p=a;\n  for(int i=0;i<5;i++)printf("%d ",*(p+i));\n  printf("\\n");return 0;\n}',ex:'10 20 30 40 50 \n',kn:'<code>a[i]</code>≡<code>*(a+i)</code>——编译器内部就这么翻译。数组名=指针常量。p可以p++。'},
{ph:'指针',tg:'核心',df:'⭐⭐⭐',ti:'双指针',de:'理解int **q——指向指针的指针。',tp:'#include <stdio.h>\n\nint main(){\n  int x=42,*p=&x,**q=&p;\n  printf("x=%d *p=%d **q=%d\\n",x,*p,**q);\n  return 0;\n}',ex:'x=42 *p=42 **q=42\n',kn:'<code>int **q</code>=q是指向指针的指针。**q→解引用两次→到x。用于二维数组动态分配、修改指针本身。'},
{ph:'递归',tg:'核心',df:'⭐⭐',ti:'阶乘(n!)',de:'写int fact(int n)递归求n!。递归是树遍历和DFS的基础。',tp:'#include <stdio.h>\n\n// === 在这里写fact递归函数 ===\n\nint main(){\n  int n;scanf("%d",&n);\n  printf("%d\\n",fact(n));\n  return 0;\n}',ex:'120\n',si:'5',kn:'<code>if(n<=1)return 1;return n*fact(n-1);</code>。基准条件+递归体。递归太深→栈溢出。'},
{ph:'递归',tg:'核心',df:'⭐⭐',ti:'斐波那契数列',de:'递归输出前n项斐波那契数列。F(0)=0,F(1)=1,F(n)=F(n-1)+F(n-2)。',tp:'#include <stdio.h>\n\n// === 写fib函数 ===\n\nint main(){\n  int n;scanf("%d",&n);\n  for(int i=0;i<=n;i++)printf("%d ",fib(i));\n  printf("\\n");return 0;\n}',ex:'0 1 1 2 3 5 \n',si:'5',kn:'经典双分支递归。时间O(2ⁿ)→引出<b>动态规划</b>优化到O(n)。'},
{ph:'字符串',tg:'核心',df:'⭐⭐',ti:'字符串长度',de:'不用strlen，自己写循环计算字符串长度(不包含\\0)。',tp:'#include <stdio.h>\n\nint main(){\n  char s[200];scanf("%s",s);\n  // === 在这里写你的代码 ===\n  printf("%d\\n",len);\n  return 0;\n}',ex:'5\n',si:'hello',kn:'C字符串=以<code>\\0</code>结尾的char数组。遍历直到遇到\\0即可得到长度。'},
{ph:'字符串',tg:'核心',df:'⭐⭐',ti:'字符串比较',de:'不用strcmp，自己写函数比较两个字符串是否相等。',tp:'#include <stdio.h>\n\nint myStrcmp(char*a,char*b){\n  // === 在这里写 ===\n}\n\nint main(){\n  char s1[100],s2[100];scanf("%s%s",s1,s2);\n  printf(myStrcmp(s1,s2)?"相同\\n":"不同\\n");\n  return 0;\n}',ex:'相同\n',si:'abc abc',kn:'逐个字符比较，都相等且同时到达\\0→相等。任一不同或长度不同→不等。'},
{ph:'结构体',tg:'核心',df:'⭐⭐',ti:'struct定义',de:'定义Student结构体(姓名+分数)。链表节点的基础。',tp:'#include <stdio.h>\n\n// === 在这里定义struct Student ===\n\nint main(){\n  struct Student s={"Tom",95};\n  printf("%s: %d\\n",s.name,s.score);\n  return 0;\n}',ex:'Tom: 95\n',kn:'<code>struct Student{char name[20];int score;};</code>。<code>.</code>访问成员。<code>typedef</code>简化。'},
{ph:'结构体',tg:'核心',df:'⭐⭐',ti:'结构体数组',de:'创建3个学生的结构体数组，找出最高分的学生。',tp:'#include <stdio.h>\n\ntypedef struct{char name[20];int score;}Stu;\n\nint main(){\n  Stu ss[3];\n  for(int i=0;i<3;i++)scanf("%s%d",ss[i].name,&ss[i].score);\n  // === 在这里写你的代码 ===\n  printf("%s\\n",best.name);\n  return 0;\n}',ex:'Bob\n',si:'Alice 85\nBob 92\nTom 78',kn:'结构体数组=<code>Stu ss[10];</code>。遍历数组比较ss[i].score。'},
{ph:'结构体',tg:'核心',df:'⭐⭐⭐',ti:'typedef + 链表节点',de:'用typedef定义链表节点Node。408所有链表题的基础模板。',tp:'#include <stdio.h>\n#include <stdlib.h>\n\n// === 用typedef定义Node ===\n\nint main(){\n  Node *p=(Node*)malloc(sizeof(Node));\n  p->data=42;p->next=NULL;\n  printf("%d\\n",p->data);free(p);\n  return 0;\n}',ex:'42\n',kn:'<pre>typedef struct Node{int data;struct Node *next;}Node;</pre>自引用结构体=链表/树/图的基础。<span class="tag exam">408必会</span>。'},
{ph:'动态内存',tg:'核心',df:'⭐⭐⭐',ti:'malloc/free',de:'动态分配数组求平均值，用完free。408代码题必考。',tp:'#include <stdio.h>\n#include <stdlib.h>\n\nint main(){\n  int N,sum=0;scanf("%d",&N);\n  // === 在这里写你的代码 ===\n  printf("平均=%.2f\\n",(double)sum/N);\n  return 0;\n}',ex:'平均=3.00\n',si:'5\n1 2 3 4 5',kn:'<code>int*a=(int*)malloc(N*sizeof(int));</code>→用→<code>free(a);</code>。<span class="tag warn">忘free=内存泄漏</span>。'},
{ph:'动态内存',tg:'核心',df:'⭐⭐',ti:'calloc和realloc',de:'calloc分配+清零；realloc扩容。了解它们的使用场景。',tp:'#include <stdio.h>\n#include <stdlib.h>\n\nint main(){\n  int *a=(int*)calloc(5,sizeof(int));\n  for(int i=0;i<5;i++)printf("%d ",a[i]);\n  printf("| ");\n  a=(int*)realloc(a,8*sizeof(int));\n  printf("扩容到8\\n");free(a);\n  return 0;\n}',ex:'0 0 0 0 0 | 扩容到8\n',kn:'<code>calloc</code>=malloc+清零。<code>realloc</code>=调整已分配内存大小，可能移动位置。'},
{ph:'文件操作',tg:'核心',df:'⭐⭐',ti:'文件读写',de:'把数据写入文件再读出来。fprintf/fscanf。',tp:'#include <stdio.h>\n\nint main(){\n  FILE *f=fopen("data.txt","w");\n  fprintf(f,"Hello File!\\n");\n  fclose(f);\n  printf("写入完成\\n");\n  return 0;\n}',ex:'写入完成\n',kn:'<code>fopen("a.txt","w")</code>→写 "r"→读 "a"→追加。<code>fclose</code>必须关。<span class="tag warn">fopen可能返回NULL</span>。'},
{ph:'文件操作',tg:'核心',df:'⭐⭐',ti:'读取文件内容',de:'打开文件读取所有数字并求和。',tp:'#include <stdio.h>\n\nint main(){\n  FILE *f=fopen("nums.txt","r");\n  if(!f){printf("文件不存在\\n");return 0;}\n  // === 在这里写你的代码 ===\n  fclose(f);\n  printf("Sum=%d\\n",sum);\n  return 0;\n}',ex:'Sum=60\n',kn:'<code>while(fscanf(f,"%d",&x)!=EOF)</code>逐行读取直到文件末尾。'},
{ph:'预处理器',tg:'进阶',df:'⭐⭐',ti:'宏定义 #define',de:'用#define定义常量和宏函数。',tp:'#include <stdio.h>\n#define PI 3.14159\n#define SQR(x) ((x)*(x))\n\nint main(){\n  printf("%.5f\\n",PI);\n  printf("%d\\n",SQR(5));\n  return 0;\n}',ex:'3.14159\n25\n',kn:'<code>#define PI 3.14</code>=编译前文本替换。<code>#define SQR(x) ((x)*(x))</code>注意括号。<span class="tag warn">宏只是文本替换</span>。'},
{ph:'预处理器',tg:'进阶',df:'⭐⭐',ti:'条件编译',de:'#ifdef/#else/#endif控制哪些代码参与编译。',tp:'#include <stdio.h>\n#define DEBUG\n\nint main(){\n#ifdef DEBUG\n  printf("调试模式\\n");\n#else\n  printf("发布模式\\n");\n#endif\n  return 0;\n}',ex:'调试模式\n',kn:'<code>#ifdef</code>=如果定义了某个宏。<code>#ifndef</code>=如果没定义。用于调试/跨平台。'},
{ph:'位运算',tg:'进阶',df:'⭐⭐',ti:'位运算符',de:'理解& | ^ ~ << >> 位运算符。',tp:'#include <stdio.h>\n\nint main(){\n  int a=5,b=3;\n  printf("5&3=%d\\n",a&b);\n  printf("5|3=%d\\n",a|b);\n  printf("5^3=%d\\n",a^b);\n  printf("~5=%d\\n",~a);\n  printf("5<<1=%d\\n",a<<1);\n  printf("5>>1=%d\\n",a>>1);\n  return 0;\n}',ex:'5&3=1\n5|3=7\n5^3=6\n~5=-6\n5<<1=10\n5>>1=2\n',kn:'<code>&</code>位与 <code>|</code>位或 <code>^</code>异或 <code>~</code>取反 <code><<</code>左移 <code>>></code>右移。<code>n<<1</code>=n×2。<code>n>>1</code>=n/2。'},
{ph:'综合练习',tg:'综合',df:'⭐⭐⭐',ti:'回文判断',de:'判断字符串是否回文。双指针一头一尾向中间走。',tp:'#include <stdio.h>\n#include <string.h>\n\nint main(){\n  char s[200];scanf("%s",s);\n  int len=strlen(s);\n  // === 在这里写你的代码 ===\n  return 0;\n}',ex:'是回文\n',si:'radar',kn:'<code>for(i=0,j=len-1;i<j;i++,j--)</code>。s[i]!=s[j]→不是回文。'},
{ph:'综合练习',tg:'综合',df:'⭐⭐⭐',ti:'选择排序',de:'实现选择排序：每次找未排序部分的最小值，交换到前面。',tp:'#include <stdio.h>\n\nint main(){\n  int N;scanf("%d",&N);int a[N];\n  for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // === 在这里写你的代码 ===\n  for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;\n}',ex:'1 2 3 5 7 \n',si:'5\n5 2 7 1 3',kn:'<code>for(i=0;i<N-1;i++){minIdx=i;for(j=i+1;j<N;j++)...swap;}</code>。O(n²)不稳定。'},
{ph:'综合练习',tg:'综合',df:'⭐⭐⭐',ti:'二分查找',de:'在升序数组中二分查找目标值。返回下标或-1。',tp:'#include <stdio.h>\n\nint main(){\n  int N,t;scanf("%d%d",&N,&t);int a[N];\n  for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // === 在这里写你的代码 ===\n  return 0;\n}',ex:'3\n',si:'6 5\n1 3 5 7 9 11',kn:'<code>while(l<=r){int m=(l+r)/2;if(a[m]==t)return m;...}</code>。O(logn)。必须有序。'},{ph:'🧩裸写挑战(无模板)',tg:'综合',df:'⭐⭐⭐',ti:'🧩温度转换',de:'输入华氏温度F，输出摄氏温度C。公式：C=5*(F-32)/9。输出保留1位小数。',tp:'#include <stdio.h>\n\nint main(){\n  // 从零写出完整程序\n  return 0;\n}',ex:'37.0\n',si:'98.6',kn:'裸写=不看任何模板，从零写出完整程序。先想需要什么变量→再想输入/输出格式→写出代码。'},{ph:'🧩裸写挑战(无模板)',tg:'综合',df:'⭐⭐⭐',ti:'🧩简单计算器',de:'输入两个整数和一个运算符(+ - * /)，输出计算结果。除法保留1位小数。',tp:'#include <stdio.h>\n\nint main(){\n  // 从零写出完整程序\n  return 0;\n}',ex:'8.0\n',si:'12 4 /',kn:'用switch或if判断运算符→分别处理。除法注意用float避免整数截断。'},{ph:'🧩裸写挑战(无模板)',tg:'综合',df:'⭐⭐⭐',ti:'🧩统计字符',de:'输入一行字符串(含空格，用fgets)，统计其中字母、数字、空格的个数。',tp:'#include <stdio.h>\n#include <string.h>\n\nint main(){\n  // 从零写出完整程序\n  return 0;\n}',ex:'字母:5 数字:3 空格:2\n',si:'Hello 123 World',kn:'用fgets读整行→遍历每个字符→isalpha/isdigit判断类型。'},{ph:'🧩裸写挑战(无模板)',tg:'综合',df:'⭐⭐⭐',ti:'🧩杨辉三角',de:'输入行数N，打印杨辉三角形的前N行。每行数字空格隔开。',tp:'#include <stdio.h>\n\nint main(){\n  // 从零写出完整程序\n  return 0;\n}',ex:'1 \n1 1 \n1 2 1 \n1 3 3 1 \n',si:'4',kn:'二维数组a[i][j]=a[i-1][j-1]+a[i-1][j]。两边是1。'},{ph:'🧩裸写挑战(无模板)',tg:'综合',df:'⭐⭐⭐',ti:'🧩单词计数',de:'输入一个英文句子(用fgets)，统计有多少个单词(空格分隔)。',tp:'#include <stdio.h>\n#include <string.h>\n\nint main(){\n  // 从零写出完整程序\n  return 0;\n}',ex:'4\n',si:'Hello World from C',kn:'遍历字符→遇到空格则单词数+1。注意多个连续空格的处理。'},{ph:'💡报错教学',tg:'语法',df:'⭐⭐',ti:'💡常见报错:缺少分号',de:'下面代码少了一个分号，编译看看报什么错，然后修好它。',tp:'#include <stdio.h>\n\nint main(){\n  printf("Hello World!")\n  return 0;\n}',ex:'Hello World!\n',kn:'编译器报"expected ; before..."→缺分号。C每条语句必须以;结尾。找到缺少的位置加上。'},{ph:'💡报错教学',tg:'语法',df:'⭐⭐',ti:'💡常见报错:scanf忘写&',de:'下面代码scanf少写了&，编译运行看看什么现象，然后修好。',tp:'#include <stdio.h>\n\nint main(){\n  int a;\n  scanf("%d",a);\n  printf("%d\\n",a);\n  return 0;\n}',ex:'42\n',si:'42',kn:'scanf忘写&→读取的值存到了随机地址→可能SegFault或读到乱值。给a加上&即可。'},{ph:'💡报错教学',tg:'入门',df:'⭐⭐',ti:'💡常见报错:printf参数不匹配',de:'下面代码printf的%和参数不对应，编译运行看看什么效果。',tp:'#include <stdio.h>\n\nint main(){\n  int a=10;float b=3.14;\n  printf("a=%f b=%d\\n",a,b);\n  return 0;\n}',ex:'a=10.000000 b=3\n',kn:'%f对应float，%d对应int。写反了→a的int被当作float解释→输出奇怪的值。类型和%必须一一对应。'},{ph:'🏆LeetCode风格',tg:'综合',df:'⭐⭐⭐',ti:'🏆两数之和',de:'找两个数和=target输出下标。',tp:'#include <stdio.h>\nint main(){int N,t;scanf("%d%d",&N,&t);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // 双重循环找\n  return 0;}',ex:'0 1\n',si:'4 9\n2 7 11 15',kn:'暴力O(n^2)双重循环。优化:哈希O(n)。'},{ph:'🏆LeetCode风格',tg:'综合',df:'⭐⭐',ti:'🏆删除重复项',de:'升序去重输出新长度和数组。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // 双指针去重\n  return 0;}',ex:'2\n1 2 \n',si:'3\n1 1 2',kn:'i遍历j指向去重位。a[i]!=a[i-1]时a[j++]=a[i]。'},{ph:'🏆LeetCode风格',tg:'综合',df:'⭐⭐',ti:'🏆合并有序数组',de:'两升序合并输出。',tp:'#include <stdio.h>\nint main(){int n,m;scanf("%d%d",&n,&m);int a[n],b[m];for(int i=0;i<n;i++)scanf("%d",&a[i]);for(int i=0;i<m;i++)scanf("%d",&b[i]);\n  // 双指针合并\n  return 0;}',ex:'1 2 2 3 5 6 \n',si:'3 3\n1 2 5\n2 3 6',kn:'双指针比较放入结果,剩余追加。'},{ph:'🏆LeetCode风格',tg:'综合',df:'⭐⭐',ti:'🏆有效括号',de:'判断()[]{}是否合法。',tp:'#include <stdio.h>\n#include <string.h>\nint main(){char s[200];scanf("%s",s);\n  // 栈匹配\n  return 0;}',ex:'YES\n',si:'()[]{}',kn:'左入栈右匹配栈顶,栈空=有效。'},{ph:'🏆LeetCode风格',tg:'综合',df:'⭐⭐',ti:'🏆最大连续和',de:'连续子数组最大和Kadane。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // Kadane\n  return 0;}',ex:'6\n',si:'9\n-2 1 -3 4 -1 2 1 -5 4',kn:'cur=max(a[i],cur+a[i]);ans=max(ans,cur)。'},{ph:'🏆LeetCode风格',tg:'综合',df:'⭐⭐',ti:'🏆移动零',de:'0移末尾保持非零顺序。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);\n  // 双指针移零\n  return 0;}',ex:'1 3 12 0 0 \n',si:'5\n0 1 0 3 12',kn:'j指向非零位,遇非零a[j++]=a[i],末尾补零。'},

function makeBlank(tp){var lines=tp.split('\n');var out=[],blanked=0;for(var i=0;i<lines.length;i++){var L=lines[i].trim();var isFuncDef=((L.indexOf('void ')==0||L.indexOf('int ')==0||L.indexOf('float ')==0||L.indexOf('double ')==0||L.indexOf('char ')==0)&&L.indexOf('){')>-1&&L.indexOf('main')==-1)||((L.indexOf('struct ')==0||L.indexOf('typedef ')==0)&&L.indexOf('{')>-1);var isLogic=(L.indexOf('printf(')>-1&&L.indexOf('"')>-1)||L.indexOf('if(')>-1||L.indexOf('if (')>-1||L.indexOf('else ')===0||L.indexOf('else{')>-1||L.indexOf('for(')>-1||L.indexOf('for (')>-1||L.indexOf('while(')>-1||L.indexOf('while (')>-1||(L.indexOf('return ')>-1&&L.indexOf('return 0')==-1&&L.indexOf('return;')==-1&&L.indexOf('return -1')==-1);var isKey=isFuncDef||isLogic;if(isKey&&blanked===0){out.push('  // === 在这里写你的代码 ===');blanked=1;}if(!isKey)out.push(lines[i]);}if(blanked===0){out.splice(Math.floor(out.length/2),0,'  // === 在这里写你的代码 ===');}return out.join('\n');}

function autoTips(tg,ti){var map={语法:{steps:'<b>①</b>看清楚题目要输出什么格式→<b>②</b>想清楚用什么变量→<b>③</b>写printf/scanf→<b>④</b>点运行验证',traps:'忘了给scanf加& · printf的%个数和变量对不上 · 字符串用了单引号而不是双引号'},指针:{steps:'<b>①</b>画图：变量在哪个地址，指针指向谁→<b>②</b>分清&（取地址）和*（解引用）→<b>③</b>想清楚传值还是传址',traps:'野指针(未初始化就解引用) · 忘了给scanf加& · *p和p分不清 · swap函数忘了用*取值'},循环:{steps:'<b>①</b>确定循环从几到几→<b>②</b>每次循环做什么→<b>③</b>检查条件是否正确（小心多一次或少一次）',traps:'while忘写更新条件→死循环 · 循环次数差1 · i++和++i用混 · 嵌套时内外循环变量写反'},数组:{steps:'<b>①</b>确认数组大小→<b>②</b>下标从0开始，最后一个下标N-1→<b>③</b>用for循环遍历每个元素',traps:'下标越界(访问a[N])→不报错但数据错乱 · 数组做参数时传的是地址'},函数:{steps:'<b>①</b>函数定义写在调用前面→<b>②</b>想清楚参数类型和返回值类型→<b>③</b>分清值传递(改不了)和地址传递(能改)',traps:'返回值类型写错 · 忘了return · 写了return但没接收返回值'},递归:{steps:'<b>①</b>确定基准条件(何时停)→<b>②</b>确定递归体(怎么缩小问题)→<b>③</b>手动画一画n=1,2,3的执行过程',traps:'忘了写基准条件→无限递归→栈溢出 · 递归太深→stack overflow'},结构体:{steps:'<b>①</b>用typedef定义struct→<b>②</b>声明变量→<b>③</b>用.或->访问成员',traps:'struct后面忘了分号 · ->和.用混(p->name=指针, s.name=普通变量)'},核心:{steps:'<b>①</b>理清概念→<b>②</b>模仿左边讲解的示例→<b>③</b>自己写→<b>④</b>运行对比期望输出',traps:'概念没搞懂就急着写代码 · 忽略编译器的错误提示'},入门:{steps:'<b>①</b>看懂左边讲解→<b>②</b>看期望输出长什么样→<b>③</b>写代码→<b>④</b>点运行看对不对',traps:'printf格式串和参数不匹配 · 忘了写\\n → 输出粘在一起'},综合:{steps:'<b>①</b>先把问题分解成小步骤→<b>②</b>想每一步用什么数据结构/算法→<b>③</b>逐步实现并测试',traps:'一步写太多→出错了不知道哪一步的问题 · 忘了处理边界条件'},进阶:{steps:'<b>①</b>理解原理→<b>②</b>看示例代码→<b>③</b>自己改写测试→<b>④</b>运行验证',traps:'盲目复制代码不理解 · 修改后不测试'}};var m=map[tg]||map['核心'];if(ti.indexOf('排序')>-1){m={steps:'<b>①</b>双层循环：外层控制趟数→<b>②</b>内层比较相邻元素→<b>③</b>交换(如果逆序)',traps:'循环边界写错(多一次少一次) · 交换时忘了临时变量 · 内层循环范围没缩小'};}if(ti.indexOf('二分')>-1){m={steps:'<b>①</b>确认数组已排序→<b>②</b>while(l<=r)→<b>③</b>mid=(l+r)/2比较→缩小一半',traps:'循环条件写成l<r(会漏最后一个) · mid溢出(用l+(r-l)/2) · 数组未排序就二分'};}return m;}
function wikiFor(tg,ti){var W={入门:'<p><code>#include &lt;stdio.h&gt;</code> = 引入<b>标准输入输出库</b>（standard input output）。C语言自带很多库，stdio.h是最常用的一个。</p><p><code>int main()</code> = <b>主函数</b>，程序的入口点。每个C程序必须有且只有一个main函数。int表示返回整数值给操作系统。</p><p><code>printf()</code> = 格式化输出函数。<code>return 0;</code>表示程序正常结束。</p><p><b>编译过程</b>：源代码(.c)→预处理器→编译器→汇编器→链接器→可执行文件(.exe)。gcc一条命令完成全部。</p>',语法:'<p><b>C语言的数据类型</b>：基本类型包括<code>int</code>(整数,4字节)、<code>float</code>(单精度浮点,4字节)、<code>double</code>(双精度浮点,8字节)、<code>char</code>(字符,1字节)。</p><p><b>变量命名规则</b>：字母/下划线开头，区分大小写，不能用关键字(如int/if/for)。</p><p><b>printf格式控制</b>：%d整数 %f浮点 %c字符 %s字符串 %p指针地址 %x十六进制 %o八进制。%5d=占5格右对齐，%-5d=左对齐，%.2f=保留2位小数。</p><p><b>运算符优先级</b>（从高到低）：() > ! ~ ++ -- > * / % > + - > <<= >>= > == != > && > || > =（赋值最低）</p>',指针:'<p><b>指针</b>=存内存地址的变量。32位系统占4字节，64位占8字节。</p><p><b>&（取地址运算符）</b>：返回变量的内存地址。<b>*（解引用运算符）</b>：访问指针指向地址的内容。<code>&</code>和<code>*</code>互为逆运算：<code>*&x == x</code>。</p><p><b>指针类型的作用</b>：①决定解引用时读几个字节（<code>int*</code>读4字节、<code>char*</code>读1字节）②决定指针算术的步长（<code>p++</code>时，int*跳4字节，char*跳1字节）。</p><p><b>C语言的参数传递永远是按值传递</b>。函数参数是实参的副本。要修改调用者的变量→传该变量的地址（指针）→通过解引用修改原值。</p><p><b>数组名 vs 指针</b>：数组名是<b>指针常量</b>（不可修改指向），sizeof(数组名)返回整个数组的大小。指针是变量（可修改指向），sizeof(指针)返回指针本身大小(4或8字节)。</p><p><b>野指针</b>=未初始化或已释放的指针。<b>空指针NULL</b>=值为0的指针(不指向任何有效内存)。解引用NULL→Segmentation Fault。</p>',循环:'<p><b>for循环三段式</b>：①初始化(执行1次)→②条件判断(每轮开始前)→③循环体→④更新表达式→回到②。任何一段都可以省略(但分号不能省)。</p><p><b>while vs do-while</b>：while先判断后执行(可能0次)，do-while先执行后判断(至少1次)。</p><p><b>break vs continue</b>：break=跳出整个循环(或switch)。continue=跳过本轮剩余代码，进入下一轮条件判断。</p><p><b>循环效率</b>：①循环体内避免重复计算不变的值 ②嵌套循环时，循环次数少的放外层 ③能用break提前退出的尽量用。</p>',数组:'<p><b>数组定义</b>：相同数据类型元素的集合，连续存储在内存中。<code>int a[10];</code>分配40字节(10×4)。</p><p><b>下标从0开始</b>，最后一个元素是a[N-1]。C语言<b>不检查数组越界</b>——访问a[10]不会报错，会读到/覆盖相邻内存→最隐蔽的bug。</p><p><b>数组名作为函数参数</b>时退化为指针→函数内对数组的修改会影响原数组。数组作为参数时通常还需要传递长度(因为退化为指针后无法获取长度)。</p><p><b>二维数组在内存中是行优先存储</b>：a[0][0],a[0][1],...,a[1][0],a[1][1],...。按行遍历比按列遍历快(缓存友好)。</p>',函数:'<p><b>函数三要素</b>：①函数名②参数列表(类型+形参名)③返回值类型。函数必须先声明/定义后调用（C99以前可隐式声明）。</p><p><b>函数原型(声明)</b>：<code>int add(int, int);</code>——只写类型不写形参名也可以。</p><p><b>局部变量</b>（函数内定义的变量）：存储在<b>栈</b>上。函数返回时自动释放。<b>静态局部变量(static)</b>：生命周期=整个程序运行期，只初始化一次。</p><p><b>全局变量</b>（函数外定义的变量）：存储在<b>静态存储区</b>。整个程序都能访问。能用局部就别用全局→降低耦合。</p>',递归:'<p><b>递归</b>=函数直接或间接调用自身。本质是<b>把大问题分解为相同结构的小问题</b>。</p><p><b>两个必要条件</b>：①<b>递归出口(基准条件)</b>——最小子问题直接求解 ②<b>递归体</b>——将问题转化为更小的同类问题。</p><p><b>递归的执行过程</b>：每次递归调用在<b>系统栈</b>上创建新的栈帧(存储返回地址、局部变量、参数)。递归返回时逐层弹出栈帧。</p><p><b>递归 vs 迭代</b>：递归代码简洁但<b>空间开销大</b>(栈帧)，可能栈溢出。迭代效率高但代码可能不直观。树的遍历/DFS用递归；简单重复用迭代。</p><p><b>尾递归</b>：递归调用是函数的最后一步→编译器可优化为迭代(消除栈开销)。</p>',结构体:'<p><b>struct</b>=将多个可能不同类型的数据组合成一个整体。是链表、树、图等数据结构的基础。</p><p><b>成员访问</b>：普通变量用<code>s.name</code>；指针用<code>p->name</code>（等价于<code>(*p).name</code>）。<b>-></b>是专门为结构体指针设计的。</p><p><b>typedef</b>给类型起别名：<code>typedef struct{...} Student;</code>之后直接用Student声明变量。</p><p><b>自引用结构体</b>：结构体内部包含指向自身类型的指针→构建链式数据结构的基础。<code>struct Node { int data; struct Node *next; };</code>。</p><p><b>内存对齐</b>：结构体大小≥各成员大小之和(编译器会填充空白字节使成员对齐)。可用<code>sizeof(struct X)</code>查看实际大小。</p>',核心:'<p><b>动态内存分配(malloc/calloc/realloc/free)</b>在堆上分配内存。<code>malloc(size)</code>返回void*→需强制转换。分配失败返回NULL。</p><p><b>内存泄漏</b>：malloc后没free→内存被占用无法回收→程序占内存越来越大。防止：malloc和free配对使用。</p><p><b>悬垂指针</b>：free后指针还指向已释放的内存→继续使用=未定义行为。防止：free后立即置NULL。</p><p><b>文件操作</b>：<code>fopen/fclose</code>打开/关闭。<code>fprintf/fscanf</code>格式化读写。<code>fgets/fputs</code>行读写。<code>fread/fwrite</code>二进制读写。fopen可能返回NULL→必须检查。</p>',进阶:'<p><b>#define宏</b>：预编译阶段进行文本替换。宏函数参数必须用括号保护：<code>#define SQR(x) ((x)*(x))</code>——缺括号可能导致运算优先级错误。</p><p><b>条件编译</b>：#ifdef/#ifndef/#else/#endif→调试/跨平台代码选择性编译。</p><p><b>位运算</b>：&(与)、|(或)、^(异或)、~(取反)、<<(左移=乘2)、>>(右移=除2)。常用于底层/嵌入式/算法优化。</p><p><b>排序算法</b>：冒泡O(n²)稳定；选择O(n²)不稳定；插入O(n²)稳定(最好O(n))；快排O(nlogn)不稳定；归并O(nlogn)稳定O(n)空间。</p>',综合:'<p><b>双指针技巧</b>：对撞指针(一头一尾向中间)、快慢指针(快走2步慢走1步)、滑动窗口(维护[L,R]区间)。</p><p><b>二分查找</b>前提：有序+可随机存取。while(l<=r)，mid=(l+r)/2。时间O(logn)。</p><p><b>常见坑总结</b>：①=和==混淆 ②数组越界 ③scanf忘& ④野指针 ⑤忘free ⑥整数除截断 ⑦字符串忘\\0 ⑧printf格式不匹配。</p>'};var m=W[tg]||W['语法'];if(ti.indexOf('排序')>-1)m=W['进阶'];if(ti.indexOf('二分')>-1)m=W['综合'];return m;}
function buildSidebar(){var done=g(K),h='',lp='';LC.forEach(function(l,i){if(l.ph!==lp){h+='<div class="ph">📌 '+l.ph+'</div>';lp=l.ph;}h+='<button class="lv'+(i===cur?' on':'')+(done[i]?' done':'')+'" onclick="go('+i+')"><span class="n">'+(i+1)+'</span>'+l.ti+'<span class="ck">✓</span></button>';});document.getElementById('sidebar-list').innerHTML=h;}
function go(i){cur=i;var l=LC[i];var ck='lv_c_'+i;var done=g(K);document.querySelectorAll('#sb button.lv').forEach(function(b,j){b.classList.toggle('on',j===i);b.classList.toggle('done',!!done[j]);});var ta=document.getElementById('code');ta.value=localStorage[ck]||l.tp;upLn();var left=document.getElementById('left');var kh='<div class="kb"><h4>📖 大白话讲解</h4>'+l.kn+'</div><div class="kb" style="border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.03)"><h4>📚 相关百科知识</h4>'+wikiFor(l.tg,l.ti)+'</div>';if(l.et)kh+='<div class="exm">🎯<b>真题链接</b>：'+l.et+'</div>';var io='<div class="iso">';if(l.si)io+='<div class="il">📥 样例输入</div><pre>'+esc(l.si)+'</pre>';io+='<div class="il">📤 期望输出</div><pre>'+esc(l.ex)+'</pre></div>';left.innerHTML='<h3 style="font-size:16px;margin-bottom:4px">关卡 '+(i+1)+': '+l.ti+'</h3><div style="font-size:16px;color:var(--m);margin-bottom:10px">'+l.ph+' · '+l.tg+'</div>'+kh+'<p style="font-size:16px;line-height:1.7;margin-bottom:10px">'+l.de+'</p>'+io;document.getElementById('out').textContent='— 点击▶运行 —';document.getElementById('out').style.color='var(--m)';document.getElementById('hint').style.display='none';}

async function run(){var l=LC[cur];var code=document.getElementById('code').value;localStorage['lv_c_'+cur]=code;var out=document.getElementById('out');out.textContent='⏳ 编译中...';out.style.color='#d2991d';try{var r=await fetch('https://wandbox.org/api/compile.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({compiler:'gcc-head',code:code,stdin:l.si||''})});var d=await r.json();var re='';var isErr=false;if(d.compiler_error){re+='编译错误:\n'+d.compiler_error+'\n';isErr=true;}if(d.program_error){re+=(re?'\n':'')+'运行错误:\n'+d.program_error+'\n';isErr=true;}if(d.program_output)re+=d.program_output;if(!re)re='(无输出)';out.textContent=re;out.style.color=isErr?'#f85149':'#3fb950';if(d.program_output&&l.ex&&d.program_output===l.ex&&!d.compiler_error){var done=g(K);done[cur]=true;s(K,done);var btns=document.querySelectorAll('#sb button.lv');for(var j=0;j<btns.length;j++)btns[j].classList.toggle('done',!!done[j]);var jj=g('cs_j');if(!jj[TODAY])jj[TODAY]='';s('cs_j',jj);toast('✅ 通关！');}}catch(e){out.style.color='var(--m)';out.textContent='在线编译器不可用(翻墙断了?)\n本地: gcc main.c -o main && ./main\n'+(l.si?'输入:'+l.si+'\n':'')+'期望输出:'+l.ex;}}
document.getElementById('code').addEventListener('input',upLn);
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();var ta=e.target;var s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}});
document.getElementById('code').addEventListener('scroll',function(){document.getElementById('ln').scrollTop=document.getElementById('code').scrollTop});
buildSidebar();go(cur||0);
</script></body></html>
