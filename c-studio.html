<style>

.sc .lb{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc .vl{font-size:26px;font-weight:700}
.sc .sb{font-size:11px;color:var(--m);margin-top:4px}
.vg{color:var(--g)}.vb{color:var(--a)}.vo{color:var(--o)}.vp{color:var(--p)}

.pr .cx.done{background:var(--g);border-color:var(--g);color:#fff}
.pr .tk{flex:1}.pr .tm{color:var(--m);font-size:10px;white-space:nowrap}

.learn-wrap{display:flex;height:100%}
.lv-sidebar{width:240px;min-width:240px;border-right:1px solid var(--b);overflow-y:auto;background:var(--s)}

.lv-sidebar .lb.done .n{color:var(--g)}
.lv-sidebar .lb .ck{color:var(--g);font-size:11px;margin-left:auto;display:none}
.lv-sidebar .lb.done .ck{display:inline}

.lv-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lv-body{flex:1;display:flex;overflow:hidden}
.lv-left{flex:1;overflow-y:auto;padding:16px;min-width:280px}

.out-hd{padding:6px 14px;font-size:10px;color:var(--m);border-bottom:1px solid var(--b)}

.btns{display:flex;gap:6px;padding:8px 14px;flex-shrink:0;flex-wrap:wrap}

.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.06)}

.kb{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.7}
.kb h4{font-size:12px;color:var(--a);margin-bottom:6px}
.kb code{background:var(--s);padding:1px 5px;border-radius:3px;font-size:12px;color:var(--o)}
.kb pre{background:var(--cb);padding:8px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:12px;line-height:1.5;margin:4px 0}
.exam{background:rgba(167,113,247,.08);border:1px solid rgba(167,113,247,.25);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--p);line-height:1.6}
.iso{background:var(--s);border-radius:6px;padding:10px;font-size:12px;margin-top:12px}
.iso .il{font-size:10px;color:var(--m);margin-bottom:3px;font-weight:600}

.hint-box{display:none;margin:0 14px 8px;padding:8px 12px;background:rgba(210,153,29,.1);border:1px solid rgba(210,153,29,.3);border-radius:6px;font-size:12px;color:var(--o);line-height:1.6}
.hint-box.show{display:block}

#toast{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.ok{background:#1a3c1a;color:var(--g);border:1px solid var(--g)}

@media(max-width:900px){#sidebar{display:none}.learn-wrap{flex-direction:column}.lv-sidebar{width:100%;min-width:auto;max-height:120px}.lv-body{flex-direction:column}}

const CL=[
{ph:'启程：编译与输出',tg:'C基础',df:'⭐',ti:'Hello World',de:'写出你的第一个C程序。每个C程序从 <code>main()</code> 开始执行。',tp:'#include <stdio.h>\n\nint main() {\n    \n    return 0;\n}',ex:'Hello, World!\n',kn:'<code>#include &lt;stdio.h&gt;</code> 引入标准I/O。<code>int main()</code> 是入口函数。<code>printf()</code> 打印输出，<code>\\n</code> 换行。<code>return 0</code> 表示正常退出。'},
{ph:'启程：编译与输出',tg:'C基础',df:'⭐',ti:'变量声明',de:'声明 <code>int age=20</code>，用 <code>printf("%d", age)</code> 打印。输出格式：<code>年龄: 20</code>',tp:'#include <stdio.h>\n\nint main() {\n    \n    return 0;\n}',ex:'年龄: 20\n',kn:'<code>int</code> 整数、<code>float</code> 小数、<code>char</code> 字符。printf占位符：<code>%d</code>→int、<code>%f</code>→float、<code>%c</code>→char、<code>%s</code>→字符串。Beej说："就像填空，%d的洞用整数填。"'},
{ph:'启程：编译与输出',tg:'C基础',df:'⭐',ti:'scanf读取输入',de:'读入名字（无空格），输出 <code>你好, xxx!</code>。注意 <code>scanf</code> 字符串不加 <code>&</code>。',tp:'#include <stdio.h>\n\nint main() {\n    char name[100];\n    scanf("%s", name);\n    \n    return 0;\n}',ex:'你好, Tom!\n',si:'Tom',kn:'<code>scanf("%d",&x)</code> 整数要 <code>&</code> 取地址。<strong>字符串不需要</strong>——数组名本身就是地址。Beej：这是理解指针的第一步。'},
{ph:'启程：编译与输出',tg:'C基础',df:'⭐',ti:'算术运算',de:'读入 a,b，输出 <code>a + b = 结果</code>',tp:'#include <stdio.h>\n\nint main() {\n    int a, b;\n    scanf("%d %d", &a, &b);\n    \n    return 0;\n}',ex:'3 + 5 = 8\n',si:'3 5',kn:'<code>+ - * / %</code>（加、减、乘、除、取余）。<strong>整数除法截断</strong>：5/2=2。%只能用于整数。'},

{ph:'控制流',tg:'C基础',df:'⭐',ti:'for循环求和',de:'读入N，输出1+2+…+N。408绪论考时间复杂度：O(n)。',tp:'#include <stdio.h>\n\nint main() {\n    int N, sum = 0;\n    scanf("%d", &N);\n    \n    return 0;\n}',ex:'5050\n',si:'100',kn:'<code>for(初始化;条件;更新)</code>。<code>i++</code> 等价 <code>i=i+1</code>。<code>sum+=i</code> 等价 <code>sum=sum+i</code>。'},
{ph:'控制流',tg:'C基础',df:'⭐',ti:'while循环',de:'读入N，用 <code>while</code> 循环求1到N的和。',tp:'#include <stdio.h>\n\nint main() {\n    int N, sum = 0, i = 1;\n    scanf("%d", &N);\n    \n    return 0;\n}',ex:'5050\n',si:'100',kn:'<code>while(条件){循环体}</code>，适合"不知道循环多少次"的场景。<code>do-while</code>至少执行一次。'},
{ph:'数组与字符串',tg:'C基础',df:'⭐⭐',ti:'一维数组',de:'读入N个数到数组，输出最大值。下标从0开始。',tp:'#include <stdio.h>\n\nint main() {\n    int N;\n    scanf("%d", &N);\n    int arr[N];\n    for(int i=0;i<N;i++)scanf("%d",&arr[i]);\n    \n    return 0;\n}',ex:'9\n',si:'5\n3 7 9 2 6',kn:'Beej：数组是连续内存块。下标从0开始。arr[N-1]是最后一个。<strong>越界访问是C语言最危险的bug</strong>——编译器不检查。'},

{ph:'函数',tg:'C基础',df:'⭐⭐',ti:'递归：阶乘',de:'写 <code>int fact(int n)</code> 递归求n!。递归是树和DFS的基础。',tp:'#include <stdio.h>\n\n// 写递归函数\n\nint main(){int n;scanf("%d",&n);printf("%d\\n",fact(n));return 0;}',ex:'120\n',si:'5',kn:'递归两要素：①<strong>基准条件</strong>(n≤1返回1) ②<strong>递归条件</strong>(n*fact(n-1))。每次递归在<strong>栈</strong>上新建一层帧。太深会<strong>栈溢出</strong>。'},

{ph:'指针 (Beej第7章精华)',tg:'C基础',df:'⭐⭐⭐',ti:'swap：值vs地址',de:'写 <code>void swap(int*a,int*b)</code>，交换两数。408必考：传指针才能改原变量。',tp:'#include <stdio.h>\n\n// 写swap\n\nint main(){int a,b;scanf("%d%d",&a,&b);swap(&a,&b);printf("%d %d\\n",a,b);return 0;}',ex:'5 3\n',si:'3 5',kn:'<strong>值传递</strong>：传的是副本，函数内修改不影响原变量。<strong>地址传递</strong>：传的是地址，通过地址可改原变量。Beej："这是C语言最核心的机制。"'},
{ph:'指针 (Beej第7章精华)',tg:'C基础',df:'⭐⭐⭐',ti:'指针与数组',de:'用指针方式(不用arr[i])遍历数组求和。arr[i]≡*(arr+i)。',tp:'#include <stdio.h>\n\nint main(){\n    int N,sum=0;scanf("%d",&N);int a[N];\n    for(int i=0;i<N;i++)scanf("%d",&a[i]);\n    // 用指针求和\n    \n    printf("%d\\n",sum);return 0;\n}',ex:'15\n',si:'5\n1 2 3 4 5',kn:'数组名就是指向首元素的指针。<code>arr[i]</code> 完全等价于 <code>*(arr+i)</code>——编译器就是这么翻译的。Beej："数组和指针是一枚硬币的两面。"'},

function renderModule(modKey,levels,kKey){
  curMod=modKey;const done=g(kKey);
  let lvHtml='',lastPh='';
  levels.forEach((l,i)=>{if(l.ph!==lastPh){lvHtml+=`<div class="ph">📌 ${l.ph}</div>`;lastPh=l.ph;}
    lvHtml+=`<button class="lb ${i===curLv?'active':''} ${done[i]?'done':''}" onclick="goLevel('${modKey}',${i})"><span class="n">${i+1}</span>${l.ti}<span class="ck">✓</span></button>`;});

  const h=`<div class="learn-wrap"><div class="lv-sidebar">${lvHtml}</div>
    <div class="lv-main"><div class="lv-body">
      <div class="lv-left" id="lv-left"></div>
      <div class="lv-right">
        <div class="ed-hd">📝 main.c</div>
        <div class="ed-wrap"><div class="ln" id="ln"><div>1</div></div><textarea class="code" id="code-input" spellcheck="false"></textarea></div>
        <div class="hint-box" id="hint-box"></div>
        <div class="btns"><button class="btn prm" onclick="execCode('${modKey}')">▶ 运行代码</button><button class="btn" onclick="toggleHint()">💡 提示</button><button class="btn" onclick="showSol('${modKey}')">🔑 答案</button><button class="btn" onclick="resetCode('${modKey}')">↺ 重置</button></div>
        <div class="out-pn"><div class="out-hd">📤 输出</div><div class="out" id="out" style="color:var(--m)">— 运行代码后在此显示结果 —</div></div>
      </div>
    </div></div></div>`;
  document.getElementById('tab-content').innerHTML=h;
  document.getElementById('code-input').addEventListener('input',updateLn);
  document.getElementById('code-input').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const ta=e.target;const s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}});
  goLevel(modKey,curLv);
}

function goLevel(mk,i){
  curLv=i;const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);const l=levels[i];const kKey=mk==='c'?K.C:(mk==='ds'?K.DS:K.FD);const ck='lv_code_'+mk+'_'+i;
  document.querySelectorAll('.lv-sidebar .lb').forEach((b,j)=>b.classList.toggle('active',j===i));
  const ta=document.getElementById('code-input');
  ta.value=localStorage[ck]||l.tp;
  const left=document.getElementById('lv-left');
  let kh=l.kn?`<div class="kb"><h4>📖 Beej精华知识点</h4>${l.kn}</div>`:'';
  if(l.et)kh+=`<div class="exam">🎯 <strong>408/机考真题链接</strong>：${l.et}</div>`;
  let io=`<div class="iso">`;
  if(l.si)io+=`<div class="il">📥 样例输入</div><pre>${esc(l.si)}</pre>`;
  io+=`<div class="il">📤 期望输出</div><pre>${esc(l.ex)}</pre></div>`;
  left.innerHTML=`<h3 style="font-size:17px;margin-bottom:4px">关卡 ${i+1}: ${l.ti}</h3>
    <div style="font-size:11px;color:var(--m);margin-bottom:12px">${l.ph} · ${l.df} · ${l.tg}</div>
    ${kh}<p style="font-size:13px;line-height:1.7;margin-bottom:12px">${l.de}</p>${io}`;
  document.getElementById('hint-box').classList.remove('show');document.getElementById('hint-box').style.display='none';
  document.getElementById('out').textContent='— 运行代码后在此显示结果 —';document.getElementById('out').style.color='var(--m)';
  updateLn();l._srcIdx=i;
}

function updateLn(){const ta=document.getElementById('code-input');if(!ta)return;const n=ta.value.split('\n').length;let h='';for(let i=1;i<=Math.max(n,1);i++)h+=`<div>${i}</div>`;document.getElementById('ln').innerHTML=h}

async function execCode(mk){
  const code=document.getElementById('code-input').value;const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);const l=levels[curLv];const kKey=mk==='c'?K.C:(mk==='ds'?K.DS:K.FD);const ck='lv_code_'+mk+'_'+curLv;
  localStorage[ck]=code;
  const out=document.getElementById('out');out.textContent='⏳ 编译运行中...';out.style.color='#d2991d';
  try{
    const r=await fetch('https://emkc.org/api/v2/piston/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:'c',version:'10.2.0',files:[{name:'main.c',content:code}],stdin:l.si||'',run_timeout:5000,compile_timeout:10000})});
    const d=await r.json();out.style.color='#0f0';let re='';
    if(d.compile&&d.compile.stderr)re+='【编译错误】\n'+d.compile.stderr+'\n';
    if(d.run&&d.run.stderr)re+=(re?'\n':'')+'【运行时错误】\n'+d.run.stderr+'\n';
    if(d.run&&d.run.stdout)re+=d.run.stdout;
    if(!re)re='(无输出 — 程序可能没有printf，或编译失败)';out.textContent=re;
    if(d.run&&d.run.stdout&&l.ex&&d.run.stdout===l.ex&&(!d.compile||!d.compile.stderr)){
      const done=g(kKey);done[curLv]=true;s(kKey,done);
      document.querySelectorAll('.lv-sidebar .lb').forEach((b,j)=>b.classList.toggle('done',!!done[j]));
      updateBadges();toast('✅ 通关！');
    }
  }catch(e){out.style.color='var(--m)';out.textContent='⚠️ 在线编译器不可用(翻墙断了?)\n\n请在本地运行:\ngcc main.c -o main && ./main\n\n'+(l.si?'输入:'+l.si+'\n':'')+'期望输出:'+l.ex;}
}
function toggleHint(){const b=document.getElementById('hint-box');b.style.display=b.classList.contains('show')?'none':'block';b.classList.toggle('show');if(b.classList.contains('show'))b.textContent='💡 想想这道题怎么解...实在想不出去看知识点里的提示。'}
function showSol(mk){if(confirm('确定查看答案？自己写出来才算真正掌握！')){const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);const l=levels[curLv];if(l.so){document.getElementById('code-input').value=l.so;updateLn()}else{alert('本题无预设答案，请根据知识点自行完成。')}}}
function resetCode(mk){if(confirm('重置为模板？')){const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);document.getElementById('code-input').value=levels[curLv].tp;updateLn();document.getElementById('hint-box').classList.remove('show');document.getElementById('hint-box').style.display='none'}}
