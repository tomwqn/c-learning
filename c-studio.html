<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C语言学习平台 — 复旦机考+408数据结构</title>
<style>
:root{--bg:#0d1117;--s:#161b22;--b:#30363d;--t:#c9d1d9;--m:#8b949e;--a:#58a6ff;--g:#3fb950;--o:#d2991d;--r:#f85149;--p:#a371f7;--cb:#0d1117}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex;overflow:hidden}
#sidebar{width:210px;min-width:210px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;user-select:none}
#sidebar .logo{padding:14px 14px;font-size:14px;font-weight:700;color:var(--a);border-bottom:1px solid var(--b);cursor:pointer;line-height:1.3}
#sidebar .logo span{font-size:9px;color:var(--m);display:block;font-weight:400}
.nav-btn{display:flex;align-items:center;gap:7px;width:100%;padding:10px 14px;border:none;background:none;color:var(--m);font-size:12px;cursor:pointer;text-align:left;transition:all .12s;border-left:3px solid transparent}
.nav-btn:hover{color:var(--t);background:rgba(255,255,255,.03)}
.nav-btn.active{color:var(--a);background:rgba(88,166,255,.08);border-left-color:var(--a);font-weight:600}
.nav-btn .ico{font-size:15px;width:20px;text-align:center}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tab-content{flex:1;overflow-y:auto;padding:0}

/* Dashboard */
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:16px}
.sc{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px}
.sc .lb{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sc .vl{font-size:24px;font-weight:700}.sc .sb{font-size:10px;color:var(--m);margin-top:2px}
.vg{color:var(--g)}.vb{color:var(--a)}.vo{color:var(--o)}.vp{color:var(--p)}
.pb{height:6px;background:var(--b);border-radius:3px;overflow:hidden;margin-top:6px}
.pb .fl{height:100%;background:var(--g);border-radius:3px;transition:width .5s}

/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal .day-label{font-size:9px;color:var(--m);text-align:center;padding:2px}
.cal .day{aspect-ratio:1;border-radius:4px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative}
.cal .day:hover{border-color:var(--a)}
.cal .day.today{border-color:var(--a);font-weight:700}
.cal .day.has-note{background:rgba(88,166,255,.15);color:var(--a);font-weight:600}
.cal .day.empty{color:var(--m)}
.cal .day.other-month{color:rgba(139,148,158,.3)}
.cal .mnav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cal .mnav button{background:var(--s);border:1px solid var(--b);color:var(--t);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px}
.cal .mnav .mon{font-size:13px;font-weight:600;min-width:120px;text-align:center}

/* Knowledge sections */
.kn-section{margin:16px;background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:hidden}
.kn-section .ch-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;user-select:none}
.kn-section .ch-header:hover{background:rgba(255,255,255,.03)}
.kn-section .ch-header .ch-num{width:28px;height:28px;border-radius:6px;background:var(--a);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.kn-section .ch-header .ch-title{font-size:14px;font-weight:600}
.kn-section .ch-header .ch-arrow{transition:transform .2s;margin-left:auto;font-size:10px;color:var(--m)}
.kn-section .ch-body{display:none;padding:0 16px 14px;border-top:1px solid var(--b)}
.kn-section.open .ch-body{display:block}
.kn-section.open .ch-arrow{transform:rotate(90deg)}
.kn-card{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:12px;margin-top:10px}
.kn-card h5{font-size:12px;color:var(--a);margin-bottom:6px}
.kn-card p,.kn-card li{font-size:12px;line-height:1.75;color:var(--t)}
.kn-card code{background:var(--s);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--o)}
.kn-card pre{background:var(--cb);padding:8px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:11px;line-height:1.5;margin:6px 0}
.kn-card .tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;margin-right:4px}
.kn-card .tag.exam{background:rgba(167,113,247,.3);color:var(--p)}
.kn-card .tag.formula{background:rgba(210,153,29,.3);color:var(--o)}
.kn-card .tag.trap{background:rgba(248,81,73,.3);color:var(--r)}

/* Learn layout */
.learn-wrap{display:flex;height:100%}
.lv-sidebar{width:240px;min-width:240px;border-right:1px solid var(--b);overflow-y:auto;background:var(--s)}
.lv-sidebar .ph{font-size:9px;color:var(--m);padding:8px 10px 3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.lv-sidebar .lb{display:flex;align-items:center;gap:5px;width:100%;padding:6px 10px;border:none;background:none;color:var(--t);font-size:11px;cursor:pointer;text-align:left;transition:background .1s}
.lv-sidebar .lb:hover{background:rgba(255,255,255,.03)}
.lv-sidebar .lb.active{background:rgba(88,166,255,.12);color:var(--a);font-weight:600}
.lv-sidebar .lb .n{font-size:9px;color:var(--m);min-width:14px}
.lv-sidebar .lb.done .n{color:var(--g)}
.lv-sidebar .lb .ck{color:var(--g);font-size:10px;margin-left:auto;display:none}
.lv-sidebar .lb.done .ck{display:inline}

.lv-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lv-body{flex:1;display:flex;overflow:hidden}
.lv-left{flex:1;overflow-y:auto;padding:14px;min-width:280px}
.lv-right{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--b);min-width:350px}
.ed-hd{padding:6px 12px;border-bottom:1px solid var(--b);font-size:10px;color:var(--m);flex-shrink:0}
.ed-wrap{flex:1;display:flex;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12px;line-height:1.55}
.ln{background:var(--s);color:var(--m);padding:8px 0;text-align:right;overflow:hidden;width:36px;flex-shrink:0;font-size:12px;line-height:1.55}
.ln div{padding:0 6px}
.code{flex:1;background:var(--cb);color:var(--t);border:none;padding:8px;resize:none;font-family:inherit;font-size:12px;line-height:1.55;tab-size:4;outline:none}
.out-pn{border-top:1px solid var(--b);flex-shrink:0}
.out-hd{padding:4px 12px;font-size:9px;color:var(--m);border-bottom:1px solid var(--b)}
.out{background:#000;padding:8px 12px;font-family:'Consolas',monospace;font-size:11px;min-height:40px;max-height:150px;overflow-y:auto;white-space:pre-wrap}
.btns{display:flex;gap:6px;padding:8px 12px;flex-shrink:0;flex-wrap:wrap}

.btn{padding:5px 12px;border-radius:5px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:11px;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.06)}
.btn.prm{background:var(--a);color:#fff;border-color:var(--a)}

.kb{background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.65}
.kb h4{font-size:12px;color:var(--a);margin-bottom:4px}
.kb code{background:var(--s);padding:1px 4px;border-radius:3px;font-size:11px;color:var(--o)}
.kb pre{background:var(--cb);padding:6px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:11px;line-height:1.5;margin:4px 0}
.exam{background:rgba(167,113,247,.06);border:1px solid rgba(167,113,247,.2);border-radius:8px;padding:6px 10px;margin-bottom:10px;font-size:11px;color:var(--p);line-height:1.5}
.iso{background:var(--s);border-radius:6px;padding:8px;font-size:11px;margin-top:10px}
.iso .il{font-size:9px;color:var(--m);margin-bottom:2px;font-weight:600}
.iso pre{margin:0;background:var(--cb);padding:4px;border-radius:4px}

#toast{position:fixed;top:16px;right:16px;padding:8px 14px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.ok{background:#1a3c1a;color:var(--g);border:1px solid var(--g)}

.je{margin:10px 0;border:1px solid var(--b);border-radius:6px;padding:10px}
.je textarea{width:100%;background:var(--bg);color:var(--t);border:1px solid var(--b);border-radius:4px;padding:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:60px;line-height:1.6}
.je textarea:focus{outline:none;border-color:var(--a)}

/* Responsive */
@media(max-width:900px){#sidebar{display:none}.learn-wrap{flex-direction:column}.lv-sidebar{width:100%;min-width:auto;max-height:100px}.lv-body{flex-direction:column}}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo" onclick="switchTab(0)">🎯 C语言学习平台<span>复旦机考 + 408数据结构</span></div>
  <button class="nav-btn active" data-tab="0"><span class="ico">📊</span> 学习总览</button>
  <button class="nav-btn" data-tab="1"><span class="ico">🧱</span> C语言闯关</button>
  <button class="nav-btn" data-tab="2"><span class="ico">📖</span> 408闯关</button>
  <button class="nav-btn" data-tab="3"><span class="ico">🖥️</span> 复旦机考</button>
  <button class="nav-btn" data-tab="4"><span class="ico">📝</span> 学习日志</button>
  <button class="nav-btn" data-tab="5"><span class="ico">📚</span> C语言参考</button>
  <button class="nav-btn" data-tab="6"><span class="ico">📚</span> 408知识库</button>
</div>
<div id="main"><div id="tab-content"></div></div>
<div id="toast"></div>

<script>
// ===================== DATA =====================
const now=new Date();const TODAY=now.toISOString().slice(0,10);
const THIS_MONTH=now.getMonth();const THIS_YEAR=now.getFullYear();

const KC='cs_mod_c',KDS='cs_mod_ds',KFD='cs_mod_fd',KJ='cs_journal';

function g(k){try{return JSON.parse(localStorage[k])||{}}catch(e){return{}}}
function s(k,v){localStorage[k]=JSON.stringify(v)}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.className='show ok';setTimeout(()=>t.className='',2500)}

// --- 408 知识库数据 ---
const DS_KNOWLEDGE=[
{ch:'第1章 绪论',items:[
  {t:'数据结构三要素',b:'<b>逻辑结构</b>（数据之间的关系：线性/树形/图形/集合）<br><b>存储结构</b>（在内存中的存放：顺序/链式/索引/散列）<br><b>数据运算</b>（对数据的操作：增删改查排序）<br><span class="tag exam">408考点</span> 逻辑结构独立于存储结构，同一逻辑结构可有多种存储实现。'},
  {t:'算法五个特性',b:'<b>有穷性</b>：有限步后结束<br><b>确定性</b>：每步含义唯一<br><b>可行性</b>：每步可执行<br><b>输入</b>：零个或多个<br><b>输出</b>：至少一个<br><span class="tag exam">408考点</span> 程序≠算法（程序可以死循环）。'},
  {t:'时间复杂度分析',b:'只保留<strong>最高阶项</strong>，忽略系数。常见排序：<br>O(1) 常数 → O(logn) 对数 → O(n) 线性 → O(nlogn) 线性对数 → O(n²) 平方 → O(n³) 立方 → O(2ⁿ) 指数<br><pre>for(i=0;i&lt;n;i++)           // O(n)\n  for(j=0;j&lt;n;j++)         // O(n²)\n    sum++;</pre><span class="tag trap">陷阱</span> 嵌套循环不一定是O(n²)——内层循环次数独立于n时可能是O(n)。'},
  {t:'空间复杂度',b:'算法运行时占用的<strong>额外</strong>存储空间。递归调用会占用<strong>栈空间</strong>。例如递归求阶乘空间复杂度O(n)（n层栈帧）。'},
]},{ch:'第2章 线性表',items:[
  {t:'顺序表',b:'<strong>连续内存</strong>存储。下标从0开始。<br>✅ 优点：随机存取O(1)、存储密度高<br>❌ 缺点：插入/删除需移动元素O(n)、需要连续大块内存<br><span class="tag formula">公式</span> 第i位(1≤i≤n+1)插入需移动 <b>n-i+1</b> 个元素<br><span class="tag exam">408真题</span> 2010数组移位、2011两序列中位数、2013主元素、2016划分、2018最小未出现正整数、2020三指针'},
  {t:'单链表',b:'每个<b>节点</b>=数据域+<b>next指针</b>域。头指针head指向第一个节点。<pre>typedef struct LNode{\n    int data;\n    struct LNode *next;\n}LNode;</pre>✅ 插入/删除O(1)、不需要连续空间<br>❌ 查找O(n)、指针占用额外空间<br><b>头插法</b>：新节点插入head之前→逆序<br><b>尾插法</b>：维护tail指针→顺序<br><span class="tag exam">408真题</span> 2009倒数第k节点、2012公共后缀、2015去重、2019链表重排'},
  {t:'顺序表 vs 链表',b:'<table style="width:100%;font-size:11px;border-collapse:collapse"><tr style="border-bottom:1px solid var(--b)"><th></th><th>顺序表</th><th>链表</th></tr><tr style="border-bottom:1px solid var(--b)"><td>存取</td><td>随机O(1)</td><td>顺序O(n)</td></tr><tr style="border-bottom:1px solid var(--b)"><td>插入删除</td><td>O(n)</td><td>O(1)</td></tr><tr style="border-bottom:1px solid var(--b)"><td>空间</td><td>预分配</td><td>动态</td></tr><tr><td>场景</td><td>频繁查找</td><td>频繁增删</td></tr></table>'},
]},{ch:'第3章 栈、队列和数组',items:[
  {t:'栈 (Stack)',b:'<strong>后进先出LIFO</strong>。只在一端（栈顶）操作。<pre>// 顺序栈\nint stk[MAX], top=-1;  // -1=空\npush: stk[++top]=x;\npop:  x=stk[top--];</pre>应用：括号匹配、表达式求值、递归实现、DFS非递归。<br><span class="tag exam">408考点</span> top初始值决定判空条件(top=-1时空为top==-1)。'},
  {t:'循环队列 — 408必考',b:'<strong>先进先出FIFO</strong>。头尾指针循环移动。牺牲一个单元区分空/满。<br><span class="tag formula">408必背公式</span><br>· 判空：front == rear<br>· 判满：(rear+1) % MAX == front<br>· 入队：q[rear]=x; rear=(rear+1)%MAX<br>· 出队：x=q[front]; front=(front+1)%MAX<br>· 元素个数：(rear-front+MAX) % MAX<br><span class="tag exam">408真题</span> 几乎每年必考1道选择题/填空题！'},
  {t:'特殊矩阵压缩存储',b'<b>对称矩阵</b>：只存下三角，a[i][j]映射到B[k]，k=i(i-1)/2+j-1（i≥j）。<br><b>三角矩阵</b>：存三角区+一个常数。<br><b>稀疏矩阵</b>：三元组(行,列,值)只存非零元。<br><span class="tag formula">核心</span> 一维数组下标k与二维(i,j)的映射关系。'},
]},{ch:'第4章 树与二叉树 ⭐重中之重',items:[
  {t:'二叉树5条性质（记死）',b:'① 第i层最多 2<sup>i-1</sup> 个节点<br>② 深度为k最多 2<sup>k</sup>-1 个节点<br>③ n₀=n₂+1（叶节点数=度为2的节点数+1）<br>④ n个节点的完全二叉树深度为 ⌊log₂n⌋+1<br>⑤ 完全二叉树：编号为i的节点→左孩子2i，右孩子2i+1，父⌊i/2⌋<br><span class="tag exam">408考点</span> 选择题秒杀题——记住就能拿2分。'},
  {t:'四种遍历',b:'<b>前序</b>（根→左→右）：适合复制、前缀表达式<br><b>中序</b>（左→根→右）：BST得升序序列<br><b>后序</b>（左→右→根）：适合释放节点、后缀表达式<br><b>层序</b>（BFS）：用队列实现<br><span class="tag exam">408经典题</span> 已知两种遍历序列→构造二叉树→求第三种遍历<br><span class="tag trap">陷阱</span> 必须包含<b>中序</b>才能唯一确定二叉树（仅前+后不行！）'},
  {t:'哈夫曼树',b:'<b>WPL</b>（带权路径长度）= Σ(叶权值×到根的路径长度)。哈夫曼树是WPL最小的二叉树。<br><b>构建</b>：每次选两个最小权值节点合并为新节点，权值和为新权值。<br><span class="tag exam">408真题</span> 2014年综合题考WPL计算。选择题常考哈夫曼树构造过程。'},
  {t:'堆 (2026考纲新增)',b:'<b>大顶堆</b>：每个节点 ≥ 其孩子（堆顶最大）<br><b>小顶堆</b>：每个节点 ≤ 其孩子（堆顶最小）<br>是<b>完全二叉树</b>，用数组存储。建堆O(n)，调整O(logn)。<br>应用：堆排序、优先队列、TopK问题。'},
]},{ch:'第5章 图',items:[
  {t:'图的存储',b:'<b>邻接矩阵</b>：G[i][j]=1有边。空间O(n²)，适合稠密图。<br><b>邻接表</b>：每个节点挂邻居链表。空间O(n+e)，适合稀疏图。<br><pre>// 邻接表节点\ntypedef struct Edge{ int to; struct Edge*next; }Edge;\nEdge *adj[MAX];</pre><span class="tag exam">408考点</span> 选择题常考"给定图，画出邻接矩阵/邻接表"。'},
  {t:'DFS / BFS',b:'<b>DFS</b>（深度优先）：递归/栈，沿一条路走到底再回溯<br><b>BFS</b>（广度优先）：队列，一层层展开<br>时间复杂度：邻接矩阵O(n²)，邻接表O(n+e)<br>应用：连通分量、拓扑排序、最短路径(无权图)、生成树'},
  {t:'最小生成树MST',b:'<b>Prim</b>：任意起点，每次选最小边扩展连通分量。O(n²)适合稠密。<br><b>Kruskal</b>：边排序+并查集，每次选不构成环的最小边。O(eloge)适合稀疏。<br><span class="tag exam">408考点</span> 手工模拟过程——选择题常考。'},
  {t:'Dijkstra最短路径',b:'求单源最短路径——每次选距离最小的未访问节点，用其更新所有邻居。O(n²)。<br>不能处理<b>负权边</b>（负权用Bellman-Ford或SPFA）。<br><span class="tag exam">408+复旦双重考点</span> 408考手工模拟，复旦机考要求手写代码。<br><span class="tag trap">陷阱</span> Dijkstra不是每次都能找到"次短路径"——它贪心地每次确定一个节点的最短距离。'},
  {t:'拓扑排序',b:'<b>AOV网</b>：顶点表示活动，边表示先后关系。<br><b>Kahn算法</b>：①入度为0者入队 ②出队→删其出边（邻居入度-1）→入度为0者入队。全访问过则无环。<br><span class="tag exam">408真题</span> 2021/2023/2024连续3年考图！2024年考拓扑排序。'},
]},{ch:'第6章 查找',items:[
  {t:'折半查找 (二分)',b:'<b>前提</b>：有序顺序表。每次比较中间元素，缩小一半范围。O(logn)。<br><b>判定树</b>：是一棵平衡二叉搜索树。查找的<strong>比较次数</strong>=节点所在层数。<br><span class="tag formula">公式</span> ASL成功 ≈ log₂(n+1)-1<br><span class="tag trap">陷阱</span> 链表不能折半查找——必须能随机存取！'},
  {t:'二叉搜索树 BST',b:'左子树 < 根 < 右子树。中序遍历得升序序列。<br>查找：小于→左，大于→右。插入：递归找到空位插入。删除：①叶→直接删 ②单孩子→替代 ③双孩子→用<strong>中序后继</strong>替代。<br>平均O(logn)，最坏O(n)（退化成链表）。'},

  {t:'B树 vs B+树',b'<b>B树</b>：节点存数据+键，m阶最多m-1个键。所有叶在同一层。<br><b>B+树</b>：只有叶节点存数据，非叶节点只存索引。叶节点用链表串联。<br>都是<strong>多路平衡查找树</strong>，用于数据库索引。<br><span class="tag exam">408每年必考</span> 结构区别——选择题高频。'},

]},{ch:'第7章 排序 ⭐核心',items:[
  {t:'排序算法对比表 (必默写)',b:'<table style="width:100%;font-size:10px;border-collapse:collapse"><tr style="border-bottom:1px solid var(--b)"><th>算法</th><th>时间(平均)</th><th>空间</th><th>稳定?</th></tr><tr style="border-bottom:1px solid var(--b)"><td>直接插入</td><td>O(n²)</td><td>O(1)</td><td>✅ 稳定</td></tr><tr style="border-bottom:1px solid var(--b)"><td>冒泡</td><td>O(n²)</td><td>O(1)</td><td>✅ 稳定</td></tr><tr style="border-bottom:1px solid var(--b)"><td>简单选择</td><td>O(n²)</td><td>O(1)</td><td>❌</td></tr><tr style="border-bottom:1px solid var(--b)"><td>希尔</td><td>~O(n¹·³)</td><td>O(1)</td><td>❌</td></tr><tr style="border-bottom:1px solid var(--b)"><td><b>快排</b></td><td><b>O(nlogn)</b></td><td>O(logn)</td><td><b>❌</b></td></tr><tr style="border-bottom:1px solid var(--b)"><td><b>堆排</b></td><td><b>O(nlogn)</b></td><td>O(1)</td><td><b>❌</b></td></tr><tr style="border-bottom:1px solid var(--b)"><td><b>归并</b></td><td><b>O(nlogn)</b></td><td>O(n)</td><td><b>✅ 稳定</b></td></tr><tr><td>基数</td><td>O(d(n+r))</td><td>O(n+r)</td><td>✅ 稳定</td></tr></table>'},
  {t:'快速排序详解',b:'<b>核心</b>：选pivot→分区(小左大右)→递归左右。<br>最坏O(n²)出现在<b>有序数组+选首元素为pivot</b>。<br>优化：随机选pivot / 三数取中。<br><span class="tag exam">408综合题最高频</span> 必须闭卷写出partition+递归！'},
  {t:'归并排序 — 外部排序基础',b:'<b>分治</b>：分成两半分别排序→merge合并两个有序数组。<br>merge是核心：双指针比较，小的放入结果。<br>内部排序中唯一<b>稳定</b>的O(nlogn)算法。外部排序=多路归并。'},
  {t:'堆排序',b:'<b>建堆</b>(从⌊n/2⌋开始向下调整，O(n))→<br>循环：①取堆顶(最大) ②与末尾交换 ③向下调整(O(logn))。<br>时间O(nlogn)，空间O(1)——是<b>原地排序</b>。<br><span class="tag trap">陷阱</span> 堆排序不稳定！建堆过程会破坏相同元素的相对顺序。'},
]},{ch:'串的模式匹配 (2026新增)',items:[

]}];

// ===================== TAB SWITCHING =====================
let activeTab=0,curMod='c',curLv=0;

function switchTab(t){
  activeTab=t;document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===t));
  if(t===0)renderDash();
  else if(t===1)renderModule('c',CL,KC);
  else if(t===2)renderModule('ds',DSL,KDS);
  else if(t===3)renderModule('fd',FDL,KFD);
  else if(t===4)renderJournal();
  else if(t===5)renderCRef();
  else if(t===6)renderDSKnow();
}

// ===================== DASHBOARD =====================
function renderDash(){
  const cd=Object.values(g(KC)).filter(v=>v).length;
  const ds=Object.values(g(KDS)).filter(v=>v).length;
  const fd=Object.values(g(KFD)).filter(v=>v).length;
  const total=CL.length+DSL.length+FDL.length,all=cd+ds+fd;
  const j=g(KJ);let streak=0,d=new Date();
  for(let i=0;i<365;i++){const k=d.toISOString().slice(0,10);if(j[k]&&j[k].trim())streak++;else if(i>0)break;d.setDate(d.getDate()-1);}
  const cal=buildCal(THIS_YEAR,THIS_MONTH);
  document.getElementById('tab-content').innerHTML=`
  <div class="dg">
    <div class="sc"><div class="lb">总闯关</div><div class="vl vg">${all}/${total}</div><div class="sb">${Math.round(all/total*100)}%</div><div class="pb"><div class="fl" style="width:${Math.round(all/total*100)}%"></div></div></div>
    <div class="sc"><div class="lb">C语言</div><div class="vl vb">${cd}/${CL.length}</div><div class="sb">基础语法+指针</div></div>
    <div class="sc"><div class="lb">408</div><div class="vl vp">${ds}/${DSL.length}</div><div class="sb">16年真题考点</div></div>
    <div class="sc"><div class="lb">复旦机考</div><div class="vl vo">${fd}/${FDL.length}</div><div class="sb">11年真题题型</div></div>
    <div class="sc"><div class="lb">🔥 连击</div><div class="vl vo">${streak}天</div><div class="sb">记录即力量</div></div>
    <div class="sc"><div class="lb">知识库</div><div class="vl vp">2本</div><div class="sb">C参考+408七章</div></div>
  </div>
  <div style="margin:0 16px 8px;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px">
    <h3 style="font-size:13px;color:var(--a);margin-bottom:6px">📅 ${THIS_YEAR}年${THIS_MONTH+1}月</h3>
    <div class="cal">${cal}</div>
  </div>
  <div style="margin:0 16px 16px;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px">
    <h3 style="font-size:13px;color:var(--a);margin-bottom:6px">✏️ 今日学习记录（${TODAY} — 可跳过）</h3>
    <div class="je"><textarea id="jtoday">${j[TODAY]||''}</textarea>
    <button class="btn prm" style="margin-top:6px;font-size:11px" onclick="saveToday()">💾 保存</button></div>
  </div>`;
}

function buildCal(y,m){
  const j=g(KJ);const f=new Date(y,m,1);const start=f.getDay();const dim=new Date(y,m+1,0).getDate();
  let h='<div class="mnav"><span class="mon">'+y+'年'+(m+1)+'月</span></div>';
  h+='<div class="cal">';
  ['日','一','二','三','四','五','六'].forEach(s=>h+=`<div class="day-label">${s}</div>`);
  for(let i=0;i<start;i++)h+=`<div class="day empty other-month"></div>`;
  for(let d=1;d<=dim;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=[];if(k===TODAY)cls.push('today');if(j[k]&&j[k].trim())cls.push('has-note');
    h+=`<div class="day ${cls.join(' ')}" onclick="editDay('${k}')" title="${k}">${d}</div>`;
  }
  h+='</div>';return h;
}

function saveToday(){const t=document.getElementById('jtoday').value;const j=g(KJ);j[TODAY]=t;s(KJ,j);toast('✅ 已保存')}

function editDay(k){
  const j=g(KJ);const note=j[k]||'';
  const content=prompt(`📅 ${k}\n记录学习内容（可为空）：`,note);
  if(content!==null){j[k]=content;s(KJ,j);renderDash();toast('✅ '+k+' 已更新')}
}

// ===================== JOURNAL =====================
function renderJournal(){
  const j=g(KJ);const ks=Object.keys(j).filter(k=>k!=='_tc').sort().reverse().slice(0,60);
  const cal=buildCal(THIS_YEAR,THIS_MONTH);
  document.getElementById('tab-content').innerHTML=`
  <div style="padding:16px;max-width:800px">
    <h3 style="margin-bottom:12px">📅 学习日志</h3>
    <div style="background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:16px">${cal}</div>
    <h4 style="font-size:13px;color:var(--m);margin-bottom:8px">最近记录</h4>
    ${ks.length?ks.map(k=>`<div style="background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px;margin-bottom:8px;font-size:13px;line-height:1.6"><div style="font-size:10px;color:var(--m);margin-bottom:4px">📅 ${k}</div>${esc(j[k])||'<span style="color:var(--m)">(空)</span>'}</div>`).join(''):'<p style="color:var(--m)">还没有日志。点击日历上的日期即可记录。</p>'}
  </div>`;
}

// ===================== 408 KNOWLEDGE =====================
function renderDSKnow(){
  let h='<div style="padding:16px;max-width:900px"><h3 style="margin-bottom:4px">📚 408数据结构知识库</h3><p style="font-size:11px;color:var(--m);margin-bottom:12px">基于严蔚敏教材 + 王道 + 16年408真题提炼 · 点击展开</p>';
  DS_KNOWLEDGE.forEach((ch,i)=>{
    h+=`<div class="kn-section" id="dsk-${i}"><div class="ch-header" onclick="toggleSection('dsk-${i}')"><div class="ch-num">${i+1}</div><div class="ch-title">${ch.ch}</div><div class="ch-arrow">▶</div></div><div class="ch-body">`;
    ch.items.forEach(it=>h+=`<div class="kn-card"><h5>${it.t}</h5>${it.b}</div>`);
    h+='</div></div>';
  });
  h+='</div>';
  document.getElementById('tab-content').innerHTML=h;
}

// ===================== C REFERENCE =====================
function renderCRef(){
  let h='<div style="padding:16px;max-width:900px"><h3 style="margin-bottom:4px">📚 C语言参考手册</h3><p style="font-size:11px;color:var(--m);margin-bottom:12px">基于Beej\'s Guide精华 + 408/机考高频用法 · 点击展开</p>';
  C_REF.forEach((ch,i)=>{
    h+=`<div class="kn-section" id="cref-${i}"><div class="ch-header" onclick="toggleSection('cref-${i}')"><div class="ch-num">${i+1}</div><div class="ch-title">${ch.ch}</div><div class="ch-arrow">▶</div></div><div class="ch-body">`;
    ch.items.forEach(it=>h+=`<div class="kn-card"><h5>${it.t}</h5>${it.b}</div>`);
    h+='</div></div>';
  });
  h+='</div>';
  document.getElementById('tab-content').innerHTML=h;
}

function toggleSection(id){document.getElementById(id).classList.toggle('open')}

// ===================== LEARNING MODULES =====================
function renderModule(mk,levels,kKey){
  curMod=mk;const done=g(kKey);
  let lvHtml='',lastPh='';
  levels.forEach((l,i)=>{if(l.ph!==lastPh){lvHtml+=`<div class="ph">📌 ${l.ph}</div>`;lastPh=l.ph;}
    lvHtml+=`<button class="lb ${i===0&&mk===curMod?'active':''} ${done[i]?'done':''}" onclick="goLv('${mk}',${i})"><span class="n">${i+1}</span>${l.ti}<span class="ck">✓</span></button>`;});
  document.getElementById('tab-content').innerHTML=`
  <div class="learn-wrap"><div class="lv-sidebar">${lvHtml}</div>
    <div class="lv-main"><div class="lv-body">
      <div class="lv-left" id="lv-left"></div>
      <div class="lv-right">
        <div class="ed-hd">📝 main.c</div>
        <div class="ed-wrap"><div class="ln" id="ln"><div>1</div></div><textarea class="code" id="code-in" spellcheck="false"></textarea></div>
        <div class="btns"><button class="btn prm" onclick="run('${mk}')">▶ 运行代码</button><button class="btn" onclick="sol('${mk}')">🔑 答案</button><button class="btn" onclick="reset('${mk}')">↺ 重置</button></div>
        <div class="out-pn"><div class="out-hd">📤 输出</div><div class="out" id="out" style="color:var(--m)">— 点击运行代码 —</div></div>
      </div>
  </div></div></div>`;
  document.getElementById('code-in').addEventListener('input',updateLn);
  document.getElementById('code-in').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const ta=e.target,s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}});
  goLv(mk,0);
}

function goLv(mk,i){
  curLv=i;const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);const l=levels[i];const kKey=mk==='c'?KC:(mk==='ds'?KDS:KFD);
  const ck='lv_code_'+mk+'_'+i;
  document.querySelectorAll('.lv-sidebar .lb').forEach((b,j)=>b.classList.toggle('active',j===i));
  const ta=document.getElementById('code-in');ta.value=localStorage[ck]||l.tp;
  const left=document.getElementById('lv-left');
  let kh=l.kn?`<div class="kb"><h4>📖 知识点</h4>${l.kn}</div>`:'';
  if(l.et)kh+=`<div class="exam">🎯 <strong>真题链接</strong>：${l.et}</div>`;
  let io=`<div class="iso">`;
  if(l.si)io+=`<div class="il">📥 样例输入</div><pre>${esc(l.si)}</pre>`;
  io+=`<div class="il">📤 期望输出</div><pre>${esc(l.ex)}</pre></div>`;
  left.innerHTML=`<h3 style="font-size:16px;margin-bottom:4px">关卡 ${i+1}: ${l.ti}</h3>
    <div style="font-size:10px;color:var(--m);margin-bottom:10px">${l.ph} · ${l.df} · ${l.tg}</div>
    ${kh}<p style="font-size:13px;line-height:1.7;margin-bottom:10px">${l.de}</p>${io}`;
  document.getElementById('out').textContent='— 点击运行代码 —';document.getElementById('out').style.color='var(--m)';
  updateLn();l._idx=i;
}

function updateLn(){const ta=document.getElementById('code-in');if(!ta)return;const n=ta.value.split('\n').length;let h='';for(let i=1;i<=n;i++)h+=`<div>${i}</div>`;document.getElementById('ln').innerHTML=h}

async function run(mk){
  const code=document.getElementById('code-in').value;const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);const l=levels[curLv];const kKey=mk==='c'?KC:(mk==='ds'?KDS:KFD);
  const ck='lv_code_'+mk+'_'+curLv;localStorage[ck]=code;
  const out=document.getElementById('out');out.textContent='⏳ 编译运行中...';out.style.color='#d2991d';
  try{
    const r=await fetch('https://emkc.org/api/v2/piston/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:'c',version:'10.2.0',files:[{name:'main.c',content:code}],stdin:l.si||'',run_timeout:5000,compile_timeout:10000})});
    const d=await r.json();out.style.color='#0f0';let re='';
    if(d.compile&&d.compile.stderr)re+='【编译错误】\n'+d.compile.stderr+'\n';
    if(d.run&&d.run.stderr)re+=(re?'\n':'')+'【运行错误】\n'+d.run.stderr+'\n';
    if(d.run&&d.run.stdout)re+=d.run.stdout;
    if(!re)re='(无输出 — 程序可能没有printf或编译失败)';out.textContent=re;
    if(d.run&&d.run.stdout&&l.ex&&d.run.stdout===l.ex&&(!d.compile||!d.compile.stderr)){
      const done=g(kKey);done[curLv]=true;s(kKey,done);
      document.querySelectorAll('.lv-sidebar .lb').forEach((b,j)=>b.classList.toggle('done',!!done[j]));
      const j=g(KJ);if(!j[TODAY])j[TODAY]='';s(KJ,j);toast('✅ 通关！');
    }
  }catch(e){out.style.color='var(--m)';out.textContent='⚠️ 在线编译器不可用(翻墙断了?)\n\n本地运行: gcc main.c -o main && ./main\n\n'+(l.si?'输入:'+l.si+'\n':'')+'期望输出:'+l.ex;}
}

function sol(mk){if(confirm('确定查看答案？自己写才算掌握')){const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);const l=levels[curLv];if(l.so){document.getElementById('code-in').value=l.so;updateLn()}else alert('本题无预设答案')}}
function reset(mk){if(confirm('重置为模板？')){const levels=mk==='c'?CL:(mk==='ds'?DSL:FDL);document.getElementById('code-in').value=levels[curLv].tp;updateLn()}}

// ===================== INIT =====================
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',function(){switchTab(parseInt(this.dataset.tab))}));
switchTab(0);
</script>
