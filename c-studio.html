<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C语言学习平台 — 复旦机考+408数据结构</title>
<style>
:root{--bg:#0d1117;--s:#161b22;--b:#30363d;--t:#c9d1d9;--m:#8b949e;--a:#58a6ff;--g:#3fb950;--o:#d2991d;--r:#f85149;--p:#a371f7;--cb:#0d1117}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex}
a{color:var(--a);text-decoration:none}
#sb{width:210px;min-width:210px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.sb-logo{padding:14px;font-size:14px;font-weight:700;color:var(--a);border-bottom:1px solid var(--b);cursor:pointer;line-height:1.3}
.sb-logo span{font-size:9px;color:var(--m);display:block;font-weight:400}
.sb-btn{display:flex;align-items:center;gap:7px;width:100%;padding:10px 14px;border:none;background:none;color:var(--m);font-size:12px;cursor:pointer;text-align:left;border-left:3px solid transparent;font-family:inherit}
.sb-btn:hover{color:var(--t);background:rgba(255,255,255,.03)}
.sb-btn.on{color:var(--a);background:rgba(88,166,255,.08);border-left-color:var(--a);font-weight:600}
.sb-btn .ico{font-size:15px;width:20px;text-align:center}
#main{flex:1;overflow-y:auto}
.tab{display:none}
.tab.on{display:block}

/* dashboard */
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:16px}
.sc{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px}
.sc .lb{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sc .vl{font-size:24px;font-weight:700}.sc .sb{font-size:10px;color:var(--m);margin-top:2px}
.vg{color:var(--g)}.vb{color:var(--a)}.vo{color:var(--o)}.vp{color:var(--p)}
.pb{height:6px;background:var(--b);border-radius:3px;overflow:hidden;margin-top:6px}
.pb .fl{height:100%;background:var(--g);border-radius:3px;transition:width .5s}

/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal .dl{font-size:9px;color:var(--m);text-align:center;padding:2px}
.cal .dy{aspect-ratio:1;border-radius:4px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent}
.cal .dy:hover{border-color:var(--a)}
.cal .dy.td{border-color:var(--a);font-weight:700}
.cal .dy.hn{background:rgba(88,166,255,.15);color:var(--a);font-weight:600}
.cal .dy.em{color:var(--m)}
.cal .dy.om{color:rgba(139,148,158,.3)}

/* knowledge */
.ks{margin:16px;background:var(--s);border:1px solid var(--b);border-radius:8px;overflow:hidden}
.ks .kh{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.ks .kh:hover{background:rgba(255,255,255,.03)}
.ks .kh .kn{width:28px;height:28px;border-radius:6px;background:var(--a);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ks .kh .kt{font-size:14px;font-weight:600}
.ks .kh .ka{transition:transform .2s;margin-left:auto;font-size:10px;color:var(--m)}
.ks .kb{display:none;padding:0 16px 14px;border-top:1px solid var(--b)}
.ks.open .kb{display:block}
.ks.open .ka{transform:rotate(90deg)}
.kc{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:12px;margin-top:10px}
.kc h5{font-size:12px;color:var(--a);margin-bottom:6px}
.kc p,.kc li{font-size:12px;line-height:1.75}
.kc code{background:var(--s);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--o)}
.kc pre{background:var(--cb);padding:8px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:11px;line-height:1.5;margin:6px 0}
.kc .tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;margin-right:4px}
.kc .tag.exam{background:rgba(167,113,247,.3);color:var(--p)}
.kc .tag.formula{background:rgba(210,153,29,.3);color:var(--o)}
.kc .tag.trap{background:rgba(248,81,73,.3);color:var(--r)}
.kc table{width:100%;font-size:10px;border-collapse:collapse}
.kc table td,.kc table th{border-bottom:1px solid var(--b);padding:4px 6px;text-align:left}

/* learn */
.lw{display:flex;height:calc(100vh - 0px)}
.lvs{width:230px;min-width:230px;border-right:1px solid var(--b);overflow-y:auto;background:var(--s)}
.lvs .ph{font-size:9px;color:var(--m);padding:8px 10px 3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.lvs .lv{display:flex;align-items:center;gap:5px;width:100%;padding:6px 10px;border:none;background:none;color:var(--t);font-size:11px;cursor:pointer;text-align:left;font-family:inherit}
.lvs .lv:hover{background:rgba(255,255,255,.03)}
.lvs .lv.on{background:rgba(88,166,255,.12);color:var(--a);font-weight:600}
.lvs .lv .n{font-size:9px;color:var(--m);min-width:14px}
.lvs .lv.done .n{color:var(--g)}
.lvs .lv.done .ck{display:inline;color:var(--g);font-size:10px;margin-left:auto}
.lvs .lv .ck{display:none}
.lvm{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lvb{flex:1;display:flex;overflow:hidden}
.lvl{flex:1;overflow-y:auto;padding:14px;min-width:280px}
.lvr{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--b);min-width:350px}
.lvr .eh{padding:6px 12px;border-bottom:1px solid var(--b);font-size:10px;color:var(--m);flex-shrink:0}
.lvr .ew{flex:1;display:flex;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12px;line-height:1.55}
.lvr .ln{background:var(--s);color:var(--m);padding:8px 0;text-align:right;overflow:hidden;width:36px;flex-shrink:0;font-size:12px;line-height:1.55}
.lvr .ln div{padding:0 6px}
.lvr textarea.code{flex:1;background:var(--cb);color:var(--t);border:none;padding:8px;resize:none;font-family:inherit;font-size:12px;line-height:1.55;tab-size:4;outline:none}
.lvr .op{border-top:1px solid var(--b);flex-shrink:0}
.lvr .op .oh{padding:4px 12px;font-size:9px;color:var(--m);border-bottom:1px solid var(--b)}
.lvr .op .oo{background:#000;padding:8px 12px;font-family:'Consolas',monospace;font-size:11px;min-height:40px;max-height:150px;overflow-y:auto;white-space:pre-wrap}
.lvr .ba{display:flex;gap:6px;padding:8px 12px;flex-shrink:0;flex-wrap:wrap}
.btn{padding:5px 12px;border-radius:5px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:11px;cursor:pointer;font-family:inherit}
.btn:hover{background:rgba(255,255,255,.06)}
.btn.pm{background:var(--a);color:#fff;border-color:var(--a)}
.kb{background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.65}
.kb h4{font-size:12px;color:var(--a);margin-bottom:4px}
.kb code{background:var(--s);padding:1px 4px;border-radius:3px;font-size:11px;color:var(--o)}
.kb pre{background:var(--cb);padding:6px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:11px;line-height:1.5;margin:4px 0}
.exm{background:rgba(167,113,247,.06);border:1px solid rgba(167,113,247,.2);border-radius:8px;padding:6px 10px;margin-bottom:10px;font-size:11px;color:var(--p);line-height:1.5}
.iso{background:var(--s);border-radius:6px;padding:8px;font-size:11px;margin-top:10px}
.iso .il{font-size:9px;color:var(--m);margin-bottom:2px;font-weight:600}
.iso pre{margin:0;background:var(--cb);padding:4px;border-radius:4px}
.je{margin:10px 0;border:1px solid var(--b);border-radius:6px;padding:10px}
.je textarea{width:100%;background:var(--bg);color:var(--t);border:1px solid var(--b);border-radius:4px;padding:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:60px;line-height:1.6}
.je textarea:focus{outline:none;border-color:var(--a)}
#toast{position:fixed;top:16px;right:16px;padding:8px 14px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;background:#1a3c1a;color:var(--g);border:1px solid var(--g)}
#toast.show{opacity:1}
@media(max-width:900px){#sb{display:none}.lw{flex-direction:column}.lvs{width:100%;min-width:auto;max-height:100px}.lvb{flex-direction:column}}
</style>
</head>
<body>

<div id="sb">
  <div class="sb-logo" onclick="switchTab(0)">🎯 C语言学习平台<span>复旦机考 + 408数据结构</span></div>
  <button class="sb-btn on" onclick="switchTab(0)"><span class="ico">📊</span> 学习总览</button>
  <button class="sb-btn" onclick="switchTab(1)"><span class="ico">🧱</span> C语言基础</button>
  <button class="sb-btn" onclick="switchTab(2)"><span class="ico">📖</span> 408数据结构</button>
  <button class="sb-btn" onclick="switchTab(3)"><span class="ico">🖥️</span> 复旦机考</button>
  <button class="sb-btn" onclick="switchTab(4)"><span class="ico">📝</span> 学习日志</button>
  <button class="sb-btn" onclick="switchTab(5)"><span class="ico">📚</span> C语言百科</button>
  <button class="sb-btn" onclick="switchTab(6)"><span class="ico">📚</span> 408百科</button>
</div>

<div id="main">
  <!-- TAB 0: DASHBOARD -->
  <div class="tab on" id="tab0"><div style="padding:16px"><p style="color:var(--m)">⏳ 加载中...</p></div></div>

  <!-- TAB 1: C语言基础 -->
  <div class="tab" id="tab1"><div class="lw"><div class="lvs" id="lvs-c"></div><div class="lvm"><div class="lvb"><div class="lvl" id="lvl-c"></div><div class="lvr"><div class="eh">📝 main.c</div><div class="ew"><div class="ln" id="ln-c"><div>1</div></div><textarea class="code" id="code-c" spellcheck="false"></textarea></div><div class="ba"><button class="btn pm" onclick="runCode('c')">▶ 运行</button><button class="btn" onclick="resetCode('c')">↺ 重置</button></div><div class="op"><div class="oh">📤 输出</div><div class="oo" id="out-c">— 点击运行查看结果 —</div></div></div></div></div></div>

  <!-- TAB 2: 408数据结构 -->
  <div class="tab" id="tab2"><div class="lw"><div class="lvs" id="lvs-ds"></div><div class="lvm"><div class="lvb"><div class="lvl" id="lvl-ds"></div><div class="lvr"><div class="eh">📝 main.c</div><div class="ew"><div class="ln" id="ln-ds"><div>1</div></div><textarea class="code" id="code-ds" spellcheck="false"></textarea></div><div class="ba"><button class="btn pm" onclick="runCode('ds')">▶ 运行</button><button class="btn" onclick="resetCode('ds')">↺ 重置</button></div><div class="op"><div class="oh">📤 输出</div><div class="oo" id="out-ds">— 点击运行查看结果 —</div></div></div></div></div></div>

  <!-- TAB 3: 复旦机考 -->
  <div class="tab" id="tab3"><div class="lw"><div class="lvs" id="lvs-fd"></div><div class="lvm"><div class="lvb"><div class="lvl" id="lvl-fd"></div><div class="lvr"><div class="eh">📝 main.c</div><div class="ew"><div class="ln" id="ln-fd"><div>1</div></div><textarea class="code" id="code-fd" spellcheck="false"></textarea></div><div class="ba"><button class="btn pm" onclick="runCode('fd')">▶ 运行</button><button class="btn" onclick="resetCode('fd')">↺ 重置</button></div><div class="op"><div class="oh">📤 输出</div><div class="oo" id="out-fd">— 点击运行查看结果 —</div></div></div></div></div></div>

  <!-- TAB 4: 学习日志 -->
  <div class="tab" id="tab4"><div style="padding:16px;max-width:800px"><h3>📝 学习日志</h3><div id="journal-area" style="margin-top:12px"></div></div></div>

  <!-- TAB 5: C语言百科 -->
  <div class="tab" id="tab5"><div style="padding:16px;max-width:900px" id="cref-area"></div></div>

  <!-- TAB 6: 408百科 -->
  <div class="tab" id="tab6"><div style="padding:16px;max-width:900px" id="dsk-area"></div></div>
</div>
<div id="toast"></div>

<script>
// ===================== 超可靠切换 =====================
function switchTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.sb-btn').forEach((b,i)=>b.classList.toggle('on',i===n));
  var el=document.getElementById('tab'+n);
  if(el){el.classList.add('on');}
  if(n===0)buildDash();
  if(n===1)initLearn('c');
  if(n===2)initLearn('ds');
  if(n===3)initLearn('fd');
  if(n===4)buildJournal();
  if(n===5)buildCRef();
  if(n===6)buildDSKnow();
}

// ===================== 存储 =====================
function g(k){try{return JSON.parse(localStorage[k]||'{}')}catch(e){return{}}}
function s(k,v){localStorage[k]=JSON.stringify(v)}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';setTimeout(function(){t.className=''},2500)}
var TODAY=(new Date()).toISOString().slice(0,10);
var K={C:'cs_mod_c',DS:'cs_mod_ds',FD:'cs_mod_fd',J:'cs_journal'};
var curLvC=0,curLvDS=0,curLvFD=0;

// ===================== DASHBOARD =====================
function buildDash(){
  var cd=Object.values(g(K.C)).filter(function(v){return v}).length;
  var dd=Object.values(g(K.DS)).filter(function(v){return v}).length;
  var fd=Object.values(g(K.FD)).filter(function(v){return v}).length;
  var tc=LV_C.length,td=LV_DS.length,tf=LV_FD.length;
  var all=cd+dd+fd,total=tc+td+tf;
  var j=g(K.J);var d=new Date();var streak=0;
  for(var i=0;i<365;i++){var k=d.toISOString().slice(0,10);if(j[k]&&j[k].trim())streak++;else if(i>0)break;d.setDate(d.getDate()-1);}
  var cal=makeCal((new Date()).getFullYear(),(new Date()).getMonth());
  var tdv=j[TODAY]||'';
  document.getElementById('tab0').innerHTML=
  '<div class="dg">'+
  '<div class="sc"><div class="lb">总闯关</div><div class="vl vg">'+all+'/'+total+'</div><div class="sb">'+Math.round(all/total*100)+'%</div><div class="pb"><div class="fl" style="width:'+Math.round(all/total*100)+'%"></div></div></div>'+
  '<div class="sc"><div class="lb">C语言</div><div class="vl vb">'+cd+'/'+tc+'</div><div class="sb">基础语法+指针</div></div>'+
  '<div class="sc"><div class="lb">408</div><div class="vl vp">'+dd+'/'+td+'</div><div class="sb">真题考点</div></div>'+
  '<div class="sc"><div class="lb">复旦机考</div><div class="vl vo">'+fd+'/'+tf+'</div><div class="sb">真题题型</div></div>'+
  '<div class="sc"><div class="lb">🔥 连续学习</div><div class="vl vo">'+streak+'天</div><div class="sb">每天写一点</div></div>'+
  '<div class="sc"><div class="lb">知识库</div><div class="vl vp">2本</div><div class="sb">C百科+408百科</div></div>'+
  '</div>'+
  '<div style="margin:0 16px 8px;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px"><h3 style="font-size:13px;color:var(--a);margin-bottom:6px">📅 '+(new Date()).getFullYear()+'年'+((new Date()).getMonth()+1)+'月</h3><div class="cal">'+cal+'</div></div>'+
  '<div style="margin:0 16px 16px;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px"><h3 style="font-size:13px;color:var(--a);margin-bottom:6px">✏️ 今日记录（可跳过）</h3><div class="je"><textarea id="jtoday">'+esc(tdv)+'</textarea><button class="btn pm" style="margin-top:6px" onclick="saveJToday()">💾 保存</button></div></div>';
}

function saveJToday(){var j=g(K.J);var v=document.getElementById('jtoday').value;j[TODAY]=v;s(K.J,j);toast('✅ 已保存')}

function makeCal(y,m){
  var j=g(K.J);var f=new Date(y,m,1);var start=f.getDay();var dim=new Date(y,m+1,0).getDate();
  var h='';var wds=['日','一','二','三','四','五','六'];
  for(var i=0;i<7;i++)h+='<div class="dl">'+wds[i]+'</div>';
  for(var i=0;i<start;i++)h+='<div class="dy om"></div>';
  for(var d=1;d<=dim;d++){
    var key=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='dy';if(key===TODAY)cls+=' td';if(j[key]&&j[key].trim())cls+=' hn';else cls+=' em';
    h+='<div class="'+cls+'" onclick="editDay(\''+key+'\')" title="'+key+'">'+d+'</div>';
  }
  return h;
}

function editDay(k){
  var j=g(K.J);var note=j[k]||'';
  var content=prompt('📅 '+k+'\n记录学习内容（可为空）：',note);
  if(content!==null){j[k]=content;s(K.J,j);buildDash();toast('✅ '+k+' 已更新')}
}

// ===================== JOURNAL =====================
function buildJournal(){
  var j=g(K.J);var ks=Object.keys(j).filter(function(k){return k!=='_tc'}).sort().reverse().slice(0,60);
  var area=document.getElementById('journal-area');
  var cal=makeCal((new Date()).getFullYear(),(new Date()).getMonth());
  var h='<div style="background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:16px"><h4 style="font-size:12px;color:var(--a);margin-bottom:6px">📅 '+(new Date()).getFullYear()+'年'+((new Date()).getMonth()+1)+'月</h4><div class="cal">'+cal+'</div></div>';
  h+='<h4 style="font-size:13px;color:var(--m);margin-bottom:8px">最近记录</h4>';
  if(ks.length)for(var i=0;i<ks.length;i++){var k=ks[i];h+='<div style="background:var(--s);border:1px solid var(--b);border-radius:8px;padding:10px;margin-bottom:8px;font-size:12px;line-height:1.6"><div style="font-size:10px;color:var(--m);margin-bottom:2px">📅 '+k+'</div>'+esc(j[k]||'(空)')+'</div>';}
  else h+='<p style="color:var(--m)">还没有日志。点击日历上的日期即可记录。</p>';
  area.innerHTML=h;
}

// ===================== LEVEL DATA =====================
// --- C语言基础 (大白话版) ---
var LV_C=[
{ph:'认识C语言',tg:'语法',df:'⭐',ti:'Hello World',de:'让电脑说"Hello, World!"。每个C程序从main()这个大门口开始。',tp:'#include <stdio.h>\n\nint main(){\n  printf("Hello, World!\\n");\n  return 0;\n}',ex:'Hello, World!\n',
 kn:'<code>#include</code> = "去工具箱里拿工具"。<code>stdio.h</code> 是装输入输出工具的工具箱。<br><code>int main(){}</code> = 程序的大门，电脑从这里开始干活。<br><code>printf()</code> = 在屏幕上打印东西。<code>\\n</code> = 回车换行，就像打字机打完一行要"叮"一声换行。<br><code>return 0;</code> = "我干完了，一切正常"，跟操作系统报告一声。<br><br><b>💡 大白话</b>：写C程序=写一份"菜谱"，main是第一步，printf就像喊一嗓子让电脑在屏幕上显示文字。'},
{ph:'认识C语言',tg:'语法',df:'⭐',ti:'变量=贴标签的盒子',de:'声明int age=20，用printf输出"年龄: 20"。',tp:'#include <stdio.h>\n\nint main(){\n  int age=20;\n  printf("年龄: %d\\n",age);\n  return 0;\n}',ex:'年龄: 20\n',
 kn:'<b>变量</b> = 一个有名字的小盒子，用来装数据。<br><code>int age = 20</code> = "拿一个只能装整数的盒子，贴上标签age，里面放20"。<br><code>printf("年龄: %d", age)</code> = %d是个洞，age的值会填进这个洞里。<br><br><b>💡 盒子种类</b>：<code>int</code>(整数盒子)、<code>float</code>(小数盒子)、<code>char</code>(装单个字符的盒子)。<br><b>⚠️ 常见错误</b>：printf里写了%d但忘了给变量→打印出来是乱码！'},
{ph:'认识C语言',tg:'语法',df:'⭐',ti:'scanf=让用户填盒子',de:'读入名字，输出"你好, xxx!"',tp:'#include <stdio.h>\n\nint main(){\n  char name[100];\n  scanf("%s",name);\n  printf("你好, %s!\\n",name);\n  return 0;\n}',ex:'你好, Tom!\n',si:'Tom',

var lvState={c:{cur:0,levels:LV_C,k:K.C},ds:{cur:0,levels:LV_DS,k:K.DS},fd:{cur:0,levels:LV_FD,k:K.FD}};

function buildLvSidebar(mk){
  var st=lvState[mk];var levels=st.levels;var done=g(st.k);
  var h='',lastPh='';
  for(var i=0;i<levels.length;i++){
    var l=levels[i];
    if(l.ph!==lastPh){h+='<div class="ph">📌 '+l.ph+'</div>';lastPh=l.ph;}
    h+='<button class="lv'+(i===st.cur?' on':'')+(done[i]?' done':'')+'" onclick="goLevel(\''+mk+'\','+i+')"><span class="n">'+(i+1)+'</span>'+l.ti+'<span class="ck">✓</span></button>';
  }
  var sb=document.getElementById('lvs-'+mk);if(sb)sb.innerHTML=h;
}

function goLevel(mk,i){
  var st=lvState[mk];st.cur=i;var l=st.levels[i];var done=g(st.k);
  var ck='lv_code_'+mk+'_'+i;
  // update sidebar
  var sbs=document.querySelectorAll('#lvs-'+mk+' .lv');
  for(var j=0;j<sbs.length;j++){sbs[j].classList.toggle('on',j===i);sbs[j].classList.toggle('done',!!done[j]);}
  // update code
  var ta=document.getElementById('code-'+mk);ta.value=localStorage[ck]||l.tp;
  updateLn(mk);
  // update left panel
  var left=document.getElementById('lvl-'+mk);
  var kh=l.kn?'<div class="kb"><h4>📖 大白话讲解</h4>'+l.kn+'</div>':'';
  if(l.et)kh+='<div class="exm">🎯 <b>真题链接</b>：'+l.et+'</div>';
  var io='<div class="iso">';
  if(l.si)io+='<div class="il">📥 样例输入</div><pre>'+esc(l.si)+'</pre>';
  io+='<div class="il">📤 期望输出</div><pre>'+esc(l.ex)+'</pre></div>';
  left.innerHTML='<h3 style="font-size:16px;margin-bottom:4px">关卡 '+(i+1)+': '+l.ti+'</h3><div style="font-size:10px;color:var(--m);margin-bottom:10px">'+l.ph+' · '+l.tg+'</div>'+kh+'<p style="font-size:13px;line-height:1.7;margin-bottom:10px">'+l.de+'</p>'+io;
  // reset output
  var out=document.getElementById('out-'+mk);out.textContent='— 点击运行查看结果 —';out.style.color='var(--m)';
}

function updateLn(mk){
  var ta=document.getElementById('code-'+mk);if(!ta)return;
  var n=ta.value.split('\n').length;var h='';
  for(var i=1;i<=n;i++)h+='<div>'+i+'</div>';
  var ln=document.getElementById('ln-'+mk);if(ln)ln.innerHTML=h;
}

function initLearn(mk){
  buildLvSidebar(mk);goLevel(mk,lvState[mk].cur);
  var ta=document.getElementById('code-'+mk);
  ta.oninput=function(){updateLn(mk)};
  ta.onkeydown=function(e){if(e.key==='Tab'){e.preventDefault();var s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}};
  ta.onscroll=function(){var ln=document.getElementById('ln-'+mk);if(ln)ln.scrollTop=ta.scrollTop};
}

    if(d.compile&&d.compile.stderr)re+='【编译错误】\n'+d.compile.stderr+'\n';

    if(d.run&&d.run.stdout)re+=d.run.stdout;
