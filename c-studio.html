<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>C语言学习总控台 — 复旦机考+408数据结构</title>
<style>
:root{--bg:#0d1117;--s:#161b22;--b:#30363d;--t:#c9d1d9;--m:#8b949e;--a:#58a6ff;--g:#3fb950;--o:#d2991d;--r:#f85149;--p:#a371f7;--cb:#0d1117;--pk:#f778ba}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex;overflow:hidden}

#sidebar{width:260px;min-width:260px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden}
#sidebar .logo{padding:16px;font-size:16px;font-weight:700;color:var(--a);border-bottom:1px solid var(--b)}
#sidebar .logo span{font-size:11px;color:var(--m);display:block;font-weight:400;margin-top:2px}
.tab-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;border:none;background:none;color:var(--m);font-size:14px;cursor:pointer;text-align:left;transition:all .15s;border-left:3px solid transparent}
.tab-btn:hover{color:var(--t);background:rgba(255,255,255,.03)}
.tab-btn.active{color:var(--a);background:rgba(88,166,255,.08);border-left-color:var(--a);font-weight:600}
.tab-btn .icon{font-size:18px;width:24px;text-align:center}
.tab-btn .badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--a);color:#fff;margin-left:auto}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tab-content{flex:1;overflow-y:auto}

/*===== DASHBOARD =====*/
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;padding:20px}
.stat-card{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:16px}
.stat-card .label{font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-card .value{font-size:28px;font-weight:700}
.stat-card .sub{font-size:12px;color:var(--m);margin-top:4px}
.value.green{color:var(--g)} .value.blue{color:var(--a)} .value.orange{color:var(--o)} .value.purple{color:var(--p)}

.dash-section{margin:0 20px 20px;background:var(--s);border:1px solid var(--b);border-radius:10px;padding:16px;overflow:hidden}
.dash-section h3{font-size:14px;color:var(--a);margin-bottom:12px}

.progress-bar{height:8px;background:var(--b);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-bar .fill{height:100%;background:var(--g);border-radius:4px;transition:width .5s}

.plan-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--b);font-size:13px}
.plan-row:last-child{border-bottom:none}
.plan-row .check{width:20px;height:20px;border-radius:50%;border:2px solid var(--b);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s}
.plan-row .check.done{background:var(--g);border-color:var(--g);color:#fff}
.plan-row .task{flex:1}
.plan-row .time{color:var(--m);font-size:11px;white-space:nowrap}

/*===== JOURNAL =====*/
.journal-entry{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px;margin-bottom:12px}
.journal-entry .date{font-size:11px;color:var(--m);margin-bottom:6px}
.journal-entry textarea{width:100%;background:var(--bg);color:var(--t);border:1px solid var(--b);border-radius:4px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;min-height:60px;line-height:1.6}
.journal-entry textarea:focus{outline:none;border-color:var(--a)}
.journal-entry .save-btn{margin-top:8px;font-size:11px}
.journal-list{font-size:13px}
.journal-list .item{padding:10px 0;border-bottom:1px solid var(--b);line-height:1.6}
.journal-list .item .jdate{font-size:10px;color:var(--m)}
.journal-list .item .jtext{margin-top:4px}

/*===== CHECKLIST =====*/
.cl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.cl-chapter{background:var(--bg);border:1px solid var(--b);border-radius:8px;padding:14px}
.cl-chapter h4{font-size:13px;color:var(--a);margin-bottom:8px}
.cl-chapter .item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;cursor:pointer}
.cl-chapter .item input[type=checkbox]{accent-color:var(--g)}
.cl-chapter .item.done{color:var(--g);text-decoration:line-through}

/*===== BUTTONS =====*/
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.06)}
.btn.primary{background:var(--a);color:#fff;border-color:var(--a)}
.btn.small{padding:4px 10px;font-size:11px}

/*===== TOAST =====*/
#toast{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.ok{background:#1a3c1a;color:var(--g);border:1px solid var(--g)}

/*===== LEARN TAB (compact from c-levels) =====*/
.learn-layout{display:flex;height:100%}
.learn-sidebar{width:240px;min-width:240px;border-right:1px solid var(--b);overflow-y:auto;background:var(--s)}
.learn-sidebar .ph{font-size:10px;color:var(--m);padding:10px 12px 4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.learn-sidebar .lv{display:flex;align-items:center;gap:6px;width:100%;padding:7px 12px;border:none;background:none;color:var(--t);font-size:12px;cursor:pointer;text-align:left;border-radius:0;transition:background .1s}
.learn-sidebar .lv:hover{background:rgba(255,255,255,.03)}
.learn-sidebar .lv.active{background:rgba(88,166,255,.12);color:var(--a);font-weight:600}
.learn-sidebar .lv .n{font-size:10px;color:var(--m);min-width:16px}
.learn-sidebar .lv.done .n{color:var(--g)}
.learn-sidebar .lv .ck{color:var(--g);font-size:12px;margin-left:auto;display:none}
.learn-sidebar .lv.done .ck{display:inline}

.learn-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.learn-body{flex:1;display:flex;overflow:hidden}
.learn-left{flex:1;overflow-y:auto;padding:16px;min-width:280px}
.learn-right{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--b);min-width:350px}
.learn-right .editor-hd{padding:8px 14px;border-bottom:1px solid var(--b);font-size:11px;color:var(--m);flex-shrink:0}
.learn-right .editor-wrap{flex:1;display:flex;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:13px;line-height:1.6}
.learn-right .ln{background:var(--s);color:var(--m);padding:10px 0;text-align:right;overflow:hidden;width:40px;flex-shrink:0;font-size:13px;line-height:1.6}
.learn-right .ln div{padding:0 8px}
.learn-right textarea.code{flex:1;background:var(--cb);color:var(--t);border:none;padding:10px;resize:none;font-family:inherit;font-size:13px;line-height:1.6;tab-size:4;outline:none}
.learn-right .out-panel{border-top:1px solid var(--b);flex-shrink:0}
.learn-right .out-hd{padding:6px 14px;font-size:10px;color:var(--m);border-bottom:1px solid var(--b)}
.learn-right .out{background:#000;padding:10px 14px;font-family:'Consolas',monospace;font-size:12px;min-height:50px;max-height:160px;overflow-y:auto;white-space:pre-wrap}
.learn-right .btns{display:flex;gap:6px;padding:8px 14px;flex-shrink:0;flex-wrap:wrap}

.kb{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px;line-height:1.7}
.kb h4{font-size:12px;color:var(--a);margin-bottom:6px}
.kb code{background:var(--s);padding:1px 5px;border-radius:3px;font-size:12px;color:var(--o)}
.kb pre{background:var(--cb);padding:8px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:12px;line-height:1.5;margin:4px 0}
.exam{background:rgba(167,113,247,.08);border:1px solid rgba(167,113,247,.25);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--p);line-height:1.6}

@media(max-width:900px){#sidebar{display:none}.learn-layout{flex-direction:column}.learn-sidebar{width:100%;min-width:auto;max-height:120px}}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">🎯 C语言总控台<span>复旦机考 + 408数据结构</span></div>

<div id="main">
  <div id="tab-content"></div>

{ph:'从这里开始',tg:'排序',df:'⭐⭐',ti:'冒泡排序',de:'读入N个数，冒泡排序后输出。408排序第一课。',tp:'#include <stdio.h>\n\nint main() {\n    int N;scanf("%d",&N);int a[N];\n    for(int i=0;i<N;i++)scanf("%d",&a[i]);\n    // 冒泡\n    \n    for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");\n    return 0;\n}',ex:'1 2 3 5 7 \n',si:'5\n5 2 7 1 3',hi:'双层循环: for(i=0;i<N-1;i++) for(j=0;j<N-1-i;j++) if(a[j]>a[j+1])swap',so:'#include <stdio.h>\n\nint main() {\n    int N;scanf("%d",&N);int a[N];\n    for(int i=0;i<N;i++)scanf("%d",&a[i]);\n    for(int i=0;i<N-1;i++)for(int j=0;j<N-1-i;j++)\n        if(a[j]>a[j+1]){int t=a[j];a[j]=a[j+1];a[j+1]=t;}\n    for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");\n    return 0;\n}',

function switchTab(t){
  curTab=t;

function saveTodayJournal(){
  const today=new Date().toISOString().slice(0,10);
  const j=g(K_JOURNAL);j[today]=document.getElementById('journal-today').value;
  s(K_JOURNAL,j);toast('✅ 已保存');
}

function calcStreak(j){
  let streak=0,d=new Date();
  for(let i=0;i<365;i++){
    const k=d.toISOString().slice(0,10);
    if(j[k]&&j[k].trim())streak++;else if(i>0)break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function count408(){
  const c=g(K_408);const total=35,dn=Object.values(c).filter(v=>v).length;
  return Math.round(dn/total*100);
}

function nextMilestone(){
  const c=g(K_DONE),dn=Object.values(c).filter(v=>v).length;
  const milestones=[{n:5,t:'🎯 入门阶段完成',s:'2天'},{n:10,t:'🎯 基础语法通关',s:'5天'},{n:15,t:'🎯 指针开悟',s:'7天'},{n:20,t:'🎯 线性表掌握',s:'10天'},{n:25,t:'🎯 树与图入门',s:'14天'},{n:30,t:'🎯 排序算法全通关',s:'18天'},{n:34,t:'🏆 全部通关！',s:'21天'}];

    html+=`<div class="cl-chapter"><h4>${ch.name}</h4>`;
    ch.items.forEach((it,i2)=>{
      const key=`${idx}_${i2}`;
      html+=`<div class="item${c[key]?' done':''}" onclick="toggle408('${key}')"><input type="checkbox" ${c[key]?'checked':''}>${it}</div>`;
    });
    html+='</div>';
  });
  html+='</div></div>';
  document.getElementById('tab-content').innerHTML=html;
}
function toggle408(key){const c=g(K_408);c[key]=!c[key];s(K_408,c);render408()}

// ==================== LEARN TAB ====================
let learnInited=false;
function renderLearn(){
  if(!learnInited){initLearn();learnInited=true;}
}
function initLearn(){
  const c=g(K_DONE);
  let lvHtml='',lastPh='',activeDone=false;
  L.forEach((l,i)=>{if(l.ph!==lastPh){lvHtml+=`<div class="ph">📌 ${l.ph}</div>`;lastPh=l.ph;}
    const cls=(i===curLv?'active ':'')+(c[i]?'done':'');
    lvHtml+=`<button class="lv ${cls}" onclick="goLv(${i})"><span class="n">${i+1}</span>${l.ti}<span class="ck">✓</span></button>`;});

  const h=`<div class="learn-layout">
    <div class="learn-sidebar">${lvHtml}</div>
    <div class="learn-main"><div class="learn-body">
      <div class="learn-left" id="learn-left"></div>
      <div class="learn-right">
        <div class="editor-hd">📝 main.c</div>
        <div class="editor-wrap"><div class="ln" id="ln"><div>1</div></div><textarea class="code" id="code-input" spellcheck="false"></textarea></div>
        <div id="hint-box" style="display:none;margin:0 14px 8px;padding:8px 12px;background:rgba(210,153,29,.1);border:1px solid rgba(210,153,29,.3);border-radius:6px;font-size:12px;color:var(--o);line-height:1.6"></div>
        <div class="btns"><button class="btn primary" onclick="run()">▶ 运行</button><button class="btn" onclick="hint()">💡 提示</button><button class="btn" onclick="solution()">🔑 答案</button><button class="btn" onclick="reset()">↺ 重置</button></div>
        <div class="out-panel"><div class="out-hd">📤 输出</div><div class="out" id="out" style="color:var(--m)">— 点击"运行代码"查看结果 —</div></div>
      </div>
    </div></div>
  </div>`;
  document.getElementById('tab-content').innerHTML=h;
  document.getElementById('code-input').addEventListener('input',updateLn);
  document.getElementById('code-input').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const ta=e.target;const s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}});
  goLv(curLv);
}

function goLv(i){
  curLv=i;const l=L[i];
  document.querySelectorAll('.learn-sidebar .lv').forEach((b,j)=>b.classList.toggle('active',j===i));
  const code=document.getElementById('code-input');
  code.value=gs(i)||l.tp;
  const left=document.getElementById('learn-left');
  let kh=l.kn?`<div class="kb">${l.kn}</div>`:'';
  if(l.et)kh+=`<div class="exam">🎯 <strong>408/机考考点</strong>：${l.et}</div>`;
  let io=`<div style="background:var(--s);border-radius:6px;padding:12px;font-size:13px">`;
  if(l.si)io+=`<div style="font-size:11px;color:var(--m);margin-bottom:4px">📥 样例输入</div><pre style="margin:0 0 8px;background:var(--cb);padding:8px;border-radius:4px">${escHtml(l.si)}</pre>`;
  io+=`<div style="font-size:11px;color:var(--m);margin-bottom:4px">📤 期望输出</div><pre style="margin:0;background:var(--cb);padding:8px;border-radius:4px">${escHtml(l.ex)}</pre></div>`;
  left.innerHTML=`<h3 style="font-size:17px;margin-bottom:4px">关卡 ${i+1}: ${l.ti}</h3>
    <div style="font-size:11px;color:var(--m);margin-bottom:12px">${l.ph} · ${l.df} · ${l.tg}</div>
    ${kh}<p style="font-size:14px;line-height:1.7;margin-bottom:12px">${l.de}</p>${io}`;
  document.getElementById('hint-box').style.display='none';
  document.getElementById('out').textContent='— 点击"运行代码"查看结果 —';document.getElementById('out').style.color='var(--m)';
  updateLn();localStorage['cs_cur_lv']=i;document.getElementById('lv-badge').textContent=Object.values(g(K_DONE)).filter(v=>v).length+'/'+L.length;
}

function updateLn(){const ta=document.getElementById('code-input');const n=ta.value.split('\n').length;let h='';for(let i=1;i<=Math.max(n,1);i++)h+=`<div>${i}</div>`;document.getElementById('ln').innerHTML=h;const lv=g(K_DONE);if(!lv[curLv]){const cd=ta.value.trim();const tp=L[curLv].tp.trim();if(cd&&cd!==tp&&cd.replace(/\s/g,'')!==tp.replace(/\s/g,'')){s(K_CODE+curLv,ta.value)}}}

async function run(){
  const code=document.getElementById('code-input').value;const l=L[curLv];s(K_CODE+curLv,code);
  const out=document.getElementById('out');out.textContent='⏳ 编译中...';out.style.color='#d2991d';
  try{
    const r=await fetch('https://emkc.org/api/v2/piston/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:'c',version:'10.2.0',files:[{name:'main.c',content:code}],stdin:l.si||'',run_timeout:5000,compile_timeout:10000})});
    const d=await r.json();out.style.color='#0f0';let re='';
    if(d.compile&&d.compile.stderr)re+='【编译错误】\n'+d.compile.stderr+'\n';
    if(d.run&&d.run.stderr)re+=(re?'\n':'')+'【运行错误】\n'+d.run.stderr+'\n';
    if(d.run&&d.run.stdout)re+=d.run.stdout;
    if(!re)re='(无输出)';out.textContent=re;
    if(d.run&&d.run.stdout&&d.run.stdout===l.ex&&(!d.compile||!d.compile.stderr)){
      const c=g(K_DONE);c[curLv]=true;s(K_DONE,c);
      const j=g(K_JOURNAL);const today=new Date().toISOString().slice(0,10);j._today_count=(j._today_count||0)+1;s(K_JOURNAL,j);
      initLearn();document.getElementById('lv-badge').textContent=Object.values(g(K_DONE)).filter(v=>v).length+'/'+L.length;
      renderSidebar();toast('✅ 通关！');
    }
  }catch(e){out.style.color='var(--m)';out.textContent='⚠️ 在线编译器不可用\n\n请在本地运行：\n  gcc main.c -o main && ./main\n\n'+(l.si?'输入：'+l.si+'\n':'')+'期望输出：'+l.ex;}
}
function hint(){const b=document.getElementById('hint-box');b.textContent='💡 '+L[curLv].hi;b.style.display='block'}
function solution(){if(confirm('确定看答案？')){const s=L[curLv].so;if(s.startsWith('// 已'))alert(s);else{document.getElementById('code-input').value=s;updateLn()}}}
function reset(){if(confirm('重置为模板？')){document.getElementById('code-input').value=L[curLv].tp;updateLn();document.getElementById('hint-box').style.display='none'}}

function renderSidebar(){
  document.querySelectorAll('.tab-btn')[0].querySelector('.badge').textContent=(Object.values(g(K_DONE)).filter(v=>v).length)+'/'+L.length;
}

// ==================== HELPERS ====================
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.className='show ok';setTimeout(()=>t.className='',2500)}

// ==================== INIT ====================
const savedLv=parseInt(localStorage['cs_cur_lv'])||0;curLv=Math.min(savedLv,L.length-1);
renderSidebar();switchTab(0);
</script>
</body>
</html>
