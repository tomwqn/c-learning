.kb{background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.65}

<script>
var LFD=[{ph:'热身：模拟题',tg:'模拟',df:'⭐',ti:'BMI分类(2025真题1)',de:'输入身高(cm)体重(kg)，输出BMI等级。',tp:'#include <stdio.h>\nint main(){float h,w,bmi;scanf("%f%f",&h,&w);h/=100;bmi=w/(h*h);\nif(bmi<18.5)printf("Thin\\n");else if(bmi<24)printf("Normal\\n");else if(bmi<28)printf("Overweight\\n");else printf("Fat\\n");return 0;}',ex:'Normal\n',si:'170 65',kn:'BMI=体重/身高²。简单模拟题考边界条件。',et:'2025复旦真题第1题'},
{ph:'热身：模拟题',tg:'模拟',df:'⭐⭐',ti:'日期差值(2019真题)',de:'两个日期相差多少天。',tp:'#include <stdio.h>\nint leap(int y){return(y%4==0&&y%100!=0)||y%400==0;}\nint doy(int y,int m,int d){int ds[]={0,31,28,31,30,31,30,31,31,30,31,30,31};if(leap(y))ds[2]=29;int s=0;for(int i=1;i<m;i++)s+=ds[i];return s+d;}\nint main(){int y1,m1,d1,y2,m2,d2;scanf("%d%d%d%d%d%d",&y1,&m1,&d1,&y2,&m2,&d2);\nint ans=0;if(y1==y2)ans=doy(y2,m2,d2)-doy(y1,m1,d1);else{ans+=doy(y1,12,31)-doy(y1,m1,d1)+1;ans+=doy(y2,m2,d2);for(int y=y1+1;y<y2;y++)ans+=(leap(y)?366:365);}\nprintf("%d\\n",ans);return 0;}',ex:'10\n',si:'2019 2 5 2019 2 15',kn:'同年：dayOfYear相减。跨年：首年末+尾年初+中间整年。',et:'2019复旦真题'},
{ph:'热身：模拟题',tg:'模拟',df:'⭐⭐',ti:'螺旋矩阵(2025真题2)',de:'生成N×N顺时针螺旋矩阵。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[20][20],t=0,b=N-1,l=0,r=N-1,c=1;\nwhile(t<=b&&l<=r){for(int i=l;i<=r;i++)a[t][i]=c++;t++;\nfor(int i=t;i<=b;i++)a[i][r]=c++;r--;\nif(t<=b)for(int i=r;i>=l;i--)a[b][i]=c++;b--;\nif(l<=r)for(int i=b;i>=t;i--)a[i][l]=c++;l++;}\nfor(int i=0;i<N;i++){for(int j=0;j<N;j++)printf("%3d",a[i][j]);printf("\\n");}return 0;}',ex:'  1  2  3\n  8  9  4\n  7  6  5\n',si:'3',kn:'维护上下左右四边界，每走完一边收缩。',et:'2025复旦真题第2题'},
{ph:'贪心',tg:'贪心',df:'⭐⭐⭐',ti:'打地鼠(2020真题)',de:'选最多数字使排序后相邻差≥d。',tp:'#include <stdio.h>\n#include <stdlib.h>\nint cmp(const void*a,const void*b){return*(int*)a-*(int*)b;}\nint main(){int N,d;scanf("%d%d",&N,&d);int a[N];\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);qsort(a,N,sizeof(int),cmp);\nint cnt=1,last=a[0];for(int i=1;i<N;i++)if(a[i]-last>=d){cnt++;last=a[i];}\nprintf("%d\\n",cnt);return 0;}',ex:'3\n',si:'5 3\n1 2 4 8 10',kn:'排序后选第一个，找≥当前+d的最小下一个。贪心选择性质。',et:'2020复旦真题'},
{ph:'贪心',tg:'贪心',df:'⭐⭐⭐',ti:'教室分配(2025真题3)',de:'N个活动[开始,结束)，最少几个教室？',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct{int s,e;}A;\nint cmp(const void*a,const void*b){return((A*)a)->s-((A*)b)->s;}\nint main(){int N;scanf("%d",&N);A a[N];\nfor(int i=0;i<N;i++)scanf("%d%d",&a[i].s,&a[i].e);qsort(a,N,sizeof(A),cmp);\nint rooms[100],cnt=0;\nfor(int i=0;i<N;i++){int found=0;\nfor(int j=0;j<cnt;j++)if(rooms[j]<=a[i].s){rooms[j]=a[i].e;found=1;break;}\nif(!found)rooms[cnt++]=a[i].e;}\nprintf("%d\\n",cnt);return 0;}',ex:'2\n',si:'4\n1 3\n2 4\n3 5\n1 4',kn:'按开始时间排序，维护结束时间列表。可复用则复用，否则新开。',et:'2025复旦真题第3题'},
{ph:'搜索',tg:'搜索',df:'⭐⭐⭐',ti:'BFS最短路径',de:'N×M网格0可走1为墙，(0,0)到(N-1,M-1)最短步数。',tp:'#include <stdio.h>\n#define M 100\nint g[M][M],vis[M][M],N,m,dx[]={0,0,1,-1},dy[]={1,-1,0,0};\ntypedef struct{int r,c,st;}Q;\nint main(){scanf("%d%d",&N,&m);\nfor(int i=0;i<N;i++)for(int j=0;j<m;j++)scanf("%d",&g[i][j]);\nQ q[10000];int f=0,r=0;q[r++]=(Q){0,0,0};vis[0][0]=1;\nwhile(f<r){Q u=q[f++];if(u.r==N-1&&u.c==m-1){printf("%d\\n",u.st);return 0;}\nfor(int k=0;k<4;k++){int nr=u.r+dx[k],nc=u.c+dy[k];\nif(nr>=0&&nr<N&&nc>=0&&nc<m&&!g[nr][nc]&&!vis[nr][nc]){vis[nr][nc]=1;q[r++]=(Q){nr,nc,u.st+1};}}}\nprintf("No path\\n");return 0;}',ex:'4\n',si:'3 3\n0 0 0\n1 1 0\n0 0 0',kn:'BFS保证无权图第一次到达=最短。队列存(row,col,步数)。4方向dx/dy。',et:'机考搜索高频'},
{ph:'搜索',tg:'搜索',df:'⭐⭐⭐',ti:'N皇后(回溯经典)',de:'N×N棋盘放N个互相不攻击的皇后，输出方案数。',tp:'#include <stdio.h>\nint N,cnt=0,col[20],d1[40],d2[40];\nvoid dfs(int row){if(row==N){cnt++;return;}\nfor(int c=0;c<N;c++){if(!col[c]&&!d1[row+c]&&!d2[row-c+N]){col[c]=d1[row+c]=d2[row-c+N]=1;dfs(row+1);col[c]=d1[row+c]=d2[row-c+N]=0;}}}\nint main(){scanf("%d",&N);dfs(0);printf("%d\\n",cnt);return 0;}',ex:'2\n',si:'4',kn:'回溯=DFS+剪枝。列col、正对角(row+col)、反对角(row-col+N)标记。',et:'复旦回溯变种'},
{ph:'DP(复旦最高频!)',tg:'DP',df:'⭐⭐⭐⭐',ti:'01背包',de:'DP第一课。dp[j]=max(dp[j],dp[j-w[i]]+v[i])。j从大到小!',tp:'#include <stdio.h>\nint max(int a,int b){return a>b?a:b;}\nint main(){int N,C,w[100],v[100];scanf("%d%d",&N,&C);\nfor(int i=1;i<=N;i++)scanf("%d%d",&w[i],&v[i]);int dp[1001]={0};\nfor(int i=1;i<=N;i++)for(int j=C;j>=w[i];j--)dp[j]=max(dp[j],dp[j-w[i]]+v[i]);\nprintf("%d\\n",dp[C]);return 0;}',ex:'10\n',si:'3 5\n2 4\n3 5\n1 3',kn:'dp[j]=max(dp[j],dp[j-w[i]]+v[i])。<b>j从大到小</b>=每件最多选1次。j从小到大=无限选(完全背包)。',et:'机考DP第一高频'},
{ph:'DP(复旦最高频!)',tg:'DP',df:'⭐⭐⭐⭐',ti:'完全背包',de:'每件物品可选无限次。j从小到大！',tp:'#include <stdio.h>\nint max(int a,int b){return a>b?a:b;}\nint main(){int N,C,w[100],v[100];scanf("%d%d",&N,&C);\nfor(int i=1;i<=N;i++)scanf("%d%d",&w[i],&v[i]);int dp[1001]={0};\nfor(int i=1;i<=N;i++)for(int j=w[i];j<=C;j++)dp[j]=max(dp[j],dp[j-w[i]]+v[i]);\nprintf("%d\\n",dp[C]);return 0;}',ex:'15\n',si:'3 5\n2 4\n3 5\n1 3',kn:'与01背包唯一区别：<b>j从小到大</b>→dp[j-w[i]]可能已选过→实现无限选。',et:'DP核心变种'},
{ph:'DP(复旦最高频!)',tg:'DP',df:'⭐⭐⭐⭐',ti:'LIS最长上升子序列',de:'最长严格递增子序列长度。dp经典题。',tp:'#include <stdio.h>\nint max(int a,int b){return a>b?a:b;}\nint main(){int N;scanf("%d",&N);int a[N],dp[N],ans=0;\nfor(int i=0;i<N;i++){scanf("%d",&a[i]);dp[i]=1;\nfor(int j=0;j<i;j++)if(a[j]<a[i])dp[i]=max(dp[i],dp[j]+1);ans=max(ans,dp[i]);}\nprintf("%d\\n",ans);return 0;}',ex:'4\n',si:'6\n1 5 2 4 3 6',kn:'dp[i]=以a[i]结尾的LIS长度。dp[i]=max(dp[j]+1),a[j]<a[i]。O(n²)。',et:'LIS经典题'},
{ph:'DP(复旦最高频!)',tg:'DP',df:'⭐⭐⭐⭐',ti:'最长重复子数组(2024真题2)',de:'两数组最长公共连续子数组长度。',tp:'#include <stdio.h>\nint max(int a,int b){return a>b?a:b;}\nint main(){int N,M;scanf("%d%d",&N,&M);int a[N],b[M];\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);for(int i=0;i<M;i++)scanf("%d",&b[i]);\nint dp[2][101]={0},ans=0;\nfor(int i=1;i<=N;i++)for(int j=1;j<=M;j++){\nif(a[i-1]==b[j-1]){dp[i%2][j]=dp[(i-1)%2][j-1]+1;ans=max(ans,dp[i%2][j]);}else dp[i%2][j]=0;}\nprintf("%d\\n",ans);return 0;}',ex:'3\n',si:'5 4\n1 2 3 2 1\n3 2 1 4',kn:'dp[i][j]=a[i]==b[j]?dp[i-1][j-1]+1:0。取所有最大值。滚动数组优化空间。',et:'2024复旦真题第2题'},
{ph:'图论',tg:'图论',df:'⭐⭐⭐⭐',ti:'Dijkstra最短路',de:'N点M边有向图，1到N最短距离。',tp:'#include <stdio.h>\n#include <string.h>\n#define M 100\n#define INF 0x3f3f3f3f\nint G[M][M],dist[M],vis[M];\nint main(){int N,m,u,v,w;scanf("%d%d",&N,&m);memset(G,0x3f,sizeof(G));\nfor(int i=0;i<m;i++){scanf("%d%d%d",&u,&v,&w);if(w<G[u][v])G[u][v]=w;}\nmemset(dist,0x3f,sizeof(dist));memset(vis,0,sizeof(vis));dist[1]=0;\nfor(int t=1;t<=N;t++){int u=-1,md=INF;\nfor(int j=1;j<=N;j++)if(!vis[j]&&dist[j]<md){u=j;md=dist[j];}if(u==-1)break;vis[u]=1;\nfor(int v=1;v<=N;v++)if(!vis[v]&&dist[u]+G[u][v]<dist[v])dist[v]=dist[u]+G[u][v];}\nprintf("%d\\n",dist[N]);return 0;}',ex:'5\n',si:'4 5\n1 2 2\n1 3 5\n2 3 1\n2 4 5\n3 4 2',kn:'每次选最近未访问节点→标记→更新邻居。O(n²)。<span class="tag trap">⚠不能负权</span>。',et:'408+复旦双重重点'},
{ph:'图论',tg:'图论',df:'⭐⭐⭐⭐',ti:'最短路径条数(2024真题5)',de:'Dijkstra+统计最短路径有几种走法。',tp:'#include <stdio.h>\n#include <string.h>\n#define M 100\n#define INF 0x3f3f3f3f\nint G[M][M],dist[M],cnt[M],vis[M];\nint main(){int N,m,u,v,w;scanf("%d%d",&N,&m);memset(G,0x3f,sizeof(G));\nfor(int i=0;i<m;i++){scanf("%d%d%d",&u,&v,&w);G[u][v]=w;}\nmemset(dist,0x3f,sizeof(dist));memset(vis,0,sizeof(vis));dist[1]=0;cnt[1]=1;\nfor(int t=1;t<=N;t++){int u=-1,md=INF;\nfor(int j=1;j<=N;j++)if(!vis[j]&&dist[j]<md){u=j;md=dist[j];}if(u==-1)break;vis[u]=1;\nfor(int v=1;v<=N;v++)if(!vis[v]){if(dist[u]+G[u][v]<dist[v]){dist[v]=dist[u]+G[u][v];cnt[v]=cnt[u];}\nelse if(dist[u]+G[u][v]==dist[v])cnt[v]+=cnt[u];}}\nprintf("%d\\n",cnt[N]);return 0;}',ex:'2\n',si:'4 5\n1 2 1\n1 3 1\n2 4 1\n3 4 1\n2 3 1',kn:'更短→cnt[v]=cnt[u]；相同→cnt[v]+=cnt[u]。',et:'2024复旦真题第5题'},
{ph:'综合',tg:'综合',df:'⭐⭐⭐',ti:'回文判断',de:'双指针判断字符串是否回文。',tp:'#include <stdio.h>\n#include <string.h>\nint main(){char s[200];scanf("%s",s);int l=strlen(s),ok=1;\nfor(int i=0,j=l-1;i<j;i++,j--)if(s[i]!=s[j]){ok=0;break;}\nprintf(ok?"是回文\\n":"不是回文\\n");return 0;}',ex:'是回文\n',si:'radar',kn:'双指针i头j尾向中间走。都相等=回文。',et:'机考常见字符串题'},
{ph:'综合',tg:'综合',df:'⭐⭐⭐',ti:'括号匹配(栈)',de:'用栈判断括号序列合法性。',tp:'#include <stdio.h>\n#include <string.h>\nint main(){char s[200];scanf("%s",s);char stk[200];int top=-1,ok=1;\nfor(int i=0;s[i];i++){if(s[i]==\'(\')stk[++top]=\'(\';\nelse if(s[i]==\')\'){if(top>=0&&stk[top]==\'(\')top--;else{ok=0;break;}}}\nprintf(top==-1&&ok?"合法\\n":"不合法\\n");return 0;}',ex:'合法\n',si:'(())()',kn:'栈经典应用。左括号入栈，右括号看栈顶匹配→匹配则出。栈空=合法。',et:'栈经典机考题'},
{ph:'综合',tg:'综合',df:'⭐⭐⭐',ti:'二叉树子结构(2023真题)',de:'判断树B是否为树A的子树。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct T{int d;struct T*l,*r;}T;\nint same(T*a,T*b){if(!a&&!b)return 1;if(!a||!b)return 0;return a->d==b->d&&same(a->l,b->l)&&same(a->r,b->r);}\nint isSub(T*A,T*B){if(!A)return 0;if(same(A,B))return 1;return isSub(A->l,B)||isSub(A->r,B);}\n// main建树+调用省略',kn:'①same判两树完全相同 ②isSub:看根→same→否则递归左右。',et:'2023复旦真题'},
];
var cur=0,K='cs_mfd',TODAY=(new Date()).toISOString().slice(0,10);
function g(k){try{return JSON.parse(localStorage[k]||'{}')}catch(e){return{}}}
function s(k,v){localStorage[k]=JSON.stringify(v)}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';setTimeout(function(){t.className=''},2500)}
function buildSidebar(){var done=g(K),h='',lp='';LFD.forEach(function(l,i){if(l.ph!==lp){h+='<div class="ph">📌 '+l.ph+'</div>';lp=l.ph;}h+='<button class="lv'+(i===cur?' on':'')+(done[i]?' done':'')+'" onclick="go('+i+')"><span class="n">'+(i+1)+'</span>'+l.ti+'<span class="ck">✓</span></button>';});document.getElementById('sidebar-list').innerHTML=h;}
function go(i){cur=i;var l=LFD[i];var done=g(K);document.querySelectorAll('#sb button.lv').forEach(function(b,j){b.classList.toggle('on',j===i);b.classList.toggle('done',!!done[j]);});var ta=document.getElementById('code');ta.value=localStorage['lv_fd_'+i]||l.tp;upLn();var left=document.getElementById('left');var kh='<div class="kb"><h4>📖 知识点</h4>'+l.kn+'</div>';if(l.et)kh+='<div class="exm">🎯<b>真题</b>：'+l.et+'</div>';var io='<div class="iso">';if(l.si)io+='<div class="il">📥样例输入</div><pre>'+esc(l.si)+'</pre>';io+='<div class="il">📤期望输出</div><pre>'+esc(l.ex)+'</pre></div>';left.innerHTML='<h3>关卡'+(i+1)+':'+l.ti+'</h3><div style="font-size:10px;color:var(--m);margin-bottom:10px">'+l.ph+'·'+l.tg+'</div>'+kh+'<p style="font-size:13px;line-height:1.7;margin-bottom:10px">'+l.de+'</p>'+io;document.getElementById('out').textContent='—点击▶运行—';document.getElementById('out').style.color='var(--m)';document.getElementById('hint').style.display='none';}
function upLn(){var ta=document.getElementById('code');var n=ta.value.split('\n').length,h='';for(var i=1;i<=n;i++)h+='<div>'+i+'</div>';document.getElementById('ln').innerHTML=h}
function hint(){var l=LFD[cur];var el=document.getElementById('hint');if(el.style.display==='block'){el.style.display='none';return;}var kn=l.kn.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();el.innerHTML='💡<b>提示</b>：'+kn.slice(0,200)+'...';el.style.display='block';}
function sol(){document.getElementById('code').value=LFD[cur].tp;upLn();document.getElementById('hint').style.display='none';toast('📝已填参考代码')}
function reset(){document.getElementById('code').value=LFD[cur].tp;upLn();document.getElementById('hint').style.display='none';toast('↺已重置')}
async function run(){var l=LFD[cur];var code=document.getElementById('code').value;localStorage['lv_fd_'+cur]=code;var out=document.getElementById('out');out.textContent='⏳编译中...';out.style.color='#d2991d';try{var r=await fetch('https://wandbox.org/api/compile.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({compiler:'gcc-head',code:code,stdin:l.si||''})});var d=await r.json();out.style.color='#0f0';var re='';if(d.compiler_error)re+='【编译错误】\n'+d.compiler_error+'\n';if(d.program_error)re+=(re?'\n':'')+'【运行时错误】\n'+d.program_error+'\n';if(d.program_output)re+=d.program_output;if(!re)re='(无输出)';out.textContent=re;if(d.program_output&&l.ex&&d.program_output===l.ex&&!d.compiler_error){var done=g(K);done[cur]=true;s(K,done);var btns=document.querySelectorAll('#sb button.lv');for(var j=0;j<btns.length;j++)btns[j].classList.toggle('done',!!done[j]);toast('✅通关！');}}catch(e){out.style.color='var(--m)';out.textContent='⚠️在线编译器不可用\n本地:gcc main.c -o main && ./main\n'+(l.si?'输入:'+l.si+'\n':'')+'期望输出:'+l.ex;}}
document.getElementById('code').addEventListener('input',upLn);
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();var ta=e.target;var s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}});
function makeBlank(tp){var lines=tp.split('\n');var out=[],blanked=0;for(var i=0;i<lines.length;i++){var L=lines[i].trim();var isFuncDef=((L.indexOf('void ')==0||L.indexOf('int ')==0||L.indexOf('float ')==0||L.indexOf('double ')==0||L.indexOf('char ')==0)&&L.indexOf('){')>-1&&L.indexOf('main')==-1)||((L.indexOf('struct ')==0||L.indexOf('typedef ')==0)&&L.indexOf('{')>-1);var isLogic=(L.indexOf('printf(')>-1&&L.indexOf('"')>-1)||L.indexOf('if(')>-1||L.indexOf('if (')>-1||L.indexOf('else ')===0||L.indexOf('else{')>-1||L.indexOf('for(')>-1||L.indexOf('for (')>-1||L.indexOf('while(')>-1||L.indexOf('while (')>-1||(L.indexOf('return ')>-1&&L.indexOf('return 0')==-1&&L.indexOf('return;')==-1&&L.indexOf('return -1')==-1);var isKey=isFuncDef||isLogic;if(isKey&&blanked===0){out.push('  // === 在这里写你的代码 ===');blanked=1;}if(!isKey)out.push(lines[i]);}if(blanked===0){out.splice(Math.floor(out.length/2),0,'  // === 在这里写你的代码 ===');}return out.join('\n');}for(var i=0;i<LFD.length;i++){if(!LFD[i].so&&LFD[i].tp.indexOf('// ===')===-1){LFD[i].so=LFD[i].tp;LFD[i].tp=makeBlank(LFD[i].tp);}}buildSidebar();go(cur||0);
</script></body></html>
