<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex}

.btns{display:flex;gap:6px;padding:8px 12px;flex-shrink:0}

.iso{background:var(--s);border-radius:6px;padding:8px;font-size:11px;margin-top:10px}

<script>
var LDS=[{ph:'顺序表(共6次考)',tg:'顺序表',df:'⭐⭐',ti:'顺序表插入',de:'升序数组插入x保持升序。理解O(n)移动代价。',tp:'#include <stdio.h>\nint main(){int N,x,a[101];scanf("%d",&N);\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);scanf("%d",&x);\nint pos=N;for(int i=0;i<N;i++)if(a[i]>x){pos=i;break;}\nfor(int i=N;i>pos;i--)a[i]=a[i-1];a[pos]=x;\nfor(int i=0;i<=N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 3 5 7 9 \n',si:'4\n1 3 7 9\n5',kn:'①找插入位置②<b>从后往前</b>移③插入。<span class="tag formula">公式</span>第i位插入移<b>n-i+1</b>个。',et:'408必考：插入/删除移动元素数量'},
{ph:'顺序表(共6次考)',tg:'顺序表',df:'⭐⭐⭐',ti:'数组左移(2010真题)',de:'前p个元素移到末尾。三步反转法。',tp:'#include <stdio.h>\nvoid rev(int a[],int l,int r){while(l<r){int t=a[l];a[l]=a[r];a[r]=t;l++;r--;}}\nint main(){int N,p;scanf("%d%d",&N,&p);int a[N];\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);\nrev(a,0,p-1);rev(a,p,N-1);rev(a,0,N-1);\nfor(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'3 4 5 1 2 \n',si:'5 2\n1 2 3 4 5',kn:'三步反转:①反[0,p-1]②反[p,N-1]③整体反。O(n)时间O(1)空间。',et:'408真题2010'},
{ph:'顺序表(共6次考)',tg:'顺序表',df:'⭐⭐⭐⭐',ti:'两序列中位数(2011真题)',de:'两等长升序序列合并后中位数。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N],b[N];\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);for(int i=0;i<N;i++)scanf("%d",&b[i]);\nint i=0,j=0,cnt=0,t;\nwhile(i<N&&j<N){cnt++;if(a[i]<b[j]){if(cnt==N)t=a[i];i++;}else{if(cnt==N)t=b[j];j++;}}\nprintf("%d\\n",t);return 0;}',ex:'6\n',si:'5\n1 3 5 7 9\n2 4 6 8 10',kn:'归并计数到第N个。最优二分O(logn)。暴力归并O(n)也拿分。',et:'408真题2011'},
{ph:'顺序表(共6次考)',tg:'顺序表',df:'⭐⭐⭐',ti:'摩尔投票(2013真题)',de:'找出现>N/2的主元素。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N];\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);\nint cand=a[0],cnt=1;\nfor(int i=1;i<N;i++){if(cnt==0){cand=a[i];cnt=1;}else if(a[i]==cand)cnt++;else cnt--;}\ncnt=0;for(int i=0;i<N;i++)if(a[i]==cand)cnt++;\nprintf("%d\\n",cnt>N/2?cand:-1);return 0;}',ex:'5\n',si:'6\n5 5 2 5 5 1',kn:'候选+计数器O(n)时间O(1)空间。最后验证是否>N/2。',et:'408真题2013'},
{ph:'链表(共4次考)',tg:'链表',df:'⭐⭐⭐',ti:'单链表建表(基础)',de:'尾插法建表+遍历输出。408所有链表题的前提。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nint main(){int n,v;scanf("%d",&n);N*h=NULL,*t=NULL;\nfor(int i=0;i<n;i++){scanf("%d",&v);N*p=(N*)malloc(sizeof(N));p->d=v;p->nxt=NULL;if(!h)h=t=p;else{t->nxt=p;t=p;}}\nfor(N*p=h;p;p=p->nxt)printf("%d -> ",p->d);printf("NULL\\n");return 0;}',ex:'1 -> 2 -> 3 -> NULL\n',si:'3\n1 2 3',kn:'链表=火车。每节(节点)装货(data)+钩子(next)。尾插维护tail。',et:'408核心基础'},
{ph:'链表(共4次考)',tg:'链表',df:'⭐⭐⭐',ti:'链表倒数第k(2009真题)',de:'快慢指针找倒数第k个节点。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nN* find(N*h,int k){N*fast=h,*slow=h;for(int i=0;i<k;i++)fast=fast->nxt;\nwhile(fast){fast=fast->nxt;slow=slow->nxt;}return slow;}\n// main建表+调用省略',kn:'快走k步→快慢一起走→快到NULL时慢=倒数第k个。',et:'408真题2009'},
{ph:'链表(共4次考)',tg:'链表',df:'⭐⭐⭐',ti:'链表反转',de:'反转单链表。2019年408题前置技能。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nN* rev(N*h){N*prev=NULL,*cur=h;while(cur){N*nxt=cur->nxt;cur->nxt=prev;prev=cur;cur=nxt;}return prev;}\n// 建表+调用省略',kn:'三指针：prev(前驱)cur(当前)nxt(暂存)。头插法思想。',et:'408真题2019相关'},
{ph:'栈队列(几乎每年考)',tg:'栈队列',df:'⭐⭐⭐',ti:'循环队列(每年必考)',de:'实现循环队列。408必背公式。',tp:'#include <stdio.h>\n#define M 5\nint q[M],f=0,r=0;\nint full(){return(r+1)%M==f;}int empty(){return f==r;}\nvoid eq(int x){if(!full()){q[r]=x;r=(r+1)%M;}}\nint dq(){if(empty())return-1;int x=q[f];f=(f+1)%M;return x;}\nint main(){eq(1);eq(2);eq(3);printf("%d\\n%d\\n%d\\n",dq(),dq(),dq());return 0;}',ex:'1\n2\n3\n',kn:'空→f==r 满→(r+1)%M==f 个数→(r-f+M)%M。牺牲一个格子区分空/满。',et:'408几乎每年1道'},
{ph:'树(共3次考)',tg:'树',df:'⭐⭐⭐',ti:'二叉树遍历(前+中→后)',de:'前序首字母=根，中序左右分。',tp:'#include <stdio.h>\n#include <string.h>\nvoid post(char*pre,char*in,int len){if(len<=0)return;char r=pre[0];int p=0;while(in[p]!=r)p++;post(pre+1,in,p);post(pre+1+p,in+p+1,len-p-1);printf("%c",r);}\nint main(){char a[100],b[100];scanf("%s%s",a,b);post(a,b,strlen(a));printf("\\n");return 0;}',ex:'DEBFCA\n',si:'ABDECF DBEACF',kn:'前序首=根，中序找根→左=左子树右=右子树→递归。',et:'408经典：两种遍历求第三种'},
{ph:'树(共3次考)',tg:'树',df:'⭐⭐⭐',ti:'WPL(2014真题)',de:'带权路径长度=Σ(叶权×深度)。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct T{int w;struct T*l,*r;}T;\nint wpl(T*r,int d){if(!r)return 0;if(!r->l&&!r->r)return r->w*d;return wpl(r->l,d+1)+wpl(r->r,d+1);}\n// main建树省略',kn:'遇叶节点→返权×深。否则返左WPL+右WPL。',et:'408真题2014'},
{ph:'树(共3次考)',tg:'树',df:'⭐⭐⭐',ti:'BST判断(2022真题)',de:'判断二叉树是否为BST(左<根<右)。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct T{int d;struct T*l,*r;}T;\nint isBST(T*r,int min,int max){if(!r)return 1;if(r->d<=min||r->d>=max)return 0;return isBST(r->l,min,r->d)&&isBST(r->r,r->d,max);}\n// main调用isBST(root,-999999,999999)',kn:'每节点必须在(min,max)区间。左子树顶界=当前值，右下界=当前值。',et:'408真题2022'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'入度出度(2021/2023真题)',de:'邻接矩阵：出度=行和，入度=列和。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int G[N][N];\nfor(int i=0;i<N;i++)for(int j=0;j<N;j++)scanf("%d",&G[i][j]);\nfor(int i=0;i<N;i++){int o=0,in=0;\nfor(int j=0;j<N;j++){o+=G[i][j];in+=G[j][i];}\nprintf("节点%d:出度%d入度%d\\n",i,o,in);}return 0;}',ex:'节点0:出度2入度1\n节点1:出度1入度2\n',si:'3\n0 1 1\n1 0 0\n0 1 0',kn:'出度=第i行1的个数。入度=第i列1的个数。',et:'408真题2021/2023'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'BFS遍历',de:'邻接表+BFS队列实现。',tp:'#include <stdio.h>\n#include <stdlib.h>\n#define M 100\ntypedef struct E{int to;struct E*nxt;}E;\nE*adj[M];int vis[M];\nvoid add(int u,int v){E*e=(E*)malloc(sizeof(E));e->to=v;e->nxt=adj[u];adj[u]=e;}\nvoid bfs(int s){int q[M],f=0,r=0;vis[s]=1;q[r++]=s;\nwhile(f<r){int u=q[f++];printf("%d ",u);\nfor(E*e=adj[u];e;e=e->nxt)if(!vis[e->to]){vis[e->to]=1;q[r++]=e->to;}}}\nint main(){int N,M,u,v;scanf("%d%d",&N,&M);\nfor(int i=0;i<M;i++){scanf("%d%d",&u,&v);add(u,v);add(v,u);}bfs(0);printf("\\n");return 0;}',ex:'0 1 2 3 \n',si:'4 4\n0 1\n0 2\n1 3\n2 3',kn:'BFS=队列。起点入队→出队访问→未访邻居入队。BFS找最短路径。',et:'图论基础'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'拓扑排序(2024真题)',de:'判断有向图是否有环。',tp:'#include <stdio.h>\n#include <string.h>\nint main(){int N,M,u,v;scanf("%d%d",&N,&M);int ind[100]={0},G[100][100];memset(G,0,sizeof(G));\nfor(int i=0;i<M;i++){scanf("%d%d",&u,&v);G[u][v]=1;ind[v]++;}\nint q[100],f=0,r=0,cnt=0;\nfor(int i=0;i<N;i++)if(ind[i]==0)q[r++]=i;\nwhile(f<r){int u=q[f++];cnt++;\nfor(int v=0;v<N;v++)if(G[u][v]){ind[v]--;if(ind[v]==0)q[r++]=v;}}\nprintf(cnt==N?"有拓扑序\\n":"有环\\n");return 0;}',ex:'有拓扑序\n',si:'4 4\n0 1\n0 2\n1 3\n2 3',kn:'Kahn:入度0者入队→出队删出边→入度0者入队。全出=无环。',et:'408真题2024'},
{ph:'查找',tg:'查找',df:'⭐⭐⭐',ti:'折半查找(二分)',de:'升序数组二分查找target。O(logn)。',tp:'#include <stdio.h>\nint bs(int a[],int n,int t){int l=0,r=n-1;\nwhile(l<=r){int m=(l+r)/2;if(a[m]==t)return m;if(a[m]<t)l=m+1;else r=m-1;}return-1;}\nint main(){int N,t;scanf("%d%d",&N,&t);int a[N];\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);printf("%d\\n",bs(a,N,t));return 0;}',ex:'3\n',si:'6 5\n1 3 5 7 9 11',kn:'每次砍半O(logn)。<b>前提：有序+能随机存取！</b>链表不行。',et:'408常考：ASL、判定树'},
{ph:'查找',tg:'查找',df:'⭐⭐⭐',ti:'哈希表(链地址法)',de:'hash(x)=x%7。链地址法处理冲突。',tp:'#include <stdio.h>\n#include <stdlib.h>\n#define M 7\ntypedef struct N{int d;struct N*nxt;}N;\nN* ht[M];\nvoid ins(int x){int h=x%M;N*p=(N*)malloc(sizeof(N));p->d=x;p->nxt=ht[h];ht[h]=p;}\nint find(int x){int h=x%M;for(N*p=ht[h];p;p=p->nxt)if(p->d==x)return 1;return 0;}\nint main(){ins(10);ins(17);ins(24);printf("%d\\n",find(10));return 0;}',ex:'1\n',kn:'链地址=每个槽位拉链表。装填因子α=n/m。',et:'408每年至少1道哈希题'},
{ph:'排序(核心!)',tg:'排序',df:'⭐⭐⭐',ti:'快速排序(最高频!)',de:'手写快排。408综合题最高频代码。',tp:'#include <stdio.h>\nvoid qs(int a[],int l,int r){\nif(l>=r)return;int p=a[l],i=l,j=r;\nwhile(i<j){while(i<j&&a[j]>=p)j--;a[i]=a[j];while(i<j&&a[i]<=p)i++;a[j]=a[i];}\na[i]=p;qs(a,l,i-1);qs(a,i+1,r);}\nint main(){int N;scanf("%d",&N);int a[N];\nfor(int i=0;i<N;i++)scanf("%d",&a[i]);qs(a,0,N-1);\nfor(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 2 5 7 9 \n',si:'5\n5 2 7 1 9',kn:'分治：pivot→小左大右→递归。O(nlogn)不稳定。最坏O(n²)。',et:'408综合题最高频！必须闭卷写。'},
{ph:'排序(核心!)',tg:'排序',df:'⭐⭐⭐',ti:'归并排序(稳定!)',de:'唯一稳定O(nlogn)内部排序。外部排序基础。',tp:'#include <stdio.h>\n#include <stdlib.h>\nvoid merge(int a[],int l,int m,int r){int n1=m-l+1,n2=r-m,*L=(int*)malloc(n1*4),*R=(int*)malloc(n2*4);for(int i=0;i<n1;i++)L[i]=a[l+i];for(int i=0;i<n2;i++)R[i]=a[m+1+i];int i=0,j=0,k=l;while(i<n1&&j<n2)a[k++]=(L[i]<=R[j])?L[i++]:R[j++];while(i<n1)a[k++]=L[i++];while(j<n2)a[k++]=R[j++];free(L);free(R);}\nvoid ms(int a[],int l,int r){if(l>=r)return;int m=(l+r)/2;ms(a,l,m);ms(a,m+1,r);merge(a,l,m,r);}\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);ms(a,0,N-1);for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 3 4 5 8 \n',si:'5\n5 3 8 1 4',kn:'分治→merge合并有序数组。O(nlogn)稳定。空间O(n)。',et:'常考稳定性+空间对比'},
{ph:'排序(核心!)',tg:'排序',df:'⭐⭐⭐',ti:'排序对比表(必默写!)',de:'在printf打印所有排序算法的复杂度+稳定性表。408选择题每年1道。',tp:'#include <stdio.h>\nint main(){\nprintf("算法      时间(平均)  空间    稳定?\\n");\nprintf("====================================\\n");\nprintf("插入排序  O(n^2)     O(1)    稳定\\n");\nprintf("冒泡排序  O(n^2)     O(1)    稳定\\n");\nprintf("选择排序  O(n^2)     O(1)    不稳定\\n");\nprintf("希尔排序  ~O(n^1.3)  O(1)    不稳定\\n");\nprintf("快速排序  O(nlogn)   O(logn) 不稳定\\n");\nprintf("堆排序    O(nlogn)   O(1)    不稳定\\n");\nprintf("归并排序  O(nlogn)   O(n)    稳定\\n");\nprintf("基数排序  O(d(n+r))  O(n+r)  稳定\\n");\nreturn 0;\n}',ex:'',kn:'这张表408选择题每年至少1道。必须能默写。',et:'408选择题必考'},
];
var cur=0,K='cs_mds',TODAY=(new Date()).toISOString().slice(0,10);
function g(k){try{return JSON.parse(localStorage[k]||'{}')}catch(e){return{}}}
function s(k,v){localStorage[k]=JSON.stringify(v)}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='show';setTimeout(function(){t.className=''},2500)}
function buildSidebar(){var done=g(K),h='',lp='';LDS.forEach(function(l,i){if(l.ph!==lp){h+='<div class="ph">📌 '+l.ph+'</div>';lp=l.ph;}h+='<button class="lv'+(i===cur?' on':'')+(done[i]?' done':'')+'" onclick="go('+i+')"><span class="n">'+(i+1)+'</span>'+l.ti+'<span class="ck">✓</span></button>';});document.getElementById('sidebar-list').innerHTML=h;}
function go(i){cur=i;var l=LDS[i];var done=g(K);document.querySelectorAll('#sb button.lv').forEach(function(b,j){b.classList.toggle('on',j===i);b.classList.toggle('done',!!done[j]);});var ta=document.getElementById('code');ta.value=localStorage['lv_ds_'+i]||l.tp;upLn();var left=document.getElementById('left');var kh='<div class="kb"><h4>📖 知识点</h4>'+l.kn+'</div>';if(l.et)kh+='<div class="exm">🎯<b>真题</b>：'+l.et+'</div>';var io='<div class="iso">';if(l.si)io+='<div class="il">📥样例输入</div><pre>'+esc(l.si)+'</pre>';io+='<div class="il">📤期望输出</div><pre>'+esc(l.ex)+'</pre></div>';left.innerHTML='<h3>关卡'+(i+1)+':'+l.ti+'</h3><div style="font-size:10px;color:var(--m);margin-bottom:10px">'+l.ph+'·'+l.tg+'</div>'+kh+'<p style="font-size:13px;line-height:1.7;margin-bottom:10px">'+l.de+'</p>'+io;document.getElementById('out').textContent='—点击▶运行—';document.getElementById('out').style.color='var(--m)';document.getElementById('hint').style.display='none';}
function upLn(){var ta=document.getElementById('code');var n=ta.value.split('\n').length,h='';for(var i=1;i<=n;i++)h+='<div>'+i+'</div>';document.getElementById('ln').innerHTML=h}
function hint(){var l=LDS[cur];var el=document.getElementById('hint');if(el.style.display==='block'){el.style.display='none';return;}var kn=l.kn.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();el.innerHTML='💡<b>提示</b>：'+kn.slice(0,200)+'...';el.style.display='block';}
function sol(){document.getElementById('code').value=LDS[cur].tp;upLn();document.getElementById('hint').style.display='none';toast('📝已填参考代码')}
function reset(){document.getElementById('code').value=LDS[cur].tp;upLn();document.getElementById('hint').style.display='none';toast('↺已重置')}
async function run(){var l=LDS[cur];var code=document.getElementById('code').value;localStorage['lv_ds_'+cur]=code;var out=document.getElementById('out');out.textContent='⏳编译中...';out.style.color='#d2991d';try{var r=await fetch('https://wandbox.org/api/compile.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({compiler:'gcc-head',code:code,stdin:l.si||''})});var d=await r.json();out.style.color='#0f0';var re='';if(d.compiler_error)re+='【编译错误】\n'+d.compiler_error+'\n';if(d.program_error)re+=(re?'\n':'')+'【运行时错误】\n'+d.program_error+'\n';if(d.program_output)re+=d.program_output;if(!re)re='(无输出)';out.textContent=re;if(d.program_output&&l.ex&&d.program_output===l.ex&&!d.compiler_error){var done=g(K);done[cur]=true;s(K,done);var btns=document.querySelectorAll('#sb button.lv');for(var j=0;j<btns.length;j++)btns[j].classList.toggle('done',!!done[j]);toast('✅通关！');}}catch(e){out.style.color='var(--m)';out.textContent='⚠️在线编译器不可用(翻墙断了?)\n本地:gcc main.c -o main && ./main\n'+(l.si?'输入:'+l.si+'\n':'')+'期望输出:'+l.ex;}}
document.getElementById('code').addEventListener('input',upLn);
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();var ta=e.target;var s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}});
buildSidebar();go(cur||0);
</script></body></html>
