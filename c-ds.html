<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex}
#sb{width:260px;min-width:260px;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow-y:auto}
#sb .hd{padding:12px;font-size:16px;font-weight:700;color:var(--a);border-bottom:1px solid var(--b);cursor:pointer}
#sb .ph{font-size:15px;color:var(--m);padding:8px 10px 3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
#sb button{display:flex;align-items:center;gap:5px;width:100%;padding:7px 10px;border:none;background:none;color:var(--t);font-size:14px;cursor:pointer;text-align:left;font-family:inherit}
#sb button:hover{background:rgba(255,255,255,.03)}#sb button.on{background:rgba(88,166,255,.12);color:var(--a);font-weight:600}
#sb button .n{font-size:15px;color:var(--m);min-width:14px}#sb button.done .n{color:var(--g)}#sb button .ck{display:none;color:var(--g);font-size:16px;margin-left:auto}#sb button.done .ck{display:inline}
#main{flex:1;display:flex;overflow:hidden}#left{flex:1;overflow-y:auto;padding:14px;min-width:280px}
#right{flex:1;display:flex;flex-direction:column;border-left:1px solid var(--b);min-width:370px}
#right .eh{padding:6px 12px;border-bottom:1px solid var(--b);font-size:16px;color:var(--m);flex-shrink:0}
#right .ew{flex:1;display:flex;font-family:'Consolas',monospace;font-size:15px;line-height:1.55}
#right .ln{background:var(--s);color:var(--m);padding:8px 0;text-align:right;overflow:hidden;width:36px;flex-shrink:0;font-size:15px;line-height:1.55}
#right .ln div{padding:0 6px}
#right textarea{flex:1;background:var(--cb);color:var(--t);border:none;padding:8px;resize:none;font-family:inherit;font-size:15px;line-height:1.55;tab-size:4;outline:none}
.btns{display:flex;gap:6px;padding:8px 12px;flex-shrink:0}
.btn{padding:5px 12px;border-radius:5px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:14px;cursor:pointer;font-family:inherit}
.btn:hover{background:rgba(255,255,255,.06)}.btn.pm{background:var(--a);color:#fff;border-color:var(--a)}
.op{border-top:1px solid var(--b);flex-shrink:0}.op .oh{padding:4px 12px;font-size:15px;color:var(--m);border-bottom:1px solid var(--b)}
.op .oo{background:#000;padding:8px 12px;font-family:'Consolas',monospace;font-size:14px;min-height:200px;max-height:800px;overflow-y:auto;white-space:pre-wrap}
#hint{display:none;margin:0 12px 8px;padding:8px 12px;background:rgba(210,153,29,.1);border:1px solid rgba(210,153,29,.3);border-radius:6px;font-size:15px;color:var(--o);line-height:1.6}
.kb{background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.15);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:15px;line-height:1.65}
.kb h4{font-size:15px;color:var(--a);margin-bottom:4px}.kb code{background:var(--s);padding:1px 4px;border-radius:3px;font-size:14px;color:var(--o)}
.kb pre{background:var(--cb);padding:6px;border-radius:4px;border:1px solid var(--b);overflow-x:auto;font-size:14px;line-height:1.5;margin:4px 0}
.exm{background:rgba(167,113,247,.06);border:1px solid rgba(167,113,247,.2);border-radius:8px;padding:6px 10px;margin-bottom:10px;font-size:14px;color:var(--p)}
.iso{background:var(--s);border-radius:6px;padding:8px;font-size:14px;margin-top:10px}.iso .il{font-size:15px;color:var(--m);margin-bottom:2px;font-weight:600}.iso pre{margin:0;background:var(--cb);padding:4px;border-radius:4px}
#toast{position:fixed;top:16px;right:16px;padding:8px 14px;border-radius:8px;font-size:15px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;background:#1a3c1a;color:var(--g);border:1px solid var(--g)}#toast.show{opacity:1}
</style></head><body>

<script>
var LDS=[{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐',ti:'顺序表插入(基础)',de:'升序数组插入x保持升序。理解O(n)移动代价。',tp:'#include <stdio.h>\nint main(){int N,x,a[101];scanf("%d",&N);for(int i=0;i<N;i++)scanf("%d",&a[i]);scanf("%d",&x);int pos=N;for(int i=0;i<N;i++)if(a[i]>x){pos=i;break;}for(int i=N;i>pos;i--)a[i]=a[i-1];a[pos]=x;for(int i=0;i<=N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 3 5 7 9 \n',si:'4\n1 3 7 9\n5',kn:'①找插入位置②<b>从后往前</b>移③插入。<span class="tag formula">408公式</span>第i位插入移<b>n-i+1</b>个。',et:'408选择题必考：插入/删除移动元素数量'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐',ti:'数组左移(2010真题)',de:'前p个元素移到末尾。三步反转法O(n)时间O(1)空间。',tp:'#include <stdio.h>\nvoid rev(int a[],int l,int r){while(l<r){int t=a[l];a[l]=a[r];a[r]=t;l++;r--;}}\nint main(){int N,p;scanf("%d%d",&N,&p);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);rev(a,0,p-1);rev(a,p,N-1);rev(a,0,N-1);for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'3 4 5 1 2 \n',si:'5 2\n1 2 3 4 5',kn:'三步反转：①反[0,p-1]②反[p,N-1]③整体反。O(n)O(1)。',et:'408真题2010：数组循环移位'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐⭐',ti:'两序列中位数(2011真题)',de:'两等长升序序列合并后中位数。最优二分O(logn)。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N],b[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);for(int i=0;i<N;i++)scanf("%d",&b[i]);int i=0,j=0,cnt=0,t;while(i<N&&j<N){cnt++;if(a[i]<b[j]){if(cnt==N)t=a[i];i++;}else{if(cnt==N)t=b[j];j++;}}printf("%d\\n",t);return 0;}',ex:'6\n',si:'5\n1 3 5 7 9\n2 4 6 8 10',kn:'归并计数到第N个。最优二分O(logn)。暴力归并O(n)也能拿分。',et:'408真题2011：分治法求中位数'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐',ti:'公共后缀(2012真题)',de:'两个链表找共同后缀起始位置。表长对齐+同步遍历。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nint len(N*h){int c=0;while(h){c++;h=h->nxt;}return c;}\nN* findCommon(N*a,N*b){int la=len(a),lb=len(b);while(la>lb){a=a->nxt;la--;}while(lb>la){b=b->nxt;lb--;}while(a&&b&&a!=b){a=a->nxt;b=b->nxt;}return a;}\n// main建表+调用省略',kn:'求两表长度差→较长者先走差步→同步遍历→第一个相同节点即答案。',et:'408真题2012：公共后缀'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐',ti:'摩尔投票主元素(2013真题)',de:'找出现次数>N/2的主元素。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);int cand=a[0],cnt=1;for(int i=1;i<N;i++){if(cnt==0){cand=a[i];cnt=1;}else if(a[i]==cand)cnt++;else cnt--;}cnt=0;for(int i=0;i<N;i++)if(a[i]==cand)cnt++;printf("%d\\n",cnt>N/2?cand:-1);return 0;}',ex:'5\n',si:'6\n5 5 2 5 5 1',kn:'候选+计数器O(n)O(1)。最后验证是否>N/2。',et:'408真题2013：摩尔投票法'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐',ti:'绝对值去重(2015真题)',de:'删除链表中绝对值相等的重复节点。辅助数组标记。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nvoid delAbsDup(N*h,int n){int*flag=(int*)calloc(n+1,sizeof(int));N*prev=NULL,*cur=h;while(cur){int v=cur->d>0?cur->d:-cur->d;if(flag[v]){prev->nxt=cur->nxt;free(cur);cur=prev->nxt;}else{flag[v]=1;prev=cur;cur=cur->nxt;}}free(flag);}\n// 建表+调用省略',kn:'申请n+1辅助数组标记|data|是否出现过。已出现→删节点。O(n)时间O(n)空间。',et:'408真题2015：删除绝对值相等重复节点'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐',ti:'集合划分(2016真题)',de:'将数组划分成两子集，|n1-n2|最小且|S1-S2|最大。',tp:'#include <stdio.h>\n#include <stdlib.h>\nint cmp(const void*a,const void*b){return*(int*)a-*(int*)b;}\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);qsort(a,N,sizeof(int),cmp);int s1=0,s2=0;for(int i=0;i<N/2;i++)s1+=a[i];for(int i=N/2;i<N;i++)s2+=a[i];printf("%d\\n",s2-s1);return 0;}',ex:'10\n',si:'5\n1 3 5 7 9',kn:'排序后前⌊n/2⌋个入A1，剩余入A2。最优用快排partition找第n/2小→O(n)。',et:'408真题2016：集合划分'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐⭐',ti:'最小未出现正整数(2018真题)',de:'找数组中未出现的最小正整数。原地哈希。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);for(int i=0;i<N;i++){while(a[i]>0&&a[i]<=N&&a[a[i]-1]!=a[i]){int t=a[i];a[i]=a[t-1];a[t-1]=t;}}int ans=N+1;for(int i=0;i<N;i++)if(a[i]!=i+1){ans=i+1;break;}printf("%d\\n",ans);return 0;}',ex:'3\n',si:'5\n-1 2 4 1 5',kn:'原地哈希：将数x(1≤x≤N)放到下标x-1处。再扫描找第一个a[i]≠i+1的位置。',et:'408真题2018：未出现最小正整数'},
{ph:'顺序表(408历年共6次考)',tg:'顺序表',df:'⭐⭐⭐⭐',ti:'三元组最小距离(2020真题)',de:'三个升序数组，找三元组使|a-b|+|b-c|+|c-a|最小。',tp:'#include <stdio.h>\n#define INF 0x3f3f3f3f\nint abs(int x){return x>0?x:-x;}\nint main(){int n1,n2,n3;scanf("%d%d%d",&n1,&n2,&n3);int a[n1],b[n2],c[n3];for(int i=0;i<n1;i++)scanf("%d",&a[i]);for(int i=0;i<n2;i++)scanf("%d",&b[i]);for(int i=0;i<n3;i++)scanf("%d",&c[i]);int i=0,j=0,k=0,minD=INF;while(i<n1&&j<n2&&k<n3){int d=abs(a[i]-b[j])+abs(b[j]-c[k])+abs(c[k]-a[i]);if(d<minD)minD=d;if(a[i]<=b[j]&&a[i]<=c[k])i++;else if(b[j]<=a[i]&&b[j]<=c[k])j++;else k++;}printf("%d\\n",minD);return 0;}',ex:'5\n',si:'3 3 3\n1 4 7\n2 5 8\n3 6 9',kn:'三指针遍历。每次移动值最小的指针(减小距离)。O(n1+n2+n3)。',et:'408真题2020：三元组最小距离'},
{ph:'链表(408历年共4次考)',tg:'链表',df:'⭐⭐⭐',ti:'单链表建表(基础)',de:'尾插法建表+遍历输出。408所有链表题的前提。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nint main(){int n,v;scanf("%d",&n);N*h=NULL,*t=NULL;for(int i=0;i<n;i++){scanf("%d",&v);N*p=(N*)malloc(sizeof(N));p->d=v;p->nxt=NULL;if(!h)h=t=p;else{t->nxt=p;t=p;}}for(N*p=h;p;p=p->nxt)printf("%d -> ",p->d);printf("NULL\\n");return 0;}',ex:'1 -> 2 -> 3 -> NULL\n',si:'3\n1 2 3',kn:'节点=数据+next。尾插维护tail。插入删除O(1)，查找O(n)。',et:'408核心基础'},
{ph:'链表(408历年共4次考)',tg:'链表',df:'⭐⭐⭐',ti:'倒数第k个节点(2009真题)',de:'快慢指针：快走k步，然后快慢一起走。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nN* findKth(N*h,int k){N*fast=h,*slow=h;for(int i=0;i<k;i++)fast=fast->nxt;while(fast){fast=fast->nxt;slow=slow->nxt;}return slow;}\n// main建表+调用省略',kn:'快先走k步→快慢一起→快NULL时慢=倒数第k。',et:'408真题2009：快慢指针'},
{ph:'链表(408历年共4次考)',tg:'链表',df:'⭐⭐⭐',ti:'链表反转(头插法)',de:'反转单链表。2019年题前置技能。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nN* rev(N*h){N*prev=NULL,*cur=h;while(cur){N*nxt=cur->nxt;cur->nxt=prev;prev=cur;cur=nxt;}return prev;}\n// 建表+调用省略',kn:'三指针：prev前驱、cur当前、nxt暂存。头插法思想。',et:'408真题2019相关：链表重排前置'},
{ph:'链表(408历年共4次考)',tg:'链表',df:'⭐⭐⭐⭐',ti:'链表重排(2019真题完整)',de:'L(a0,a1,...,an)→L\'(a0,an,a1,an-1,...)。找中点+反转+交替合并。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct N{int d;struct N*nxt;}N;\nN* findMid(N*h){N*slow=h,*fast=h;while(fast&&fast->nxt){slow=slow->nxt;fast=fast->nxt->nxt;}return slow;}\nN* rev(N*h){N*prev=NULL,*cur=h;while(cur){N*nxt=cur->nxt;cur->nxt=prev;prev=cur;cur=nxt;}return prev;}\nN* reorder(N*h){if(!h||!h->nxt)return h;N*mid=findMid(h);N*l2=rev(mid->nxt);mid->nxt=NULL;N*p1=h,*p2=l2;while(p2){N*t1=p1->nxt,*t2=p2->nxt;p1->nxt=p2;p2->nxt=t1;p1=t1;p2=t2;}return h;}\n// main建表+调用省略',kn:'三步：①快慢找中点②后半段反转③交替合并。',et:'408真题2019：链表重排列完整题'},
{ph:'栈与队列',tg:'栈队列',df:'⭐⭐⭐',ti:'循环队列(每年必考)',de:'实现循环队列。408必背公式。',tp:'#include <stdio.h>\n#define M 5\nint q[M],f=0,r=0;int full(){return(r+1)%M==f;}int empty(){return f==r;}void eq(int x){if(!full()){q[r]=x;r=(r+1)%M;}}int dq(){if(empty())return-1;int x=q[f];f=(f+1)%M;return x;}int main(){eq(1);eq(2);eq(3);printf("%d\\n%d\\n%d\\n",dq(),dq(),dq());return 0;}',ex:'1\n2\n3\n',kn:'空→f==r 满→(r+1)%M==f 个数→(r-f+M)%M。牺牲一个单元区分空/满。',et:'408几乎每年1道'},
{ph:'栈与队列',tg:'栈队列',df:'⭐⭐⭐',ti:'括号匹配(栈应用)',de:'用栈判断括号序列合法性。',tp:'#include <stdio.h>\n#include <string.h>\nint main(){char s[200];scanf("%s",s);char stk[200];int top=-1,ok=1;for(int i=0;s[i];i++){if(s[i]==\'(\')stk[++top]=\'(\';else if(s[i]==\')\'){if(top>=0&&stk[top]==\'(\')top--;else{ok=0;break;}}}printf(top==-1&&ok?"合法\\n":"不合法\\n");return 0;}',ex:'合法\n',si:'(())()',kn:'左括号入栈，右括号→匹配则出栈→栈空=合法。',et:'栈经典应用题'},
{ph:'树与二叉树(408共3次考)',tg:'树',df:'⭐⭐⭐',ti:'二叉树遍历(前+中→后)',de:'前序首字母=根，中序左右分→递归。408经典题型。',tp:'#include <stdio.h>\n#include <string.h>\nvoid post(char*pre,char*in,int len){if(len<=0)return;char r=pre[0];int p=0;while(in[p]!=r)p++;post(pre+1,in,p);post(pre+1+p,in+p+1,len-p-1);printf("%c",r);}\nint main(){char a[100],b[100];scanf("%s%s",a,b);post(a,b,strlen(a));printf("\\n");return 0;}',ex:'DEBFCA\n',si:'ABDECF DBEACF',kn:'前序首=根→中序找根→左=左子树右=右子树→递归。',et:'408经典：两种遍历求第三种'},
{ph:'树与二叉树(408共3次考)',tg:'树',df:'⭐⭐⭐',ti:'WPL计算(2014真题)',de:'带权路径长度=Σ(叶权×深度)。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct T{int w;struct T*l,*r;}T;\nint wpl(T*r,int d){if(!r)return 0;if(!r->l&&!r->r)return r->w*d;return wpl(r->l,d+1)+wpl(r->r,d+1);}\n// main建树省略',kn:'遇叶节点→返权×深。否则返左WPL+右WPL。',et:'408真题2014：带权路径长度'},
{ph:'树与二叉树(408共3次考)',tg:'树',df:'⭐⭐⭐',ti:'BST判断(2022真题)',de:'判断二叉树是否为二叉搜索树(左<根<右)。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct T{int d;struct T*l,*r;}T;\nint isBST(T*r,int min,int max){if(!r)return 1;if(r->d<=min||r->d>=max)return 0;return isBST(r->l,min,r->d)&&isBST(r->r,r->d,max);}\n// main调用isBST(root,-999999,999999)',kn:'每节点必须在(min,max)区间。左子树上界=当前值，右子树下界=当前值。',et:'408真题2022：二叉搜索树判断'},
{ph:'树与二叉树(408共3次考)',tg:'树',df:'⭐⭐⭐⭐',ti:'表达式树(2017真题)',de:'将表达式树转为中缀表达式(带括号)。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct T{char op;int isLeaf;struct T*l,*r;}T;\nvoid inorder(T*r,int deep){if(!r)return;if(!r->isLeaf&&deep>1)printf("(");inorder(r->l,deep+1);printf("%c",r->op);inorder(r->r,deep+1);if(!r->isLeaf&&deep>1)printf(")");}\n// main建树+调用inorder(root,1)',kn:'中序遍历+括号。分支结点(深度>1)：左子树前加"("，右子树后加")"。叶结点不加括号。',et:'408真题2017：表达式树转中缀'},
{ph:'树与二叉树(408共3次考)',tg:'树',df:'⭐⭐⭐⭐',ti:'AVL四种旋转',de:'实现AVL树的右旋和左旋操作。',tp:'#include <stdio.h>\n#include <stdlib.h>\ntypedef struct T{int d,h;struct T*l,*r;}T;\nint max(int a,int b){return a>b?a:b;}\nint height(T*r){return r?r->h:0;}\nT* rotateR(T*y){T*x=y->l;y->l=x->r;x->r=y;y->h=max(height(y->l),height(y->r))+1;x->h=max(height(x->l),height(x->r))+1;return x;}\nT* rotateL(T*x){T*y=x->r;x->r=y->l;y->l=x;x->h=max(height(x->l),height(x->r))+1;y->h=max(height(y->l),height(y->r))+1;return y;}\n// 插入省略',kn:'LL→右旋。RR→左旋。LR→先左旋再右旋。RL→先右旋再左旋。<span class="tag formula">平衡因子=h左-h右∈{-1,0,1}</span>。',et:'408选择题常考：判断旋转类型'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'入度出度(2021/2023真题)',de:'计算有向图每个节点的入度和出度。',tp:'#include <stdio.h>\nint main(){int N;scanf("%d",&N);int G[N][N];for(int i=0;i<N;i++)for(int j=0;j<N;j++)scanf("%d",&G[i][j]);for(int i=0;i<N;i++){int o=0,in=0;for(int j=0;j<N;j++){o+=G[i][j];in+=G[j][i];}printf("节点%d:出度%d入度%d\\n",i,o,in);}return 0;}',ex:'节点0:出度2入度1\n节点1:出度1入度2\n',si:'3\n0 1 1\n1 0 0\n0 1 0',kn:'出度=第i行和。入度=第i列和。',et:'408真题2021/2023：图的度'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'BFS广度优先遍历',de:'邻接表+BFS队列实现。',tp:'#include <stdio.h>\n#include <stdlib.h>\n#define M 100\ntypedef struct E{int to;struct E*nxt;}E;E*adj[M];int vis[M];\nvoid add(int u,int v){E*e=(E*)malloc(sizeof(E));e->to=v;e->nxt=adj[u];adj[u]=e;}\nvoid bfs(int s){int q[M],f=0,r=0;vis[s]=1;q[r++]=s;while(f<r){int u=q[f++];printf("%d ",u);for(E*e=adj[u];e;e=e->nxt)if(!vis[e->to]){vis[e->to]=1;q[r++]=e->to;}}}\nint main(){int N,M,u,v;scanf("%d%d",&N,&M);for(int i=0;i<M;i++){scanf("%d%d",&u,&v);add(u,v);add(v,u);}bfs(0);printf("\\n");return 0;}',ex:'0 1 2 3 \n',si:'4 4\n0 1\n0 2\n1 3\n2 3',kn:'BFS=队列。起点入队→出队访问→未访邻居入队。BFS找无权图最短路径。',et:'图论算法基础'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'DFS深度优先遍历',de:'邻接表+DFS递归实现。',tp:'#include <stdio.h>\n#include <stdlib.h>\n#define M 100\ntypedef struct E{int to;struct E*nxt;}E;E*adj[M];int vis[M];\nvoid add(int u,int v){E*e=(E*)malloc(sizeof(E));e->to=v;e->nxt=adj[u];adj[u]=e;}\nvoid dfs(int u){vis[u]=1;printf("%d ",u);for(E*e=adj[u];e;e=e->nxt)if(!vis[e->to])dfs(e->to);}\nint main(){int N,M,u,v;scanf("%d%d",&N,&M);for(int i=0;i<M;i++){scanf("%d%d",&u,&v);add(u,v);add(v,u);}dfs(0);printf("\\n");return 0;}',ex:'0 1 3 2 \n',si:'4 4\n0 1\n0 2\n1 3\n2 3',kn:'DFS=递归。标记→访问→递归所有未访邻居。适合回溯/连通分量/判环。',et:'DFS是图论基础'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'拓扑排序(2024真题)',de:'判断有向图是否有拓扑序列。',tp:'#include <stdio.h>\n#include <string.h>\nint main(){int N,M,u,v;scanf("%d%d",&N,&M);int ind[100]={0},G[100][100];memset(G,0,sizeof(G));for(int i=0;i<M;i++){scanf("%d%d",&u,&v);G[u][v]=1;ind[v]++;}int q[100],f=0,r=0,cnt=0;for(int i=0;i<N;i++)if(ind[i]==0)q[r++]=i;while(f<r){int u=q[f++];cnt++;for(int v=0;v<N;v++)if(G[u][v]){ind[v]--;if(ind[v]==0)q[r++]=v;}}printf(cnt==N?"有拓扑序\\n":"有环\\n");return 0;}',ex:'有拓扑序\n',si:'4 4\n0 1\n0 2\n1 3\n2 3',kn:'Kahn：入度0入队→出队删出边→入度0入队。全出=无环。',et:'408真题2024：拓扑排序'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐⭐',ti:'Floyd最短路径',de:'求任意两点间最短距离。三层循环O(n³)。',tp:'#include <stdio.h>\n#define INF 0x3f3f3f3f\n#define M 100\nint main(){int N,m,u,v,w;scanf("%d%d",&N,&m);int G[M][M];for(int i=1;i<=N;i++)for(int j=1;j<=N;j++)G[i][j]=(i==j)?0:INF;for(int i=0;i<m;i++){scanf("%d%d%d",&u,&v,&w);G[u][v]=w;}for(int k=1;k<=N;k++)for(int i=1;i<=N;i++)for(int j=1;j<=N;j++)if(G[i][k]+G[k][j]<G[i][j])G[i][j]=G[i][k]+G[k][j];printf("%d\\n",G[1][N]);return 0;}',ex:'5\n',si:'4 5\n1 2 2\n1 3 5\n2 3 1\n2 4 5\n3 4 2',kn:'<code>for(k)for(i)for(j) G[i][j]=min(G[i][j],G[i][k]+G[k][j])</code>。O(n³)。适合稠密图。',et:'408+复旦：Floyd是求全局最短路的经典算法'},
{ph:'图(2021-2024连续考!)',tg:'图',df:'⭐⭐⭐',ti:'并查集',de:'实现Union-Find。判断两个元素是否在同一集合。',tp:'#include <stdio.h>\n#define M 100\nint parent[M];\nint find(int x){return parent[x]==x?x:(parent[x]=find(parent[x]));}\nvoid merge(int a,int b){parent[find(a)]=find(b);}\nint main(){int N,M,u,v;scanf("%d%d",&N,&M);for(int i=1;i<=N;i++)parent[i]=i;for(int i=0;i<M;i++){scanf("%d%d",&u,&v);merge(u,v);}printf(find(1)==find(N)?"连通\\n":"不连通\\n");return 0;}',ex:'连通\n',si:'5 4\n1 2\n2 3\n3 4\n4 5',kn:'<code>find</code>+路径压缩→近乎O(1)。<code>merge</code>合并集合。用于连通性/最小生成树(Kruskal)/判环。',et:'408图论常用工具'},
{ph:'查找',tg:'查找',df:'⭐⭐⭐',ti:'折半查找(二分)',de:'升序数组二分查找target。O(logn)。',tp:'#include <stdio.h>\nint bs(int a[],int n,int t){int l=0,r=n-1;while(l<=r){int m=(l+r)/2;if(a[m]==t)return m;if(a[m]<t)l=m+1;else r=m-1;}return-1;}\nint main(){int N,t;scanf("%d%d",&N,&t);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);printf("%d\\n",bs(a,N,t));return 0;}',ex:'3\n',si:'6 5\n1 3 5 7 9 11',kn:'每次砍半O(logn)。<b>前提：有序+能随机存取！</b>链表不行。<span class="tag formula">ASL≈log₂(n+1)-1</span>。',et:'408常考：判定树、ASL计算'},
{ph:'查找',tg:'查找',df:'⭐⭐⭐',ti:'哈希表(链地址法)',de:'hash(x)=x%7。链地址法处理冲突。',tp:'#include <stdio.h>\n#include <stdlib.h>\n#define M 7\ntypedef struct N{int d;struct N*nxt;}N;N*ht[M];\nvoid ins(int x){int h=x%M;N*p=(N*)malloc(sizeof(N));p->d=x;p->nxt=ht[h];ht[h]=p;}\nint find(int x){int h=x%M;for(N*p=ht[h];p;p=p->nxt)if(p->d==x)return 1;return 0;}\nint main(){ins(10);ins(17);ins(24);printf("%d\\n",find(10));return 0;}',ex:'1\n',kn:'链地址=每个槽位拉链表。装填因子α=n/m。<span class="tag formula">ASL≈1+α/2</span>。',et:'408每年至少1道哈希题'},
{ph:'查找',tg:'查找',df:'⭐⭐⭐',ti:'KMP next数组',de:'计算模式串的next数组。2026考纲新增。',tp:'#include <stdio.h>\n#include <string.h>\nvoid getNext(char*p,int*next){int j=0,k=-1;next[0]=-1;int len=strlen(p);while(j<len-1){if(k==-1||p[j]==p[k]){j++;k++;next[j]=k;}else k=next[k];}}\nint main(){char p[100];scanf("%s",p);int next[100];getNext(p,next);for(int i=0;p[i];i++)printf("%d ",next[i]);printf("\\n");return 0;}',ex:'-1 0 0 0 1 \n',si:'ababa',kn:'<code>next[j]</code>=最长相等前后缀长度。失配时模式串回退到next[j]。时间O(n+m)。',et:'2026考纲新增：字符串模式匹配'},
{ph:'排序(408核心!)',tg:'排序',df:'⭐⭐⭐',ti:'快速排序(最高频!)',de:'手写快排。408综合题最高频代码。',tp:'#include <stdio.h>\nvoid qs(int a[],int l,int r){if(l>=r)return;int p=a[l],i=l,j=r;while(i<j){while(i<j&&a[j]>=p)j--;a[i]=a[j];while(i<j&&a[i]<=p)i++;a[j]=a[i];}a[i]=p;qs(a,l,i-1);qs(a,i+1,r);}\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);qs(a,0,N-1);for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 2 5 7 9 \n',si:'5\n5 2 7 1 9',kn:'分治：pivot→小左大右→递归。O(nlogn)不稳定。最坏O(n²)。',et:'408综合题最高频代码！必须闭卷写。'},
{ph:'排序(408核心!)',tg:'排序',df:'⭐⭐⭐',ti:'归并排序(稳定!)',de:'唯一稳定O(nlogn)内部排序。外部排序基础。',tp:'#include <stdio.h>\n#include <stdlib.h>\nvoid merge(int a[],int l,int m,int r){int n1=m-l+1,n2=r-m,*L=(int*)malloc(n1*4),*R=(int*)malloc(n2*4);for(int i=0;i<n1;i++)L[i]=a[l+i];for(int i=0;i<n2;i++)R[i]=a[m+1+i];int i=0,j=0,k=l;while(i<n1&&j<n2)a[k++]=(L[i]<=R[j])?L[i++]:R[j++];while(i<n1)a[k++]=L[i++];while(j<n2)a[k++]=R[j++];free(L);free(R);}\nvoid ms(int a[],int l,int r){if(l>=r)return;int m=(l+r)/2;ms(a,l,m);ms(a,m+1,r);merge(a,l,m,r);}\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);ms(a,0,N-1);for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 3 4 5 8 \n',si:'5\n5 3 8 1 4',kn:'分治→merge合并有序数组。O(nlogn)稳定。空间O(n)。外部排序=多路归并。',et:'常考稳定性+空间复杂度对比'},
{ph:'排序(408核心!)',tg:'排序',df:'⭐⭐⭐',ti:'堆排序(手写!)',de:'建堆+反复取堆顶。O(nlogn)原地排序。',tp:'#include <stdio.h>\nvoid adjust(int a[],int n,int i){int l=2*i+1,r=2*i+2,largest=i;if(l<n&&a[l]>a[largest])largest=l;if(r<n&&a[r]>a[largest])largest=r;if(largest!=i){int t=a[i];a[i]=a[largest];a[largest]=t;adjust(a,n,largest);}}\nvoid hs(int a[],int n){for(int i=n/2-1;i>=0;i--)adjust(a,n,i);for(int i=n-1;i>0;i--){int t=a[0];a[0]=a[i];a[i]=t;adjust(a,i,0);}}\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);hs(a,N);for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 2 3 5 8 \n',si:'5\n5 3 8 1 2',kn:'①建堆(从n/2-1开始调整)→O(n) ②循环：取堆顶(最大)+交换+调整→O(nlogn)。<span class="tag trap">不稳定</span>。',et:'408常考：建堆过程、时间复杂度分析'},
{ph:'排序(408核心!)',tg:'排序',df:'⭐⭐',ti:'希尔排序',de:'插入排序的改进版——按增量分组排序。',tp:'#include <stdio.h>\nvoid shell(int a[],int n){for(int gap=n/2;gap>0;gap/=2){for(int i=gap;i<n;i++){int t=a[i],j;for(j=i;j>=gap&&a[j-gap]>t;j-=gap)a[j]=a[j-gap];a[j]=t;}}}\nint main(){int N;scanf("%d",&N);int a[N];for(int i=0;i<N;i++)scanf("%d",&a[i]);shell(a,N);for(int i=0;i<N;i++)printf("%d ",a[i]);printf("\\n");return 0;}',ex:'1 2 3 5 8 \n',si:'5\n5 3 8 1 2',kn:'按gap分组→组内插入排序→gap/=2→重复。时间~O(n¹·³)不稳定。',et:'408选择题：希尔排序的增量序列'},
{ph:'排序(408核心!)',tg:'排序',df:'⭐⭐',ti:'排序对比表(必默写!)',de:'printf打印所有排序算法的复杂度+稳定性。408选择题每年1道。',tp:'#include <stdio.h>\nint main(){\nprintf("算法      时间(平均)  空间    稳定?\\n");\nprintf("====================================\\n");\nprintf("插入排序  O(n^2)     O(1)    稳定\\n");\nprintf("冒泡排序  O(n^2)     O(1)    稳定\\n");\nprintf("选择排序  O(n^2)     O(1)    不稳定\\n");\nprintf("希尔排序  ~O(n^1.3)  O(1)    不稳定\\n");\nprintf("快速排序  O(nlogn)   O(logn) 不稳定\\n");\nprintf("堆排序    O(nlogn)   O(1)    不稳定\\n");\nprintf("归并排序  O(nlogn)   O(n)    稳定\\n");\nprintf("基数排序  O(d(n+r))  O(n+r)  稳定\\n");\nreturn 0;\n}',ex:'',kn:'这张表408选择题每年至少1道。必须能默写。',et:'408选择题必考'},

function makeBlank(tp){var lines=tp.split('\n');var out=[],blanked=0;for(var i=0;i<lines.length;i++){var L=lines[i].trim();var isFuncDef=((L.indexOf('void ')==0||L.indexOf('int ')==0||L.indexOf('float ')==0||L.indexOf('double ')==0||L.indexOf('char ')==0)&&L.indexOf('){')>-1&&L.indexOf('main')==-1)||((L.indexOf('struct ')==0||L.indexOf('typedef ')==0)&&L.indexOf('{')>-1);var isLogic=(L.indexOf('printf(')>-1&&L.indexOf('"')>-1)||L.indexOf('if(')>-1||L.indexOf('if (')>-1||L.indexOf('else ')===0||L.indexOf('else{')>-1||L.indexOf('for(')>-1||L.indexOf('for (')>-1||L.indexOf('while(')>-1||L.indexOf('while (')>-1||(L.indexOf('return ')>-1&&L.indexOf('return 0')==-1&&L.indexOf('return;')==-1&&L.indexOf('return -1')==-1);var isKey=isFuncDef||isLogic;if(isKey&&blanked===0){out.push('  // === 在这里写你的代码 ===');blanked=1;}if(!isKey)out.push(lines[i]);}if(blanked===0){out.splice(Math.floor(out.length/2),0,'  // === 在这里写你的代码 ===');}return out.join('\n');}
for(var i=0;i<LDS.length;i++){if(!LDS[i].so&&LDS[i].tp.indexOf('// ===')===-1){LDS[i].so=LDS[i].tp;LDS[i].tp=makeBlank(LDS[i].tp);}}
function autoTips(tg,ti){var map={顺序表:{steps:'<b>①</b>确认数组下标从0开始→<b>②</b>想清楚是插入(后移)还是删除(前移)→<b>③</b>注意循环方向(从后往前移/从前往后移)',traps:'下标越界→不报错 · 移动方向弄反 · 忘了移动后更新长度 · 插入位置i写成下标i-1'},链表:{steps:'<b>①</b>malloc创建节点→<b>②</b>先连后断(插入时先s->next=p->next再p->next=s)→<b>③</b>遍历用while(p)',traps:'忘了malloc→野指针 · 插入时先断后连→丢失后续节点 · 删节点忘了free→内存泄漏 · 头节点需特殊处理'},栈队列:{steps:'<b>①</b>确认是LIFO(栈)还是FIFO(队列)→<b>②</b>记住循环队列公式→<b>③</b>想清楚top/front初始值',traps:'循环队列判空判满公式记反 · 出队时front移动方向搞错 · 忘了取模%'},树:{steps:'<b>①</b>确认遍历方式(前/中/后/层)→<b>②</b>递归：先写基准条件if(!T)return→<b>③</b>递归左→处理根→递归右',traps:'空指针未判断→崩溃 · 前序后序分不清 · 忘了中序=升序这个性质 · 仅前+后无法唯一确定树'},图:{steps:'<b>①</b>选存储方式(邻接矩阵/邻接表)→<b>②</b>visited数组标记→<b>③</b>DFS用递归/BFS用队列',traps:'忘了visited标记→死循环 · 邻接矩阵中i,j写反 · BFS和DFS搞混'},排序:{steps:'<b>①</b>选排序算法→<b>②</b>写核心代码→<b>③</b>运行验证→<b>④</b>在输出区默写时空复杂度表',traps:'快排最坏O(n²)(已有序+选首元素) · 堆排不稳定 · 归并空间O(n)常被忽略 · 稳定性记反'},查找:{steps:'<b>①</b>确认数据是否有序→<b>②</b>有序用折半(while(l<=r))→<b>③</b>哈希用%p取模',traps:'链表不能折半查找 · 哈希冲突处理记混 · 折半mid写成(l+r)/2可能溢出'}};var m=map[tg]||{steps:'<b>①</b>理解题目要求的操作→<b>②</b>想用什么数据结构→<b>③</b>写代码→<b>④</b>验证',traps:'忽略边界条件 · 没考虑空表/单元素特殊情况'};return m;}function buildSidebar(){var done=g(K),h='',lp='';LDS.forEach(function(l,i){if(l.ph!==lp){h+='<div class="ph">📌 '+l.ph+'</div>';lp=l.ph;}h+='<button class="lv'+(i===cur?' on':'')+(done[i]?' done':'')+'" onclick="go('+i+')"><span class="n">'+(i+1)+'</span>'+l.ti+'<span class="ck">✓</span></button>';});document.getElementById('sidebar-list').innerHTML=h;}
function go(i){cur=i;var l=LDS[i];var done=g(K);document.querySelectorAll('#sb button.lv').forEach(function(b,j){b.classList.toggle('on',j===i);b.classList.toggle('done',!!done[j]);});var ta=document.getElementById('code');ta.value=localStorage['lv_ds_'+i]||l.tp;upLn();var left=document.getElementById('left');var tips=autoTips(l.tg,l.ti);var kh='<div class="kb"><h4>📖 408考点讲解</h4>'+l.kn+'</div><div class="kb" style="border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.03)"><h4>🔍 解题思路</h4>'+tips.steps+'</div><div class="kb" style="border-color:rgba(248,81,73,.3);background:rgba(248,81,73,.03)"><h4>⚠️ 常见错误</h4>'+tips.traps+'</div>';if(l.et)kh+='<div class="exm">🎯<b>真题</b>：'+l.et+'</div>';var io='<div class="iso">';if(l.si)io+='<div class="il">📥样例输入</div><pre>'+esc(l.si)+'</pre>';io+='<div class="il">📤期望输出</div><pre>'+esc(l.ex)+'</pre></div>';left.innerHTML='<h3>关卡'+(i+1)+':'+l.ti+'</h3><div style="font-size:16px;color:var(--m);margin-bottom:10px">'+l.ph+'·'+l.tg+'</div>'+kh+'<p style="font-size:16px;line-height:1.7;margin-bottom:10px">'+l.de+'</p>'+io;document.getElementById('out').textContent='— 点击▶运行 —';document.getElementById('out').style.color='var(--m)';document.getElementById('hint').style.display='none';}
function upLn(){var ta=document.getElementById('code');var n=ta.value.split('\n').length,h='';for(var i=1;i<=n;i++)h+='<div>'+i+'</div>';document.getElementById('ln').innerHTML=h}
function hint(){var l=LDS[cur];var el=document.getElementById('hint');if(el.style.display==='block'){el.style.display='none';return;}var kn=l.kn.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();el.innerHTML='💡<b>提示</b>：'+kn.slice(0,250);el.style.display='block';}
function sol(){var l=LDS[cur];var out=document.getElementById('out');var code=l.so||l.tp;out.innerHTML='📝 <b>参考答案</b>：<br><pre style="margin:4px 0;font-size:15px;line-height:1.6">'+esc(code)+'</pre>';out.style.color='#58a6ff';document.getElementById('hint').style.display='none';toast('📝 答案已显示在输出区');}
function reset(){document.getElementById('code').value=LDS[cur].tp;upLn();document.getElementById('hint').style.display='none';toast('↺已重置')}
async function run(){var l=LDS[cur];var code=document.getElementById('code').value;localStorage['lv_ds_'+cur]=code;var out=document.getElementById('out');out.textContent='⏳编译中...';out.style.color='#d2991d';try{var r=await fetch('https://wandbox.org/api/compile.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({compiler:'gcc-head',code:code,stdin:l.si||''})});var d=await r.json();var re='';var isErr=false;if(d.compiler_error){re+='编译错误:\n'+d.compiler_error+'\n';isErr=true;}if(d.program_error){re+=(re?'\n':'')+'运行错误:\n'+d.program_error+'\n';isErr=true;}if(d.program_output)re+=d.program_output;if(!re)re='(无输出)';out.textContent=re;out.style.color=isErr?'#f85149':'#3fb950';if(d.program_output&&l.ex&&d.program_output===l.ex&&!d.compiler_error){var done=g(K);done[cur]=true;s(K,done);var btns=document.querySelectorAll('#sb button.lv');for(var j=0;j<btns.length;j++)btns[j].classList.toggle('done',!!done[j]);toast('✅通关！');}}catch(e){out.style.color='var(--m)';out.textContent='在线编译器不可用(翻墙断了?)\n本地:gcc main.c -o main && ./main\n'+(l.si?'输入:'+l.si+'\n':'')+'期望输出:'+l.ex;}}
document.getElementById('code').addEventListener('input',upLn);
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();var ta=e.target;var s=ta.selectionStart;ta.value=ta.value.slice(0,s)+'\t'+ta.value.slice(ta.selectionEnd);ta.selectionStart=ta.selectionEnd=s+1}});
buildSidebar();go(cur||0);
</script></body></html>
