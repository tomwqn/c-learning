{t:'1.2 算法五特性',b:'<p>有穷性、确定性、可行性、输入(≥0)、输出(≥1)。<span class="tag trp">程序≠算法(可死循环)</span></p>'},
{t:'1.3 时间复杂度-O(1)',b:'<p>常数阶。执行时间与n无关。例：<code>x++;</code> <code>a=b+c;</code></p>'},

]},{ch:'第1章 选择题精练(15道真题)',items:[{t:'点击查看答案',b:mc([{q:'【2019-T1】设n是描述问题规模的非负整数，<code>while(n>=(x+1)*(x+1)) x++;</code>的时间复杂度',o:'A.O(logn) B.O(√n) C.O(n) D.O(n²)',a:'B',e:'n≥(x+1)²→x≤√n-1，执行约√n次'},{q:'【2013-T1】长度m和n的升序链表合并为降序链表，最坏时间复杂度',o:'A.O(m+n) B.O(m×n) C.O(min(m,n)) D.O(max(m,n))',a:'D',e:'归并需遍历完较长链表'},{q:'【2012-T1】求整数n(n≥2)阶乘的递归算法时间复杂度',o:'A.O(1) B.O(n) C.O(n²) D.O(logn)',a:'B',e:'n层递归，每层O(1)'},{q:'【2011-T1】下列程序段的时间复杂度：<code>for(i=0;i&lt;n;i++) for(j=0;j&lt;m;j++) a[i][j]=0;</code>',o:'A.O(n) B.O(m) C.O(n+m) D.O(nm)',a:'D',e:'双层嵌套，每层为n和m→O(nm)'},{q:'【2014-T1】<code>count=0; for(k=1;k<=n;k*=2) for(j=1;j<=n;j++) count++;</code>的时间复杂度',o:'A.O(n) B.O(nlogn) C.O(n²) D.O(nlog²n)',a:'B',e:'外层O(logn)，内层O(n)→O(nlogn)'},{q:'【2017-T1】下列函数的时间复杂度：<code>int f(int n){if(n<=1)return 1;return n*f(n-1);}</code>',o:'A.O(1) B.O(n) C.O(n²) D.O(logn)',a:'B',e:'递归n次，每次O(1)'},{q:'【2020-T1】下列代码的时间复杂度：<code>for(i=0;i*i&lt;n;i++) for(j=0;j&lt;i;j++) sum++;</code>',o:'A.O(n) B.O(n√n) C.O(n²) D.O(nlogn)',a:'A',e:'外层i最大约√n，内层0+1+...+(√n-1)≈n/2→O(n)'},{q:'【2022-T1】时间复杂度与空间复杂度都最小的排序算法是',o:'A.快速排序 B.归并排序 C.堆排序 D.基数排序',a:'C',e:'堆排时间O(nlogn)空间O(1)。快排空间O(logn)，归并空间O(n)'},{q:'【2015-T1】下列程序段中，时间复杂度为O(logn)的是',o:'A.i=1;while(i<=n)i=i*2; B.i=1;while(i<=n)i=i+2; C.for(i=1;i<=n;i++)sum++; D.for(i=1;i<=n;i*=2)for(j=1;j<=n;j++)sum++;',a:'A',e:'A:i每次×2→O(logn)；B:i每次+2→O(n)；C:单层→O(n)；D:外层O(logn)内层O(n)→O(nlogn)'},{q:'【2018-T1】下列程序段的时间复杂度：<code>for(i=1;i&lt;=n;i++) for(j=1;j&lt;=i;j++) sum++;</code>',o:'A.O(n) B.O(nlogn) C.O(n²) D.O(n³)',a:'C',e:'执行次数=1+2+...+n=n(n+1)/2→O(n²)'},{q:'【2023-T1】算法的时间复杂度取决于',o:'A.问题规模 B.计算机性能 C.程序设计语言 D.编译程序的质量',a:'A',e:'时间复杂度是问题规模n的函数，与硬件/语言无关'},{q:'【2010-T1】下列选项中，不属于算法特性的是',o:'A.有穷性 B.确定性 C.可行性 D.美观性',a:'D',e:'算法五特性：有穷/确定/可行/输入/输出'},{q:'【2016-T1】已知两个有序表，若将二者归并为一个有序表，所需比较次数最少为',o:'A.n B.2n-1 C.2n D.n-1',a:'A',e:'最好情况：一个表所有元素都小于另一个→只需比较n次'},{q:'【2024-T1】下列选项中，时间复杂度最高的是',o:'A.O(n) B.O(nlogn) C.O(n²) D.O(2ⁿ)',a:'D',e:'指数阶O(2ⁿ)>平方阶O(n²)>线性对数阶'},{q:'【2025-T1】(回忆)代码时间复杂度：<code>for(i=1;i*i&lt;n;i++) for(j=1;j&lt;=i;j++) sum++;</code>',o:'A.O(√n) B.O(n) C.O(n√n) D.O(n²)',a:'B',e:'外层√n次，内层0+1+...+√n≈n/2→O(n)'}])}]},
{ch:'第2章 线性表 (4-6分/年·主要代码题来源)',items:[
{t:'2.1 线性表定义',b:'<p>相同数据类型n个元素的有限序列。除首元外各有唯一前驱，除尾元外各有唯一后继。</p>'},
{t:'2.2 顺序表定义与存储',b:'<p>连续内存存储。逻辑相邻=物理相邻。支持随机存取O(1)。</p><pre>#define MaxSize 50\ntypedef struct{ int data[MaxSize]; int length; }SqList;</pre>'},
{t:'2.3 顺序表插入',b:'<p>第i位插入→元素后移。<span class="tag fml">移动n-i+1个</span>。等概率平均移动n/2。O(n)。</p>'},

{t:'2.5 顺序表查找',b:'<p>按值查找O(n)，平均(n+1)/2次。折半查找O(logn)（须有序）。</p>'},
{t:'2.6 单链表节点结构',b:'<pre>typedef struct LNode{\n  int data;\n  struct LNode *next;\n}LNode, *LinkList;</pre>'},
{t:'2.7 头插法vs尾插法',b:'<p><b>头插</b>：新节点插入头节点后→<b>逆序</b>。<b>尾插</b>：维护尾指针r→<b>同序</b>。均为O(n)。</p>'},
{t:'2.8 单链表-在p后插入s',b:'<pre>s->next = p->next;\np->next = s;\n// 顺序不能反！先连后断</pre>'},
{t:'2.9 单链表-按序号/按值查找',b:'<p>按序号：从head开始计数到第i个→O(n)。按值：逐个比较data→O(n)。</p>'},
{t:'2.10 单链表-删除p的后继',b:'<pre>q = p->next;\np->next = q->next;\nfree(q);</pre>'},
{t:'2.11 双链表',b:'<p>每个节点有prior和next指针。插入/删除需修改4条指针。已知位置→O(1)。</p>'},
{t:'2.12 循环链表',b:'<p>尾节点next指向头节点。判空：<code>L->next==L</code>。</p>'},
{t:'2.13 静态链表',b:'<p>用数组模拟链表，游标(cur)代替指针。</p>'},

]},{ch:'第2章 选择题精练(20道真题)',items:[{t:'点击查看答案',b:mc([{q:'【2016-T1】已知表头元素为c的单链表，将f存放于1014H处并插入a和e之间，f的"链接地址"是',o:'A.1010H B.1014H C.1004H D.101CH',a:'A',e:'f插入在a(1004H)和e(1010H)之间→f->next=e的地址=1010H'},{q:'【2021-T2】q是p所指结点的前驱，在q和p之间插入s',o:'A.q->next=s; s->next=p; B.p->next=s; s->next=q; C.s->next=p; q->next=s; D.p->next=s->next; s->next=q;',a:'A',e:'s插q之后p之前→q->next=s; s->next=p'},{q:'【2010-T2】在n个元素的线性表中删除第i个元素，需移动的元素个数',o:'A.i B.n-i C.n-i+1 D.n-i-1',a:'B',e:'删第i个后，第i+1到第n个前移→共n-i个'},{q:'【2015-T2】在长度为n的顺序表中插入一个元素的平均移动次数',o:'A.n B.n/2 C.(n-1)/2 D.(n+1)/2',a:'B',e:'等概率下，n+1个插入位置，移动次数之和/n+1=n/2'},{q:'【2012-T2】与单链表相比，双链表的优点之一是',o:'A.插入删除更方便 B.可双向遍历 C.不需要头指针 D.存储密度更高',a:'B',e:'双链表有prior指针→可向前遍历。插入删除也要改两个指针→更方便是错的。存储密度更低(多一个指针)'},{q:'【2020-T2】在长度为n的单链表中查找值为x的结点，平均比较次数',o:'A.n B.n/2 C.(n+1)/2 D.(n-1)/2',a:'C',e:'成功查找等概率下，平均比较次数=(1+2+...+n)/n=(n+1)/2'},{q:'【2017-T2】对于顺序存储的线性表，访问第i个位置的元素的时间复杂度',o:'A.O(1) B.O(n) C.O(logn) D.O(i)',a:'A',e:'顺序表=数组→下标直接定位→O(1)'},{q:'【2022-T2】单链表中删除指针p所指结点的后继，时间复杂度',o:'A.O(1) B.O(n) C.O(logn) D.O(n²)',a:'A',e:'已知p→可直接访问p->next→O(1)'},{q:'【2011-T2】在n个元素的线性表第i个位置插入，需移动元素个数',o:'A.n-i B.n-i+1 C.i D.n-i-1',a:'B',e:'插入时原第i到第n个后移→共n-i+1个'},{q:'【2014-T2】若长度为n的线性表采用顺序存储结构，在其第i个位置删除元素的时间复杂度',o:'A.O(1) B.O(n) C.O(n²) D.O(logn)',a:'B',e:'删除后需移动后续元素→O(n)'},{q:'【2018-T3】以下关于静态链表的说法错误的是',o:'A.静态链表用数组实现 B.静态链表需要分配连续空间 C.静态链表可随机存取 D.静态链表中结点的指针域存放的是相对地址',a:'C',e:'静态链表仍是链式存储→不能随机存取'},{q:'【2023-T2】线性表采用链表存储时，其结点所占用的存储空间',o:'A.必须是连续的 B.可以不连续 C.部分连续部分不连续 D.和顺序表一样',a:'B',e:'链表结点可以分散在内存各处→通过指针链接'},{q:'【2019-T2】在头指针为head且表长大于1的单循环链表中，指针p指向表中某结点，若p->next->next==head，则',o:'A.p指向头结点 B.p指向尾结点 C.p指向倒数第二个结点 D.p指向head',a:'C',e:'p->next=尾结点，尾结点->next=head→所以p->next->next=head'},{q:'【2024-T2】顺序表插入元素时，移动元素的顺序应该是',o:'A.从前往后 B.从后往前 C.任意顺序 D.同时移动',a:'B',e:'从后往前移→不会覆盖未移动的元素；从前往后移会覆盖'},{q:'【2013-T2】若某线性表最常用的操作是存取第i个元素及其前驱，则采用哪种存储方式最节省时间',o:'A.单链表 B.双链表 C.顺序表 D.循环链表',a:'C',e:'存取第i个→随机存取→顺序表O(1)；链表需遍历O(n)'},{q:'【2009-T1】在一个长度为n的顺序表中，向第i个位置插入一个新元素时，需要向后移动的元素个数',o:'A.n-i B.n-i+1 C.i D.n-i-1',a
