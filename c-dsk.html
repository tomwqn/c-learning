function mcHTML(arr,chId){var h='<div class="mch"><h4>📝 选择题通关 ('+arr.length+'题)</h4><div class="score" id="sc_'+chId+'">✅ 0 / '+arr.length+'</div>';arr.forEach(function(q,i){var id='q_'+chId+'_'+i;h+='<div class="mcq"><div class="q"><b>'+(i+1)+'.</b> '+q.q+'</div><div class="opts">';q.o.forEach(function(opt,j){h+='<button id="'+id+'_'+j+'" onclick="pick(\''+id+'\','+i+','+j+','+q.a+',\''+chId+'\','+arr.length+')">'+opt+'</button>';});h+='</div><div class="fb" id="fb_'+id+'"></div></div>';});h+='</div>';return h;}

var scoreMap={};
function pick(id,i,chosen,correct,chId,total){
  var fb=document.getElementById('fb_'+id);
  // disable all buttons for this question
  for(var j=0;j<10;j++){var b=document.getElementById(id+'_'+j);if(b){b.disabled=true;b.style.opacity='0.5';}}
  // mark chosen
  var cBtn=document.getElementById(id+'_'+chosen);
  var rBtn=document.getElementById(id+'_'+correct);
  if(chosen===correct){cBtn.className='right';fb.className='fb ok';fb.innerHTML='✅ 正确！';scoreMap[chId]=(scoreMap[chId]||0)+1;}else{cBtn.className='wrong';rBtn.className='right';fb.className='fb bad';fb.innerHTML='❌ 错误。正确答案是第'+(correct+1)+'个选项。';}
  document.getElementById('sc_'+chId).textContent='✅ '+scoreMap[chId]+' / '+total;
}
